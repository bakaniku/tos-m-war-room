<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TOS M - 全域管理後台</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .stat-card h2 { color: #0f0; margin: 0; font-size: 2em; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #252525; color: #0f0; }
        .room-active { color: #0f0; font-weight: bold; }
        .room-idle { color: #666; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; }
        .btn-del { background: #422; color: #f66; }
    </style>
</head>
<body>
    <h1>TOS M FB 工具管理後台</h1>
    
    <div class="stats-grid">
        <div class="stat-card">房間總數 <h2 id="totalRooms">0</h2></div>
        <div class="stat-card">全域在線 <h2 id="totalUsers">0</h2></div>
        <div class="stat-card">總記錄卡片 <h2 id="totalBosses">0</h2></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>房間 ID</th>
                <th>在線人數</th>
                <th>卡片數量</th>
                <th>最後動態 (最後一位更新者)</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="roomList"></tbody>
    </table>

    <script>
        // 請貼上你原本 index.html 的 Firebase 設定
        const firebaseConfig = { 
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI", 
            authDomain: "tos-m-fb.firebaseapp.com", 
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "tos-m-fb" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 開始監控
        db.ref('rooms').on('value', (snapshot) => {
            const rooms = snapshot.val() || {};
            updateDashboard(rooms);
        });

        function updateDashboard(rooms) {
    const list = document.getElementById('roomList');
    list.innerHTML = '';
    
    let roomsCount = 0;
    let usersCount = 0;
    let bossesCount = 0;
    let roomEntries = [];

    if (!rooms) return;

    // 預處理資料：計算每個房間的最後更新時間
    Object.entries(rooms).forEach(([id, data]) => {
        let lastTime = 0;
        let lastUser = "無紀錄";
        
        if (data.bosses) {
            const bossArr = Object.values(data.bosses);
            if (bossArr.length > 0) {
                const latest = bossArr.reduce((prev, curr) => 
                    ((prev.startTime || 0) > (curr.startTime || 0)) ? prev : curr
                );
                lastTime = latest.startTime || 0;
                lastUser = latest.updater || "未知";
            }
        }
        roomEntries.push({ id, data, lastTime, lastUser });
    });

    // 排序：最久沒更新的排在最前面
    roomEntries.sort((a, b) => a.lastTime - b.lastTime);

    roomEntries.forEach(item => {
        roomsCount++;
        const uCount = item.data.users ? Object.keys(item.data.users).length : 0;
        const bCount = item.data.bosses ? Object.keys(item.data.bosses).length : 0;
        usersCount += uCount;
        bossesCount += bCount;

        // 計算距離現在多久沒動過
        const timeAgo = item.lastTime === 0 ? "極久以前" : getTimeAgo(item.lastTime);

        const row = `
            <tr>
                <td style="color:#0f0;">${item.id}</td>
                <td style="${uCount > 0 ? 'color:#0f0' : 'color:#666'}">${uCount} 人</td>
                <td>${bCount}</td>
                <td><span style="color:#aaa">${timeAgo}</span> <br><small>(${item.lastUser})</small></td>
                <td>
                    <button class="btn-del" onclick="deleteRoom('${item.id}')">清除房間</button>
                </td>
            </tr>
        `;
        list.innerHTML += row;
    });

    document.getElementById('totalRooms').innerText = roomsCount;
    document.getElementById('totalUsers').innerText = usersCount;
    document.getElementById('totalBosses').innerText = bossesCount;
}

// 小工具：計算時間差
function getTimeAgo(timestamp) {
    const diff = Date.now() - timestamp;
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(hours / 24);
    if (days > 0) return `${days} 天前`;
    if (hours > 0) return `${hours} 小時前`;
    return "剛更新";
}

        function deleteRoom(id) {
    // 增加二次確認，避免手滑
    const confirmFirst = confirm(`確定要完全清除房間 [${id}] 嗎？\n這將刪除該房所有卡片與對話紀錄。`);
    if (confirmFirst) {
        const confirmSecond = confirm(`最後確認：真的要刪除 [${id}] 嗎？`);
        if (confirmSecond) {
            db.ref(`rooms/${id}`).remove()
              .then(() => alert(`房間 ${id} 已成功移除`))
              .catch(err => alert(`刪除失敗: ${err}`));
        }
    }
}
    </script>
</body>
</html>
