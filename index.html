<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M 戰情室 - 穩定版</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .container { padding: 20px; display: flex; flexDirection: column; min-height: 100vh; box-sizing: border-box; }
        .login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 40px; }
        .btn { padding: 12px; border-radius: 8px; border: 1px solid #0f0; background: none; color: #0f0; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }
        .btn-solid { background: #0f0; color: #000; border: none; }
        input { background: none; border: none; border-bottom: 2px solid #333; color: #fff; padding: 10px; font-size: 20px; text-align: center; width: 100%; outline: none; margin-bottom: 20px; }
        .item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 10px 0; }
        .timer { font-family: monospace; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // 使用純 JS 寫法，不依賴 Babel
        const e = React.createElement;
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
            authDomain: "tos-m-fb.firebaseapp.com",
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tos-m-fb",
            storageBucket: "tos-m-fb.firebasestorage.app",
            messagingSenderId: "182442840060",
            appId: "1:182442840060:web:8163505d26c96837c6ac79"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [roomID, setRoomID] = useState('');
            const [tempID, setTempID] = useState('');
            const [bossData, setBossData] = useState({});
            const [tick, setTick] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => setTick(t => t + 1), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!roomID) return;
                const ref = db.ref('rooms/' + roomID + '/bosses');
                ref.on('value', s => setBossData(s.val() || {}));
                return () => ref.off();
            }, [roomID]);

            if (!roomID) {
                return e('div', { className: 'login-box' },
                    e('h1', { style: { color: '#0f0' } }, 'TOS M 戰情室'),
                    e('button', { className: 'btn', onClick: () => setRoomID(Math.random().toString(36).substring(2, 8).toUpperCase()) }, '＋ 創建房間'),
                    e('input', { placeholder: '輸入代碼', value: tempID, onChange: v => setTempID(v.target.value.toUpperCase()) }),
                    e('button', { className: 'btn btn-solid', onClick: () => setRoomID(tempID) }, '加入房間')
                );
            }

            return e('div', { className: 'container' },
                e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '20px' } },
                    e('span', {style:{color:'#0f0'}}, '房間: ' + roomID),
                    e('button', { style: { background: 'none', color: '#666', border: 'none' }, onClick: () => setRoomID('') }, '退出')
                ),
                e('p', { style: { fontSize: '12px', color: '#444' } }, '請在下方輸入: 地圖 分流 分鐘 (例: 123 3 180)'),
                e('input', { 
                    placeholder: '格式: 123 3 180', 
                    onKeyDown: ev => {
                        if (ev.key === 'Enter') {
                            const p = ev.target.value.split(' ');
                            if (p.length < 3) return;
                            db.ref('rooms/' + roomID + '/bosses/' + p[0] + '_' + p[1]).set({
                                map: p[0], ch: p[1], targetTime: Date.now() + parseInt(p[2]) * 60000
                            });
                            ev.target.value = '';
                        }
                    }
                }),
                Object.entries(bossData).map(([id, b]) => {
                    const diff = Math.floor((b.targetTime - Date.now()) / 1000);
                    const isOver = diff <= 0;
                    const timeStr = (isOver ? '-' : '') + new Date(Math.abs(diff) * 1000).toISOString().substr(11, 8);
                    return e('div', { key: id, className: 'item' },
                        e('span', null, b.map + '-' + b.ch),
                        e('span', { className: 'timer', style: { color: isOver ? '#f44' : '#0f0' } }, timeStr),
                        e('button', { style:{background:'none', border:'none', color:'#444'}, onClick: () => db.ref('rooms/' + roomID + '/bosses/' + id).remove() }, '×')
                    );
                })
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
