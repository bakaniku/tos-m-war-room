<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M 戰情室</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; }
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; border-radius: 0; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        /* 卡片增加手勢指引 */
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: #555; background: #1a1a1a; }
        .card h3 { margin: 0; color: #666; font-size: 12px; pointer-events: none; }
        .timer { font-size: 24px; font-weight: bold; margin-top: 8px; font-family: monospace; pointer-events: none; }
        .del { position: absolute; top: 5px; right: 10px; color: #444; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; }
        .del:hover { color: #f44; }
        .divider { height: 1px; background: #222; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="app">
        <div id="loginView" class="login-view">
            <div class="title">TOS M 戰情室</div>
            <div class="input-group">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <div class="divider"></div>
                <input type="text" id="roomInput" placeholder="輸入 6 位代碼" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-id" id="displayID"></div>
                <button style="background:none; color:#444;" onclick="location.reload()">退出</button>
            </div>
            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 分鐘 (例如: 123 3 180)">
            <div class="grid" id="bossList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
            authDomain: "tos-m-fb.firebaseapp.com",
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tos-m-fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '';
        let timers = {}; // 存放定時器引用

        function joinRoom() {
            const id = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!id) return;
            startSession(id);
        }

        function createRoom() {
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            startSession(id);
        }

        function startSession(id) {
            currentRoom = id;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('displayID').innerText = '房號：' + id;
            document.getElementById('bossInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addBoss();
            });
            listenData();
        }

        function addBoss() {
            const input = document.getElementById('bossInput');
            const p = input.value.trim().split(/\s+/);
            if (p.length < 3) return;
            db.ref(`rooms/${currentRoom}/bosses/${p[0]}_${p[1]}`).set({
                map: p[0], ch: p[1], targetTime: Date.now() + parseInt(p[2]) * 60000,
                lastMins: p[2] // 紀錄最後輸入的分鐘數，方便編輯
            });
            input.value = '';
        }

        // 💡 點擊卡片編輯邏輯
        function editBoss(map, ch, lastMins) {
            const input = document.getElementById('bossInput');
            input.value = `${map} ${ch} ${lastMins || 180}`;
            input.focus();
            // 自動選取分鐘部分，方便直接改數字
            const start = `${map} ${ch} `.length;
            input.setSelectionRange(start, input.value.length);
        }

        function listenData() {
            db.ref(`rooms/${currentRoom}/bosses`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = document.getElementById('bossList');
                list.innerHTML = '';
                
                // 清除舊的定時器
                Object.values(timers).forEach(clearInterval);
                timers = {};

                // 排序邏輯：負數（過期）優先，其餘按剩餘時間排序
                const sorted = Object.entries(data).sort((a, b) => {
                    const diffA = a[1].targetTime - Date.now();
                    const diffB = b[1].targetTime - Date.now();
                    if (diffA < 0 && diffB >= 0) return -1;
                    if (diffA >= 0 && diffB < 0) return 1;
                    return diffA - diffB;
                });

                sorted.forEach(([id, boss]) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // 點擊卡片觸發編輯 (排除刪除按鈕)
                    card.onclick = (e) => {
                        if (e.target.className !== 'del') {
                            editBoss(boss.map, boss.ch, boss.lastMins);
                        }
                    };

                    card.innerHTML = `
                        <button class="del" onclick="deleteBoss('${id}')">×</button>
                        <h3>${boss.map} - ${boss.ch}線</h3>
                        <div class="timer" id="t_${id}">--:--</div>
                    `;
                    list.appendChild(card);
                    startTimer(id, boss.targetTime);
                });
            });
        }

        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }

        function startTimer(id, target) {
            const el = document.getElementById('t_' + id);
            const update = () => {
                const diff = Math.floor((target - Date.now()) / 1000);
                const isOver = diff <= 0;
                const abs = Math.abs(diff);
                const m = Math.floor(abs / 60);
                const s = (abs % 60).toString().padStart(2, '0');
                if (el) {
                    el.innerText = (isOver ? '-' : '') + m + ':' + s;
                    el.style.color = isOver ? '#f44' : '#0f0';
                }
            };
            update();
            timers[id] = setInterval(update, 1000);
        }
    </script>
</body>
</html>
