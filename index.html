<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOS M 戰情儀表板</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #app { display: flex; height: 100vh; flex-direction: column; }
        @media (min-width: 768px) { #app { flex-direction: row; } }
        .sidebar { background: #111; padding: 20px; flex: 0 0 280px; border-right: 1px solid #333; box-sizing: border-box; }
        .main { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; align-content: start; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; position: relative; }
        .card h3 { margin: 0; color: #888; font-size: 14px; }
        .timer { font-size: 24px; font-weight: bold; margin-top: 10px; font-family: monospace; }
        input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0f0; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .login { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .del { position: absolute; top: 5px; right: 10px; color: #555; cursor: pointer; background: none; border: none; font-size: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="login" id="loginView">
            <h1 style="color:#0f0">TOS M</h1>
            <input type="text" id="roomInput" placeholder="請輸入房號" style="max-width:200px">
            <button onclick="joinRoom()" style="max-width:200px">進入房間</button>
        </div>
        <div id="mainView" style="display:none; width: 100%; height: 100%; flex-direction: inherit;">
            <div class="sidebar">
                <h2 id="displayRoomID" style="color:#0f0"></h2>
                <p style="color:#555; font-size:12px">格式：地圖 分流 分鐘</p>
                <input type="text" id="bossInput" placeholder="123 3 180">
                <button onclick="addBoss()">送出資料</button>
                <button onclick="location.reload()" style="margin-top:20px; background:#333; color:#aaa">切換房間</button>
            </div>
            <div class="main" id="bossList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
            authDomain: "tos-m-fb.firebaseapp.com",
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tos-m-fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '';

        function joinRoom() {
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!currentRoom) return;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'flex';
            document.getElementById('displayRoomID').innerText = '房號：' + currentRoom;
            listenData();
        }

        function addBoss() {
            const val = document.getElementById('bossInput').value.trim();
            const p = val.split(/\s+/);
            if(p.length < 3) return alert('格式錯誤：地圖 分流 分鐘');
            db.ref(`rooms/${currentRoom}/bosses/${p[0]}_${p[1]}`).set({
                map: p[0], ch: p[1], targetTime: Date.now() + parseInt(p[2]) * 60000
            });
            document.getElementById('bossInput').value = '';
        }

        function listenData() {
            db.ref(`rooms/${currentRoom}/bosses`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = document.getElementById('bossList');
                list.innerHTML = '';
                Object.entries(data).forEach(([id, boss]) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <button class="del" onclick="deleteBoss('${id}')">×</button>
                        <h3>${boss.map} - ${boss.ch}線</h3>
                        <div class="timer" id="t_${id}">--:--</div>
                    `;
                    list.appendChild(card);
                    updateTimer(id, boss.targetTime);
                });
            });
        }

        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }

        function updateTimer(id, target) {
            const el = document.getElementById('t_' + id);
            if(!el) return;
            const run = () => {
                const diff = Math.floor((target - Date.now()) / 1000);
                const isOver = diff <= 0;
                const abs = Math.abs(diff);
                const m = Math.floor(abs / 60);
                const s = abs % 60;
                el.innerText = (isOver ? '-' : '') + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
                el.style.color = isOver ? '#f44' : '#0f0';
            };
            run();
            setInterval(run, 1000);
        }
    </script>
</body>
</html>
