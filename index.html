<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOS M 戰情儀表板 (PC版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-native-web@0.19.10/dist/bundle.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* 針對 PC 版的額外滾動條美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0f0; }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#000;">
    <div id="root"></div>

    <script type="text/babel">
        const { View, Text, StyleSheet, TextInput, ScrollView, TouchableOpacity, useWindowDimensions } = ReactNativeWeb;
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
          authDomain: "tos-m-fb.firebaseapp.com",
          databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "tos-m-fb",
          storageBucket: "tos-m-fb.firebasestorage.app",
          messagingSenderId: "182442840060",
          appId: "1:182442840060:web:8163505d26c96837c6ac79"
        };

        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
        const dbInstance = window.firebase.database();

        function App() {
          const [roomID, setRoomID] = useState('');
          const [tempRoomID, setTempRoomID] = useState('');
          const [inputText, setInputText] = useState('');
          const [bossData, setBossData] = useState({});
          const { width } = useWindowDimensions();
          const isPC = width > 768; // 判斷是否為寬螢幕

          useEffect(() => {
            if (!roomID) return;
            const bossRef = dbInstance.ref(`rooms/${roomID}/bosses`);
            bossRef.on('value', (s) => setBossData(s.val() || {}));
            return () => bossRef.off();
          }, [roomID]);

          const handleUpdate = () => {
            const parts = inputText.trim().split(/\s+/);
            if (parts.length < 3) return;
            const [map, ch, status] = parts;
            const targetTime = Date.now() + parseInt(status) * 60000;
            dbInstance.ref(`rooms/${roomID}/bosses/${map}_${ch}`).set({ map, ch, targetTime, initialMins: status });
            setInputText('');
          };

          if (!roomID) {
            return (
              <View style={s.loginContainer}>
                <Text style={s.loginTitle}>TOS M 戰情室</Text>
                <TextInput style={s.loginInput} placeholder="輸入房間代碼" placeholderTextColor="#444" onChangeText={setTempRoomID} />
                <TouchableOpacity style={s.loginBtn} onPress={() => setRoomID(tempRoomID.toUpperCase())}>
                  <Text style={{fontWeight:'bold'}}>進入戰情室</Text>
                </TouchableOpacity>
              </View>
            );
          }

          return (
            <View style={[s.mainContainer, isPC && { flexDirection: 'row' }]}>
              {/* 左側/上方控制區 */}
              <View style={[s.sidePanel, isPC ? { width: 350 } : { width: '100%' }]}>
                <Text style={s.roomText}>房間：{roomID}</Text>
                <TextInput 
                    style={s.input} 
                    placeholder="地圖 分流 分鐘 (123 3 180)" 
                    placeholderTextColor="#555"
                    value={inputText}
                    onChangeText={setInputText}
                    onSubmitEditing={handleUpdate}
                />
                <Text style={s.hint}>快捷指令：輸入後按 Enter 即可發布</Text>
                <TouchableOpacity onPress={() => setRoomID('')} style={{marginTop: 20}}>
                    <Text style={{color: '#666'}}>退出房間</Text>
                </TouchableOpacity>
              </View>

              {/* 右側/下方數據顯示區 */}
              <ScrollView style={s.contentPanel}>
                <View style={s.cardGrid}>
                  {Object.entries(bossData).map(([id, boss]) => {
                    const diff = Math.floor((boss.targetTime - Date.now()) / 1000);
                    const isOver = diff <= 0;
                    return (
                      <View key={id} style={[s.card, isPC && { width: '30%' }]}>
                        <View style={{flexDirection:'row', justifyContent:'space-between'}}>
                           <Text style={s.cardTitle}>{boss.map} - {boss.ch}線</Text>
                           <TouchableOpacity onPress={() => dbInstance.ref(`rooms/${roomID}/bosses/${id}`).remove()}>
                              <Text style={{color:'#444'}}>×</Text>
                           </TouchableOpacity>
                        </View>
                        <Text style={[s.cardTimer, { color: isOver ? '#f44' : '#0f0' }]}>
                            {isOver ? '-' : ''}{new Date(Math.abs(diff) * 1000).toISOString().substr(11, 8)}
                        </Text>
                      </View>
                    );
                  })}
                </View>
              </ScrollView>
            </View>
          );
        }

        const s = StyleSheet.create({
          loginContainer: { flex: 1, backgroundColor: '#000', justifyContent: 'center', alignItems: 'center', padding: 50 },
          loginTitle: { color: '#0f0', fontSize: 40, fontWeight: 'bold', marginBottom: 30 },
          loginInput: { borderBottomWidth: 2, borderColor: '#333', color: '#fff', width: 300, padding: 10, fontSize: 20, textAlign: 'center', marginBottom: 20 },
          loginBtn: { backgroundColor: '#0f0', padding: 15, width: 300, alignItems: 'center', borderRadius: 5 },
          mainContainer: { flex: 1, backgroundColor: '#000', height: '100vh' },
          sidePanel: { backgroundColor: '#0a0a0a', padding: 30, borderRightWidth: 1, borderColor: '#222' },
          contentPanel: { flex: 1, padding: 20 },
          roomText: { color: '#0f0', fontSize: 24, fontWeight: 'bold', marginBottom: 20 },
          input: { backgroundColor: '#111', color: '#fff', padding: 15, borderRadius: 5, fontSize: 16, borderLeftWidth: 4, borderColor: '#0f0' },
          hint: { color: '#444', fontSize: 12, marginTop: 10 },
          cardGrid: { flexDirection: 'row', flexWrap: 'wrap', gap: 15 },
          card: { backgroundColor: '#111', padding: 20, borderRadius: 10, minWidth: 200, marginBottom: 15, borderBottomWidth: 2, borderColor: '#222' },
          cardTitle: { color: '#888', fontSize: 14 },
          cardTimer: { fontSize: 28, fontWeight: 'bold', marginTop: 10, fontFamily: 'monospace' }
        });

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
