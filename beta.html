<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 11px; padding: 5px 10px; border-radius: 6px; }
        .btn-toggle { background: #222; color: #888; font-size: 12px; padding: 5px 10px; border: 1px solid #444; }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        
        .copy-icon { width: 18px; height: 18px; min-width: 18px; vertical-align: middle; cursor: pointer; opacity: 0.7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; line-height: 1; }
        
        /* 💡 使用守則彈窗優化 */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #0f0; padding: 15px; border-radius: 12px; z-index: 2000; width: 85%; max-width: 450px; max-height: 60vh; overflow-y: auto; display: none; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); z-index: 1999; display: none; }

        .vol-group { display: flex; align-items: center; gap: 8px; background: #111; padding: 6px 14px; border-radius: 20px; border: 1px solid #333; height: 32px; box-sizing: border-box; }
        .vol-icon { background: none; color: #0f0; padding: 0; font-size: 16px; transition: color 0.2s; cursor: pointer; }
        .vol-range { -webkit-appearance: none; width: 60px; height: 6px; background: #333; border-radius: 3px; outline: none; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #0f0; border-radius: 50%; border: 2px solid #111; }
        .vol-range.muted::-webkit-slider-thumb { background: #555 !important; }
        
        .user-list-bar { font-size: 12px; color: #555; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; margin-bottom: 5px; font-size: 16px; color: #fff; padding: 8px 0; }
        .sort-row { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        
        .grid-section { margin-bottom: 30px; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .section-label { color: #555; font-size: 11px; border-left: 2px solid #333; padding-left: 8px; text-transform: uppercase; }
        .btn-switch { background: #222; color: #0f0; font-size: 10px; padding: 2px 8px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; }
        .card h3 { margin: 0; color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-block; border-bottom: 1px dashed #444; }
        
        /* 💡 閒置卡片無彩色 */
        .card.idle-card h3 { color: #444; border-bottom: 1px dashed #222; }
        .card.idle-card .timer { color: #555 !important; }
        .card.idle-card .btn-next { border-color: #333 !important; color: #333 !important; }

        /* 💡 回歸原始 X 鍵大小 */
        .del { position: absolute; top: 6px; right: 10px; color: #444; background: none; border: none; font-size: 16px; cursor: pointer; padding: 2px; }
        .del:hover { color: #888; }

        .timer { font-size: 20px; font-weight: bold; margin-top: 8px; font-family: monospace; }
        .warning-icon { display: inline-block; margin-left: 8px; font-size: 18px; animation: warn-flash 0.8s infinite; }
        @keyframes warn-flash { 0%, 100% { opacity: 1; scale: 1; } 50% { opacity: 0.5; scale: 1.2; } }
        .btn-next { background: #000; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 6px; cursor: pointer; display: inline-block; margin-top: 8px; border: 2px solid; }

        /* 留言板 */
        .chat-section { margin-top: 40px; border-top: 2px solid #222; padding-top: 20px; display: none; }
        .chat-box { background: #080808; height: 120px; overflow-y: auto; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; border: 1px solid #111; }
        .msg-name { color: #0f0; font-weight: bold; }
        .chat-input-group { display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="modalOverlay" class="modal-overlay" onclick="toggleManual()"></div>
        <div id="manualModal" class="modal">
            <h3 style="color:#0f0; margin-top:0;">📜 使用守則</h3>
            <div id="manualContent" style="font-size:13px; line-height:1.5; color:#ccc; white-space: pre-wrap;">
1. 階段追蹤：ON (紅色) > 階段 4 (橙) > 階段 123 (黃)。
2. 超時偵測：當階段停留過久會出現 ⚠️。
3. 閒置區：超過 1 小時或代碼 000 會移至底部。
4. 語音：靜音狀態下拉桿會自動變灰。
5. 數據同步：所有分流數據 24H 閒置後自動清理。
            </div>
            <button class="btn-solid" style="width:100%; margin-top:10px; padding:10px;" onclick="toggleManual()">確認</button>
        </div>

        <div id="loginView" class="login-view">
            <div class="title">TOS M FB TIME</div>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="你的稱呼" maxlength="10">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <input type="text" id="roomInput" placeholder="輸入房號" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-info">
                    <span class="room-id" id="displayID"></span>
                    <svg class="copy-icon" onclick="copyRoomID()" viewBox="0 0 24 24" fill="none" stroke="#0f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <button class="btn-toggle" style="font-size:10px;" onclick="toggleManual()">[守則]</button>
                    <div class="vol-group">
                        <button id="volBtn" class="vol-icon muted" onclick="toggleAudio()">🔈</button>
                        <input type="range" id="volRange" class="vol-range muted" min="0" max="1" step="0.05" value="0.5">
                    </div>
                    <button class="btn-toggle" style="font-size:10px;" onclick="toggleChat()">[留言板]</button>
                </div>
                <div class="room-info">
                    <button class="btn-danger" onclick="clearAllBosses()">一鍵清除</button>
                    <button style="background:none; color:#444;" onclick="location.reload()">退出</button>
                </div>
            </div>

            <div class="user-list-bar">
                在線:<span id="onlineCount" style="color:#0f0;">0</span> | <span id="onlineUsers">載入中...</span>
            </div>

            <div class="sort-row">
                <button id="sortGroupBtn" class="btn-toggle active" onclick="setSort('group')">群組排序</button>
                <button id="sortTimeBtn" class="btn-toggle" onclick="setSort('time')">時間排序</button>
                <button id="sortCountdownBtn" class="btn-toggle" onclick="setSort('countdown')">倒數排序</button>
                <button id="sortMapBtn" class="btn-toggle" onclick="setSort('map')">地圖排序</button>
            </div>

            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 分鐘/00X/時:分:秒">
            <div id="sectionsContainer"></div>

            <div id="chatSection" class="chat-section">
                <div id="chatBox" class="chat-box"></div>
                <div class="chat-input-group">
                    <input type="text" id="chatInput" class="chat-input" placeholder="留個言吧...">
                    <button class="btn-solid" style="padding:0 15px;" onclick="sendMessage()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI", authDomain: "tos-m-fb.firebaseapp.com", databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tos-m-fb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '', timers = {}, isAudioEnabled = false, currentSort = 'group';
        let timerPriority = 'overtime', myName = '無名戰友', colorMode = 1, showWarningIcon = true;

        function toggleManual() { const m = document.getElementById('manualModal'); const o = document.getElementById('modalOverlay'); const isShow = m.style.display === 'block'; m.style.display = isShow ? 'none' : 'block'; o.style.display = isShow ? 'none' : 'block'; }
        function toggleChat() { const c = document.getElementById('chatSection'); c.style.display = c.style.display === 'block' ? 'none' : 'block'; }
        function toggleAudio() { isAudioEnabled = !isAudioEnabled; const btn = document.getElementById('volBtn'), range = document.getElementById('volRange'); if (isAudioEnabled) { btn.innerText = '🔊'; btn.classList.remove('muted'); range.classList.remove('muted'); updateRangeBg(range); } else { btn.innerText = '🔈'; btn.classList.add('muted'); range.classList.add('muted'); range.style.background = '#222'; } }
        function updateRangeBg(r) { if (isAudioEnabled) { const v = r.value * 100; r.style.background = `linear-gradient(to right, #0f0 0%, #0f0 ${v}%, #333 ${v}%, #333 100%)`; } }
        document.getElementById('volRange').addEventListener('input', function() { updateRangeBg(this); });

        function startSession(id) {
            currentRoom = id; myName = document.getElementById('userNameInput').value.trim() || '無名戰友';
            document.getElementById('loginView').style.display = 'none'; document.getElementById('mainView').style.display = 'block';
            document.getElementById('displayID').innerText = id;
            document.getElementById('bossInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addBoss(); });
            document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            const myPresenceRef = db.ref(`rooms/${currentRoom}/users`).push(); myPresenceRef.set({ name: myName }); myPresenceRef.onDisconnect().remove();
            db.ref(`rooms/${currentRoom}/users`).on('value', s => { const users = Object.values(s.val() || {}); document.getElementById('onlineCount').innerText = users.length; document.getElementById('onlineUsers').innerText = users.map(u => u.name).join(', '); });
            db.ref(`rooms/${currentRoom}/bosses`).on('value', s => { window.currentData = s.val() || {}; renderList(); });
            db.ref(`rooms/${currentRoom}/messages`).limitToLast(15).on('value', s => { const chatBox = document.getElementById('chatBox'); chatBox.innerHTML = ''; const msgs = s.val() || {}; Object.values(msgs).forEach(m => { const d = new Date(m.time); chatBox.innerHTML += `<div><span class="msg-name">${m.user}</span>: ${m.text}</div>`; }); chatBox.scrollTop = chatBox.scrollHeight; });
        }

        function sendMessage() { const input = document.getElementById('chatInput'); const text = input.value.trim(); if (!text) return; db.ref(`rooms/${currentRoom}/messages`).push({ user: myName, text: text, time: Date.now() }); input.value = ''; }
        function saveBoss(map, ch, val) {
            const id = `${map}_${ch}`, old = window.currentData ? window.currentData[id] : null;
            let dv = val, tt = 0, flash = false;
            if (val.toUpperCase() === "ON") { dv = "ON"; flash = true; }
            else if (val.startsWith("00")) { const n = val.substring(2); dv = (val === "000" ? "000" : "階段" + (n.length > 1 ? n.split('').join('.') : n)); if (old && old.lastInput.startsWith("003") && val.startsWith("004")) flash = true; }
            else tt = Date.now() + (parseTime(val) * 60000);
            db.ref(`rooms/${currentRoom}/bosses/${id}`).set({ map, ch, targetTime: tt, lastInput: val, displayValue: dv, startTime: Date.now(), isFlash: flash });
            setTimeout(() => db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false), 5000);
        }

        function renderList() {
            const container = document.getElementById('sectionsContainer'); container.innerHTML = ''; Object.values(timers).forEach(clearInterval); timers = {};
            const all = Object.entries(window.currentData || {}), now = Date.now();
            const oneHour = 3600000;

            const stages = [], timersList = [], idleList = [];
            all.forEach(([id, b]) => {
                const elapsed = now - b.startTime;
                const isOverdueOneHour = b.targetTime > 0 && (now - b.targetTime > oneHour);
                const isStageOneHour = b.targetTime === 0 && (elapsed > oneHour);
                if (b.lastInput === "000" || isOverdueOneHour || isStageOneHour) idleList.push([id, b]);
                else if (b.targetTime > 0) timersList.push([id, b]);
                else stages.push([id, b]);
            });

            const render = (items, label, isTimer = false, isIdle = false) => {
                if (items.length === 0) return;
                const sec = document.createElement('div'); sec.className = 'grid-section';
                let controls = isTimer ? `<button class="btn-switch" onclick="toggleTimerPriority()">${timerPriority === 'overtime' ? '已超時優先' : '計時中優先'}</button>` : (isIdle ? '' : `<button class="btn-switch" onclick="toggleColorMode()">${colorMode === 1 ? '漸層' : '模式2'}</button><button class="btn-switch" onclick="toggleWarning()">${showWarningIcon ? '⚠️開' : '⚠️關'}</button>`);
                sec.innerHTML = `<div class="section-header"><div class="section-label">${label}</div>${controls}</div><div class="grid"></div>`;
                container.appendChild(sec); const grid = sec.querySelector('.grid');
                items.sort((a,b) => { const getC = (v) => v.targetTime > now ? 1 : (v.targetTime > 0 ? 2 : (v.displayValue === "ON" ? 3 : 4)); return getC(a[1]) - getC(b[1]) || a[1].targetTime - b[1].targetTime; }).forEach(([id, b]) => {
                    const card = document.createElement('div'); card.className = `card ${isIdle ? 'idle-card' : ''}`;
                    card.innerHTML = `<button class="del" onclick="deleteBoss('${id}')">×</button><h3 onclick="doEdit('${b.map}','${b.ch}','${b.lastInput}')">${b.map} - 分流${b.ch}</h3>
                        <div class="timer-container"><div class="timer ${b.isFlash ? 'flash-anim' : ''}" id="t_${id}">...</div>
                        ${(b.targetTime === 0 && !isIdle) ? `<button class="btn-next" id="btn_${id}" onclick="triggerNext('${b.map}','${b.ch}')">NEXT</button>` : ''}</div>`;
                    grid.appendChild(card); startTimer(id, b, isIdle);
                });
            };
            if (currentSort === 'map') render(all, "所有 BOSS"); else { render(stages, "階段追蹤區"); render(timersList, "重生計時區", true); render(idleList, "超時閒置區", false, true); }
        }

        function startTimer(id, b, isIdle) {
            const el = document.getElementById(`t_${id}`), btn = document.getElementById(`btn_${id}`);
            const up = () => {
                const now = Date.now();
                if (b.targetTime > 0) {
                    const d = Math.floor((b.targetTime - now) / 1000), a = Math.abs(d);
                    el.innerText = `${Math.floor(a/3600)}:${Math.floor((a%3600)/60).toString().padStart(2,'0')}:${(a%60).toString().padStart(2,'0')}`;
                    if (!isIdle) el.style.color = d <= 0 ? '#ff3300' : '#0f0';
                } else {
                    const m = Math.floor((now - b.startTime) / 60000), s = Math.floor(((now - b.startTime) % 60000) / 1000);
                    const lv = b.displayValue === "ON" ? 99 : parseFloat(b.lastInput.substring(2));
                    const isW = (lv < 2 && m >= 12) || (lv < 3 && lv >= 2 && m >= 7) || (lv < 4 && lv >= 3 && m >= 5) || (lv === 4 && m >= 3) || (lv === 99 && m >= 3);
                    el.innerHTML = `${b.displayValue} (${m}:${s.toString().padStart(2,'0')})${(showWarningIcon && isW && !isIdle) ? '<span class="warning-icon">⚠️</span>' : ''}`;
                    if (!isIdle) { let c = (colorMode === 1) ? (lv < 2 ? '#0f0' : lv < 3 ? '#adff2f' : lv < 4 ? '#ff0' : lv < 5 ? '#f90' : '#f00') : (lv >= 99 ? '#f00' : lv >= 4 ? '#f90' : '#ff0'); el.style.color = c; if (btn) { btn.style.color = c; btn.style.borderColor = c; } }
                }
            }; up(); timers[id] = setInterval(up, 1000);
        }

        function parseTime(v) { v = v.toLowerCase(); const p = v.split(/[:.：]/); if (p.length === 3) return parseInt(p[0])*60 + parseInt(p[1]) + parseInt(p[2])/60; if (p.length === 2) return parseInt(p[0])*60 + parseInt(p[1]); return parseFloat(v) || 0; }
        function addBoss() { const i = document.getElementById('bossInput'), p = i.value.trim().split(/\s+/); if (p.length >= 3) saveBoss(p[0], p[1], p[2]); i.value = ''; }
        function triggerNext(m, c) { db.ref(`rooms/${currentRoom}/bosses/${m}_${c}`).once('value', s => { const l = s.val().lastInput; if (l.toUpperCase()==="ON") saveBoss(m,c,""); else if (l.startsWith("00")) { let v = parseInt(l.substring(2,3)); saveBoss(m,c,v>=4?"ON":"00"+(v+1)); } }); }
        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }
        function clearAllBosses() { if(confirm("確定清除此房間所有資料？")) db.ref(`rooms/${currentRoom}/bosses`).remove(); }
        function copyRoomID() { const t = document.createElement('textarea'); t.value = currentRoom; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('房號已複製'); }
        function joinRoom() { const i = document.getElementById('roomInput').value.trim().toUpperCase(); if (i) startSession(i); }
        function createRoom() { const i = Math.random().toString(36).substring(2, 8).toUpperCase(); startSession(i); }
        function setSort(t) { currentSort = t; document.querySelectorAll('.btn-toggle').forEach(b => b.classList.toggle('active', b.id === `sort${t.charAt(0).toUpperCase()+t.slice(1)}Btn`)); renderList(); }
        function toggleColorMode() { colorMode = colorMode === 1 ? 2 : 1; renderList(); }
        function toggleWarning() { showWarningIcon = !showWarningIcon; renderList(); }
        function toggleTimerPriority() { timerPriority = timerPriority === 'overtime' ? 'countdown' : 'overtime'; renderList(); }
    </script>
</body>
</html>
