<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME v1.5.6</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --bg-card: #111; --bg-card-compact: #0e0e0e;
            --border: #222; --border-dashed: #333; --border-actions: #1a1a1a;
            --text-title: #aaa; --text-del: #333; --text-updater: #333;
            --text-elapsed: #888; --section-label-color: #555;
            --section-border-color: #333; --notice-bg: #111;
            --notice-border: #333; --notice-text: #aaa;
            --pin-border: #444; --pin-bg: #1a1a1a; --pin-color: #666;
            --call-idle-border: #444; --call-idle-bg: #1a1a1a; --call-idle-color: #555;
            --max-btn-border: #444; --max-btn-bg: #1a1a1a; --max-btn-color: #555;
            --max-badge-bg: #00243a; --max-badge-border: #00aaff; --max-badge-color: #00aaff;
            --btn-next-bg: #000; --input-bg: #050505; --input-border: #0f0;
            --log-bg: #0a0a0a; --log-border: #1a1a1a; --sort-btn-bg: #222;
            --sort-btn-color: #888; --sort-btn-border: #444;
            --chat-bg: #0a0a0a; --chat-border: #1a1a1a; --chat-msg-bg: #141414;
        }
        body.light {
            --bg: #f0ede6; --bg-card: #fff; --bg-card-compact: #fafaf8;
            --border: #ddd; --border-dashed: #ccc; --border-actions: #e8e8e8;
            --text-title: #333; --text-del: #bbb; --text-updater: #bbb;
            --text-elapsed: #999; --section-label-color: #999;
            --section-border-color: #ccc; --notice-bg: #fff;
            --notice-border: #ddd; --notice-text: #555;
            --pin-border: #bbb; --pin-bg: #f5f5f5; --pin-color: #aaa;
            --call-idle-border: #bbb; --call-idle-bg: #f5f5f5; --call-idle-color: #aaa;
            --max-btn-border: #bbb; --max-btn-bg: #f5f5f5; --max-btn-color: #aaa;
            --max-badge-bg: #ddf0ff; --max-badge-border: #0088cc; --max-badge-color: #0066aa;
            --btn-next-bg: #f5f5f5; --input-bg: #fff; --input-border: #1a7a1a;
            --log-bg: #f5f5f5; --log-border: #ddd; --sort-btn-bg: #eee;
            --sort-btn-color: #666; --sort-btn-border: #ccc;
            --chat-bg: #f8f8f6; --chat-border: #e0e0e0; --chat-msg-bg: #efefed;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; transition: background 0.25s; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .card { background: var(--bg-card); padding: 12px 12px 8px; border-radius: 8px; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.25s; }
        
        /* 標題與虛線修正 */
        .card-title-row { display: flex; align-items: center; gap: 5px; padding-right: 18px; margin-bottom: 6px; }
        .card h3 { 
            margin: 0; color: var(--text-title); font-size: 15px; font-weight: bold; cursor: pointer; 
            line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-bottom: 1px dashed var(--border-dashed); /* 虛線僅在標題下 */
            padding-bottom: 1px;
        }

        /* 人數獨立顯示與編輯 */
        .member-count-wrapper { font-size: 11px; color: #777; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: 0.2s; white-space: nowrap; }
        .member-count-wrapper:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .member-count-input { width: 35px; background: #000; border: 1px solid #0f0; color: #fff; font-size: 11px; text-align: center; border-radius: 3px; outline: none; }

        .elapsed-row { font-size: 13px; font-family: monospace; opacity: 0.9; display: flex; align-items: baseline; gap: 4px; min-height: 16px; }
        .del { position: absolute; top: 6px; right: 6px; color: var(--text-del); background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px; }
        
        /* 其他樣式略過 (與之前一致) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .stage-label { font-size: 18px; font-weight: bold; }
        .max-badge { display: inline-block; font-size: 10px; font-weight: 900; color: var(--max-badge-color); background: var(--max-badge-bg); border: 1px solid var(--max-badge-border); border-radius: 4px; padding: 0 4px; animation: max-pulse 2s infinite; cursor: pointer; }
        @keyframes max-pulse { 0%,100%{opacity:1;box-shadow:0 0 4px rgba(0,170,255,0.4);} 50%{opacity:0.75;box-shadow:0 0 10px rgba(0,170,255,0.9);} }
    </style>
</head>
<body>
    <div id="renderArea"></div>

<script>
// Firebase Config ... (略)

function renderList() {
    const area = document.getElementById('renderArea'); if (!area) return;
    area.innerHTML = '';
    const all = Object.entries(window.currentData);
    
    const drawBox = (items, label) => {
        if (!items.length) return;
        const sec = document.createElement('div'); sec.className = 'grid-section';
        sec.innerHTML = `<div class="section-label">${label}</div><div class="grid"></div>`;
        area.appendChild(sec); const grid = sec.querySelector('.grid');

        items.forEach(([id, b]) => {
            const st = getBossStatus(b, id);
            const card = document.createElement('div');
            card.className = `card ${st.isGrey?'idle-card':''}`;
            
            // 人數顯示邏輯：獨立的 wrapper
            const memberHtml = b.isMax 
                ? `<span class="max-badge" onclick="enterMemberEdit(event, '${id}')">MAX</span>`
                : `<span class="member-count-wrapper" onclick="enterMemberEdit(event, '${id}')">${b.memberCount || 0}/30</span>`;

            card.innerHTML = `
                <button class="del" onclick="handleDelClick('${id}')">×</button>
                <div class="card-title-row">
                    <h3 id="h3_${id}" onclick="enterInlineEdit('${id}')">${b.map} - ${b.ch}</h3>
                    <div id="member_area_${id}">${memberHtml}</div>
                </div>
                <div class="timer-container">
                    <div class="stage-row"><span class="stage-label" style="color:${st.color}">${b.displayValue}</span></div>
                    <div class="elapsed-row" id="e_${id}"></div>
                </div>
                <div class="card-actions">
                    <button class="pin-btn ${st.pinned?'pinned':''}" onclick="togglePin('${id}')">★</button>
                    <button class="max-btn ${b.isMax?'maxed':''}" onclick="toggleMax('${id}')">M</button>
                    <span class="updater-txt">${b.updater || ''}</span>
                </div>`;
            grid.appendChild(card);
        });
    };
    drawBox(sortItems(all), "全部地圖");
}

/* ════════ 人數獨立編輯 ════════ */
function enterMemberEdit(e, id) {
    e.stopPropagation();
    const b = window.currentData[id];
    const area = document.getElementById(`member_area_${id}`);
    
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'member-count-input';
    input.value = b.memberCount || 0;
    
    area.innerHTML = '';
    area.appendChild(input);
    input.select(); // 自動全選

    const save = () => {
        let val = parseInt(input.value) || 0;
        if (val < 0) val = 0;
        const isMax = val >= 30;
        db.ref(`rooms/${currentRoom}/bosses/${id}`).update({
            memberCount: val,
            isMax: isMax
        });
        renderList();
    };

    input.onblur = save;
    input.onkeydown = (ev) => { if(ev.key === 'Enter') save(); };
}

/* ════════ 地圖資訊編輯 (不含人數) ════════ */
function enterInlineEdit(id) {
    const b = window.currentData[id];
    const h3 = document.getElementById(`h3_${id}`);
    const originalText = h3.innerText;
    h3.style.display = 'none';

    const input = document.createElement('input');
    input.className = 'inline-input';
    input.value = `${b.map} ${b.ch} ${b.lastInput}`;
    h3.parentNode.insertBefore(input, h3);
    input.focus();

    const save = () => {
        const p = input.value.trim().split(/\s+/);
        if (p.length >= 3) saveBoss(p[0], p[1], p.slice(2).join(' '));
        renderList();
    };
    input.onblur = save;
    input.onkeydown = (ev) => { if(ev.key === 'Enter') save(); };
}

// saveBoss 內部邏輯也要確保不會誤傷 memberCount (除非是 DE/計時狀態)
function saveBoss(map, ch, val) {
    // ... (前段解析 dv, tt 邏輯不變)
    const updatePayload = {
        map, ch, targetTime: tt, lastInput: uv, displayValue: dv,
        startTime: Date.now(), updater: myName
    };
    // 只有進入計時或擊殺，才重置人數
    if (tt > 0 || uv.startsWith("DE")) {
        updatePayload.memberCount = 0;
        updatePayload.isMax = false;
    }
    db.ref(`rooms/${currentRoom}/bosses/${map}_${ch}`).update(updatePayload);
}
</script>
</body>
</html>
