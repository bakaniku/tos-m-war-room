<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME v1.5.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --bg-card: #111; --bg-card-compact: #0e0e0e;
            --border: #222; --border-dashed: #333; --border-actions: #1a1a1a;
            --text-title: #aaa; --text-del: #333; --text-updater: #333;
            --text-elapsed: #666; --section-label-color: #555;
            --section-border-color: #333; --notice-bg: #111;
            --notice-border: #333; --notice-text: #aaa;
            --pin-border: #444; --pin-bg: #1a1a1a; --pin-color: #666;
            --call-idle-border: #444; --call-idle-bg: #1a1a1a; --call-idle-color: #555;
            --max-btn-border: #444; --max-btn-bg: #1a1a1a; --max-btn-color: #555;
            --max-badge-bg: #00243a; --max-badge-border: #00aaff; --max-badge-color: #00aaff;
            --btn-next-bg: #000; --input-bg: #050505; --input-border: #0f0;
            --log-bg: #0a0a0a; --log-border: #1a1a1a; --sort-btn-bg: #222;
            --sort-btn-color: #888; --sort-btn-border: #444;
            --chat-bg: #0a0a0a; --chat-border: #1a1a1a; --chat-msg-bg: #141414;
        }
        body.light {
            --bg: #f0ede6; --bg-card: #fff; --bg-card-compact: #fafaf8;
            --border: #ddd; --border-dashed: #ccc; --border-actions: #e8e8e8;
            --text-title: #333; --text-del: #bbb; --text-updater: #bbb;
            --text-elapsed: #999; --section-label-color: #999;
            --section-border-color: #ccc; --notice-bg: #fff;
            --notice-border: #ddd; --notice-text: #555;
            --pin-border: #bbb; --pin-bg: #f5f5f5; --pin-color: #aaa;
            --call-idle-border: #bbb; --call-idle-bg: #f5f5f5; --call-idle-color: #aaa;
            --max-btn-border: #bbb; --max-btn-bg: #f5f5f5; --max-btn-color: #aaa;
            --max-badge-bg: #ddf0ff; --max-badge-border: #0088cc; --max-badge-color: #0066aa;
            --btn-next-bg: #f5f5f5; --input-bg: #fff; --input-border: #1a7a1a;
            --log-bg: #f5f5f5; --log-border: #ddd; --sort-btn-bg: #eee;
            --sort-btn-color: #666; --sort-btn-border: #ccc;
            --chat-bg: #f8f8f6; --chat-border: #e0e0e0; --chat-msg-bg: #efefed;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; transition: background 0.25s; overflow-x: hidden; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* 卡片佈局優化 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: var(--bg-card); padding: 12px 12px 8px; border-radius: 8px; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        /* 標題對齊與判定範圍修正 */
        .card-title-row { 
            display: flex; align-items: center; justify-content: flex-start;
            margin-bottom: 4px; height: 26px; width: 100%;
            border-bottom: 1px dashed var(--border-dashed); /* 虛線留在這一層 */
        }
        .card h3 { 
            margin: 0; color: var(--text-title); font-size: 15px; font-weight: bold; 
            cursor: pointer; line-height: 26px; white-space: nowrap; 
            display: inline-flex; align-items: center; 
            max-width: fit-content; /* 關鍵：讓判定範圍僅隨文字寬度 */
        }
        .member-count { font-size: 11px; margin-left: 4px; color: #777; font-weight: normal; }
        .inline-edit-input { width: 100%; font-size: 14px; padding: 2px 4px; border: 1px solid #0f0; background: #000; color: #fff; outline: none; height: 22px; }

        /* 計時文字亮度 0.9 */
        .elapsed-row { font-size: 13px; font-family: monospace; opacity: 0.9; display: flex; align-items: baseline; gap: 4px; min-height: 16px; margin-top: 2px; }
        .timer-container { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 45px; }
        .stage-row { display: flex; align-items: center; gap: 6px; height: 28px; }
        .stage-label { font-size: 18px; font-weight: bold; }
        
        /* 其餘樣式維持 */
        .del { position: absolute; top: 6px; right: 6px; color: var(--text-del); background: none; border: none; font-size: 15px; cursor: pointer; }
        .card-actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border-actions); }
        .btn-next { background: var(--btn-next-bg); font-size: 11px; padding: 3px 8px; border-radius: 5px; border: 2px solid; cursor: pointer; }
        .max-badge { font-size: 10px; font-weight: 900; color: var(--max-badge-color); background: var(--max-badge-bg); border: 1px solid var(--max-badge-border); border-radius: 4px; padding: 0 4px; margin-left: 4px; }
    </style>
</head>
<body>
<div id="app">
    <div id="mainView">
        <div id="renderArea"></div>
    </div>
</div>

<script>
// Firebase 初始化與全域變數保持不變...
const db = firebase.database();
let currentRoom = '', timers = {}, currentSort = 'time';
// ... (其餘邏輯變數)

function renderList() {
    const area = document.getElementById('renderArea'); if (!area) return;
    area.innerHTML = ''; Object.values(timers).forEach(clearInterval); timers = {};
    const all = Object.entries(window.currentData);
    
    const drawBox = (items, label, collapsible = false) => {
        if (!items.length) return;
        const sec = document.createElement('div'); sec.className = 'grid-section';
        sec.innerHTML = `<div class="section-label">${label}</div><div class="grid"></div>`;
        area.appendChild(sec); const grid = sec.querySelector('.grid');
        
        items.forEach(([id, b]) => {
            const st = getBossStatus(b, id);
            const card = document.createElement('div');
            card.className = `card ${st.isGrey?'idle-card':''}`;
            
            // 修正：標題判定範圍僅限 H3 內部，不包含整條虛線
            const countDisplay = b.isMax ? '<span class="max-badge">MAX</span>' : (b.memberCount > 0 ? `<span class="member-count">${b.memberCount}</span>` : '');
            
            card.innerHTML = `
                <button class="del" onclick="handleDelClick('${id}')">×</button>
                <div class="card-title-row" id="title_${id}">
                    <h3 id="h3_${id}" onclick="enterInlineEdit('${id}')">${b.map} - ${b.ch} ${countDisplay}</h3>
                </div>
                <div class="timer-container">
                    <div class="stage-row">
                        <span class="stage-label" id="t_${id}" style="color:${st.color}">${b.displayValue}</span>
                        ${(b.targetTime === 0 && st.weight !== 7) ? `<button class="btn-next" onclick="triggerNext('${b.map}','${b.ch}')">NEXT</button>` : ''}
                    </div>
                    <div class="elapsed-row" id="e_${id}"></div>
                </div>
                <div class="card-actions">
                    <button class="pin-btn ${st.pinned?'pinned':''}" onclick="togglePin('${id}')">★</button>
                    <button class="max-btn ${b.isMax?'maxed':''}" onclick="toggleMax('${id}')">M</button>
                    ${b.updater?`<span class="updater-txt">${b.updater}</span>`:''}
                </div>`;
            grid.appendChild(card);
            startTimer(id, b, st.isGrey, st.color);
        });
    };
    // 執行分組與排序邏輯...
    drawBox(sortItems(all), "全部地圖");
}

function enterInlineEdit(id) {
    const b = window.currentData[id];
    const titleRow = document.getElementById(`title_${id}`);
    const h3 = document.getElementById(`h3_${id}`);
    h3.style.display = 'none';

    const input = document.createElement('input');
    input.className = 'inline-edit-input';
    input.value = `${b.map} ${b.ch} ${b.lastInput} ${b.memberCount || ''}`.trim();
    titleRow.appendChild(input);
    input.focus({ preventScroll: true });

    const save = () => {
        const p = input.value.trim().split(/\s+/);
        if (p.length >= 3) saveBoss(p[0], p[1], p.slice(2).join(' '));
        renderList();
    };
    input.onblur = save;
    input.onkeydown = (e) => { if(e.key==='Enter') save(); if(e.key==='Escape') renderList(); };
}

// 剩餘邏輯 (startTimer, saveBoss 等) 延續 v1.5.4 並確保 opacity 為 0.9...
function startTimer(id, b, isGrey, statusColor) {
    const up = () => {
        const stageEl = document.getElementById(`t_${id}`), elapsedEl = document.getElementById(`e_${id}`);
        if (!stageEl) return;
        const now = Date.now();
        // ... (計時邏輯)
        if (elapsedEl) elapsedEl.style.opacity = "0.9"; // 確保亮度提高
    };
    setInterval(up, 1000);
}
</script>
</body>
</html>
