<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME v1.5.4</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000;
            --bg-card: #111;
            --bg-card-compact: #0e0e0e;
            --border: #222;
            --border-dashed: #333;
            --border-actions: #1a1a1a;
            --text-title: #aaa;
            --text-del: #333;
            --text-updater: #333;
            --text-elapsed: #666;
            --section-label-color: #555;
            --section-border-color: #333;
            --notice-bg: #111;
            --notice-border: #333;
            --notice-text: #aaa;
            --pin-border: #444;
            --pin-bg: #1a1a1a;
            --pin-color: #666;
            --call-idle-border: #444;
            --call-idle-bg: #1a1a1a;
            --call-idle-color: #555;
            --max-btn-border: #444;
            --max-btn-bg: #1a1a1a;
            --max-btn-color: #555;
            --max-badge-bg: #00243a;
            --max-badge-border: #00aaff;
            --max-badge-color: #00aaff;
            --btn-next-bg: #000;
            --input-bg: #050505;
            --input-border: #0f0;
            --log-bg: #0a0a0a;
            --log-border: #1a1a1a;
            --sort-btn-bg: #222;
            --sort-btn-color: #888;
            --sort-btn-border: #444;
            --chat-bg: #0a0a0a;
            --chat-border: #1a1a1a;
            --chat-msg-bg: #141414;
        }
        body.light {
            --bg: #f0ede6;
            --bg-card: #fff;
            --bg-card-compact: #fafaf8;
            --border: #ddd;
            --border-dashed: #ccc;
            --border-actions: #e8e8e8;
            --text-title: #333;
            --text-del: #bbb;
            --text-updater: #bbb;
            --text-elapsed: #999;
            --section-label-color: #999;
            --section-border-color: #ccc;
            --notice-bg: #fff;
            --notice-border: #ddd;
            --notice-text: #555;
            --pin-border: #bbb;
            --pin-bg: #f5f5f5;
            --pin-color: #aaa;
            --call-idle-border: #bbb;
            --call-idle-bg: #f5f5f5;
            --call-idle-color: #aaa;
            --max-btn-border: #bbb;
            --max-btn-bg: #f5f5f5;
            --max-btn-color: #aaa;
            --max-badge-bg: #ddf0ff;
            --max-badge-border: #0088cc;
            --max-badge-color: #0066aa;
            --btn-next-bg: #f5f5f5;
            --input-bg: #fff;
            --input-border: #1a7a1a;
            --log-bg: #f5f5f5;
            --log-border: #ddd;
            --sort-btn-bg: #eee;
            --sort-btn-color: #666;
            --sort-btn-border: #ccc;
            --chat-bg: #f8f8f6;
            --chat-border: #e0e0e0;
            --chat-msg-bg: #efefed;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; transition: background 0.25s; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .ver-info { color: #444; font-size: 10px; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 11px; padding: 5px 10px; border-radius: 6px; }
        .btn-toggle { background: var(--sort-btn-bg); color: var(--sort-btn-color); font-size: 12px; padding: 5px 10px; border: 1px solid var(--sort-btn-border); }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        body.light .btn-toggle.active { background: #d0f0d0; color: #1a7a1a; border-color: #1a7a1a; }
        .copy-icon { width: 18px; height: 18px; min-width: 18px; vertical-align: middle; cursor: pointer; opacity: 0.7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; line-height: 1; }
        .audio-controls { display: flex; align-items: center; gap: 5px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; height: 32px; box-sizing: border-box; }
        .audio-btn { background: none; color: #0f0; padding: 0; font-size: 14px; cursor: pointer; border: none; opacity: 0.3; transition: 0.2s; }
        .audio-btn.active { opacity: 1; }
        .vol-range { -webkit-appearance: none; width: 60px; height: 4px; background: #333; border-radius: 2px; outline: none; margin: 0 5px; background-image: linear-gradient(#0f0, #0f0); background-repeat: no-repeat; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #0f0; border-radius: 50%; cursor: pointer; border: 2px solid #111; }
        .user-list-bar { font-size: 12px; color: #555; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .notice-bar { background: var(--notice-bg); border-radius: 6px; padding: 5px 10px; border: 1px solid var(--notice-border); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; min-height: 28px; }
        .notice-icon { color: #0af; font-size: 14px; flex-shrink: 0; }
        body.light .notice-icon { color: #0077bb; }
        .notice-text { font-size: 12px; color: var(--notice-text); margin: 0; line-height: 1.4; flex: 1; white-space: pre-wrap; word-break: break-all; }
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid var(--input-border); background: var(--input-bg); margin-bottom: 5px; font-size: 16px; color: var(--text-title); padding: 8px 0; box-sizing: border-box; }
        .input-hint { font-size: 11px; color: #888; margin-bottom: 15px; transition: color 0.2s; }
        .input-hint.warning { color: #f33; font-weight: bold; }
        .btn-next { background: var(--btn-next-bg); font-size: 11px; font-weight: bold; padding: 3px 9px; border-radius: 5px; cursor: pointer; display: inline-block; border: 2px solid; flex-shrink: 0; vertical-align: baseline; }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.5); }

        /* 亮色模式覆蓋 */
        body.light { color: #333; }
        body.light input[type=text] { background: #fff; border-color: #ddd; color: #333; }
        body.light .room-id { color: #3d7440 !important; }
        body.light #onlineCount { color: #3d7440 !important; }
        body.light .copy-icon path, body.light .copy-icon rect { stroke: #3d7440 !important; }
        body.light .audio-controls { background: #d6cbb6; border-color: #c4b89e; }
        body.light .audio-btn { color: #5a4a2a; }
        body.light .btn-danger { background: #d6cbb6; color: #8a3a00; border: 1px solid #c4a882; }
        body.light .chat-input-row button { background: #d6efd3; color: #437a41; border: 1px solid #437a41; font-weight: bold; }
        body.light .log-boss-name { color: #8c8c8c !important; }
        body.light .notice-text { color: #585858 !important; }
        body.light .user-list-bar { color: #999; border-bottom-color: #ddd; }
        body.light .version-tag { color: #bbb; }
        body.light #logPanel { background: #f5f5f2 !important; border-color: #ddd !important; }
        body.light #logPanel > div:first-child { background: #eeecea !important; color: #555 !important; }
        body.light #logList { color: #555; }
        body.light .log-modal-box { background: #fff; border-color: #ddd; }
        body.light .log-modal-header { border-bottom-color: #eee; color: #3d7440; }
        body.light .log-modal-body .log-entry { border-bottom-color: #eee; }
        body.light #noticeEditArea { background: #f5f5f2 !important; border-color: #ddd !important; }
        body.light #noticeInput { background: #fff !important; border-color: #ddd !important; color: #333 !important; }
        body.light .elapsed-row { color: #999; opacity: 0.9; }
        body.light .log-new-val { color: #437a41 !important; }
        body.light .top-editor { color: #cc3300 !important; }
        body.light .card.idle-card { background: #e8e5e0 !important; border-color: #ccc !important; }
        body.light .card.idle-card h3, body.light .card.idle-card .member-count { color: #bcbcbc !important; }
        body.light .card.idle-card .stage-label, body.light .card.idle-card .elapsed-row, body.light .card.idle-card .updater-txt { color: #bcbcbc !important; }
        body.light .card.idle-card .btn-next { color: #bcbcbc !important; border-color: #bcbcbc !important; background: transparent !important; }
        
        /* 視覺回饋與人數顯示 */
        .member-count { font-size: 11px; margin-left: 4px; color: #777; font-weight: normal; }
        .inline-edit-input { width: 100%; font-size: 14px; padding: 4px; border: 1px solid #0f0; background: #000; color: #fff; border-radius: 4px; box-sizing: border-box; outline: none; }
        body.light .inline-edit-input { background: #fff; color: #333; border-color: #1a7a1a; }

        .sort-row { margin: 10px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        .grid-section { margin-bottom: 30px; }
        .section-label { color: var(--section-label-color); font-size: 11px; border-left: 2px solid var(--section-border-color); padding-left: 8px; text-transform: uppercase; margin-bottom: 10px; }
        .section-label.collapsible { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
        .section-label.collapsible .collapse-arrow { font-size: 9px; transition: transform 0.2s; display: inline-block; }
        .section-label.collapsible.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .collapsible-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; }
        .collapsible-body.collapsed { max-height: 0 !important; opacity: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: var(--bg-card); padding: 12px 12px 8px; border-radius: 8px; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; transition: background 0.25s, border-color 0.25s; }
        .card.compact { padding: 8px 12px 6px; background: var(--bg-card-compact); }
        .card-title-row { display: flex; align-items: center; gap: 5px; margin-bottom: 0; padding-right: 18px; height: 24px; }
        .card h3 { margin: 0; color: var(--text-title); font-size: 15px; font-weight: bold; cursor: pointer; border-bottom: 1px dashed var(--border-dashed); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .del { position: absolute; top: 6px; right: 6px; color: var(--text-del); background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px; line-height: 1; }
        .timer-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 6px; gap: 2px; }
        .stage-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap; }
        .stage-label { font-size: 18px; font-weight: bold; font-family: sans-serif; white-space: nowrap; }
        .stage-label.flash-anim { animation: flash 0.5s step-end 10; }
        @keyframes flash { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .elapsed-row { font-size: 13px; font-family: monospace; opacity: 0.9; display: flex; align-items: baseline; gap: 4px; min-height: 16px; }
        .stage-label.countdown { font-family: monospace; }
        .card-actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border-actions); }
        .card-actions .updater-txt { margin-left: auto; font-size: 10px; color: var(--text-updater); white-space: nowrap; }
        .pin-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--pin-border); background: var(--pin-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 11px; color: var(--pin-color); transition: 0.2s; flex-shrink: 0; }
        .pin-btn.pinned { border-color: #ffca28; background: #2a2200; color: #ffca28; box-shadow: 0 0 5px rgba(255,202,40,0.3); }
        #chatPanel { margin-bottom: 15px; background: var(--chat-bg); border: 1px solid var(--chat-border); border-radius: 10px; overflow: hidden; transition: all 0.3s ease; }
        .chat-msgs { overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        #chatPanel.chat-mini .chat-msgs { height: 50px; }
        #chatPanel.chat-full .chat-msgs { height: 150px; }
        .msg-row { display: flex; gap: 8px; align-items: center; }
        .msg-name { font-size: 11px; color: #0f0; min-width: 48px; white-space: nowrap; }
        .msg-name.self { color: #0af; }
        .msg-bubble { font-size: 13px; color: #ccc; background: var(--chat-msg-bg); border-radius: 6px; padding: 5px 9px; max-width: 80%; word-break: break-all; }
        .chat-input-row { display: flex; border-top: 1px solid var(--chat-border); align-items: stretch; }
        .chat-input-row input { flex: 1; background: var(--chat-bg); border: none; color: var(--text-title); padding: 8px 12px; font-size: 12px; outline: none; }
        .chat-input-row button { background: #0f0; color: #000; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .call-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--call-idle-border); background: var(--call-idle-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 12px; color: var(--call-idle-color); transition: 0.2s; flex-shrink: 0; }
        .call-btn.priority-1 { border-color: #ff3300; background: #300800; color: #ff3300; box-shadow: 0 0 7px rgba(255,51,0,0.6); }
        .call-btn.priority-2 { border-color: #ff8800; background: #301a00; color: #ff8800; box-shadow: 0 0 7px rgba(255,136,0,0.6); }
        .max-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--max-btn-border); background: var(--max-btn-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 10px; font-weight: 900; font-family: sans-serif; color: var(--max-btn-color); transition: 0.2s; flex-shrink: 0; }
        .max-btn.maxed { border-color: #00aaff; background: #00243a; color: #00aaff; box-shadow: 0 0 7px rgba(0,170,255,0.6); }
        .max-badge { display: inline-block; font-size: 10px; font-weight: 900; color: var(--max-badge-color); background: var(--max-badge-bg); border: 1px solid var(--max-badge-border); border-radius: 4px; padding: 0 4px; vertical-align: middle; animation: max-pulse 2s infinite; }
        @keyframes max-pulse { 0%,100%{ opacity:1; box-shadow:0 0 4px rgba(0,170,255,0.4); } 50%{ opacity:0.75; box-shadow:0 0 10px rgba(0,170,255,0.9); } }
        .card.calling-1 { border: 2px solid #ff3300 !important; animation: cpulse1 1.5s infinite; }
        .card.calling-2 { border: 2px solid #ff8800 !important; animation: cpulse2 1.5s infinite; }
        @keyframes cpulse1 { 0%  { box-shadow:0 0 5px #ff3300; } 50% { box-shadow:0 0 20px #ff3300; background:#1e0000; } 100%{ box-shadow:0 0 5px #ff3300; } }
        @keyframes cpulse2 { 0%  { box-shadow:0 0 5px #ff8800; } 50% { box-shadow:0 0 20px #ff8800; background:#1e0e00; } 100%{ box-shadow:0 0 5px #ff8800; } }
        .top-editor { display:inline-block; padding:0 4px; border-radius:4px; animation:editor-glow 2s infinite; font-weight:bold!important; }
        @keyframes editor-glow { 0%  { box-shadow:0 0 2px #c85a22; text-shadow:0 0 2px #c85a22; } 50% { box-shadow:0 0 10px #d95c2a; text-shadow:0 0 6px #d95c2a; background:rgba(217,92,42,0.12); } 100%{ box-shadow:0 0 2px #c85a22; text-shadow:0 0 2px #c85a22; } }
        #logModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; }
        #logModal.show { display:flex; }
        .log-modal-box { background:#111; border:1px solid #333; border-radius:12px; width:90%; max-width:560px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
        .log-modal-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #222; font-size:13px; color:#0f0; }
        .log-modal-body { overflow-y:auto; padding:10px 14px; font-size:11px; font-family:monospace; line-height:1.8; flex:1; }
        .log-modal-body .log-entry { border-bottom:1px solid #1a1a1a; padding:3px 0; }
    </style>
</head>
<body>
<div id="app">
    <div id="loginView" class="login-view">
        <div class="title">TOS M FB TIME</div>
        <div class="ver-info">v1.5.4</div>
        <div class="input-group">
            <input type="text" id="userNameInput" placeholder="你的稱呼" maxlength="10" oninput="this.value=this.value.replace('#','')">
            <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
            <input type="text" id="roomInput" placeholder="輸入房號" maxlength="6">
            <button class="btn-solid" onclick="joinRoom()">進入房間</button>
        </div>
    </div>

    <div id="mainView" style="display:none;">
        <div class="header">
            <div class="room-info">
                <span class="room-id" id="displayID"></span>
                <svg class="copy-icon" onclick="copyRoomID()" viewBox="0 0 24 24" fill="none" stroke="#0f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <div class="audio-controls">
                    <button id="voiceBtn" class="audio-btn" onclick="toggleVoice()">🔊</button>
                    <input type="range" id="volRange" class="vol-range" min="0" max="1" step="0.01" value="0.5" oninput="updateVolBg(this)">
                    <button id="onSfxBtn" title="ON 重生音效" class="audio-btn" onclick="toggleOnSfx()">📢</button>
                    <button id="r4SfxBtn" title="階段4音效" class="audio-btn" onclick="toggleR4Sfx()">🛡️</button>
                    <button id="warnBtn" class="audio-btn" onclick="toggleWarn()">⚠️</button>
                    <button id="pinAlertBtn" class="audio-btn" onclick="togglePinAlert()" title="置頂提醒：開啟後語音/閃爍只提醒置頂卡片">📌</button>
                    <button id="colorModeBtn" class="audio-btn active" onclick="toggleColorMode()">🎨</button>
                    <span class="chat-wrap" style="position:relative;">
                        <button id="chatBtn" class="audio-btn active" onclick="toggleChat()">💬</button>
                        <span id="chatDot" class="chat-dot"></span>
                        <button id="logBtn" title="切換紀錄顯示" class="audio-btn active" onclick="cycleLogMode()">📜 <span id="logBtnText" style="font-size:10px;">3</span></button>
                    </span>
                </div>
            </div>
            <div class="room-info">
                <span class="version-tag">v1.5.4</span>
                    <button id="themeBtn" onclick="toggleTheme()" style="background:none; border:1px solid #444; color:#888; font-size:11px; padding:3px 10px; border-radius:12px; cursor:pointer;">☀️ 亮色</button>
                <button class="btn-danger" id="clearAllBtn" onclick="clearAllBosses()" style="display:none;">一鍵清除</button>
                <button style="background:none;color:#444;" onclick="location.reload()">退出</button>
            </div>
        </div>

        <div class="user-list-bar">在線:<span id="onlineCount" style="color:#0f0;">0</span> | <span id="onlineUsers">載入中...</span></div>

        <div id="noticeBar" class="notice-bar">
            <span class="notice-icon">📢</span>
            <span id="noticeText" class="notice-text">（尚無公告）</span>
            <button id="noticeEditBtn" onclick="toggleNoticeEdit()" style="display:none; background:none; border:1px solid #444; color:#888; font-size:10px; padding:2px 7px; border-radius:4px; cursor:pointer; margin-left:auto; flex-shrink:0;">編輯</button>
        </div>
        <div id="noticeEditArea" style="display:none;">
            <textarea id="noticeInput" maxlength="120" rows="2" style="width:100%; background:#000; border:1px solid #333; color:#fff; font-size:13px; padding:6px; border-radius:4px; resize:none; box-sizing:border-box; outline:none;"></textarea>
            <div style="display:flex; gap:8px; margin-top:6px; justify-content:flex-end;">
                <button onclick="saveNotice()" style="background:#0f0; color:#000; border:none; padding:4px 14px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:12px;">儲存</button>
                <button onclick="toggleNoticeEdit()" style="background:none; border:1px solid #444; color:#888; padding:4px 10px; border-radius:5px; cursor:pointer; font-size:12px;">取消</button>
            </div>
        </div>

        <div id="chatPanel" class="chat-full">
            <div class="chat-msgs" id="chatMsgs"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="輸入訊息…" maxlength="80">
                <button onclick="sendMsg()">送出</button>
            </div>
        </div>

        <div class="sort-row">
            <button id="sortTimeBtn" class="btn-toggle active" onclick="setSort('time')">時間排序</button>
            <button id="sortGroupBtn" class="btn-toggle" onclick="setSort('group')">分組排序</button>
            <button id="sortMapBtn" class="btn-toggle" onclick="setSort('map')">地圖排序</button>
        </div>

        <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 階段(R)/分鐘" oninput="checkDuplicate()">
        <div class="input-hint" id="inputHint">範例：80 3 R1.5 ｜ 80 3 0015 ｜ 80 3 12:30 ｜ 80 3 ON</div>

        <div id="logPanel" style="display:none; background:#0a0a0a; border:1px solid #1a1a1a; border-radius:10px; overflow:hidden; margin-bottom:15px;">
            <div style="padding:8px 12px; font-size:12px; color:#0f0; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <span>📜 最近編輯紀錄</span>
                <button onclick="viewFullLogs()" style="background:none;border:1px solid #444;color:#888;font-size:10px;padding:2px 6px;border-radius:4px;cursor:pointer;">查看完整 100 則</button>
            </div>
            <div id="logList" style="max-height:180px; overflow-y:auto; padding:10px; font-size:11px; line-height:1.6; font-family:monospace;"></div>
        </div>

        <div id="renderArea"></div>
    </div>
</div>

<div id="logModal">
    <div class="log-modal-box">
        <div class="log-modal-header">
            <span>📜 完整編輯紀錄（最近 100 則）</span>
            <button class="log-modal-close" onclick="closeLogModal()">✕</button>
        </div>
        <div class="log-modal-body" id="logModalBody"></div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI", authDomain: "tos-m-fb.firebaseapp.com", databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tos-m-fb" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = '', timers = {}, currentSort = 'time';
let isVoiceEnabled = false, isOnSfxEnabled = false, isR4SfxEnabled = false;
let myName = 'No Name', showWarningIcon = false, colorMode = 1, pinAlertMode = false, isLightMode = false;
let audioCtx = null, chatMode = 'full', lastReadMsgTime = 0;
window.currentData = {};
let localPinned = JSON.parse(localStorage.getItem('tos_pinned_bosses') || '{}');
let lastProcessedInput = {};
const protectedRooms = { 'GABIJA':'faker','000000':'tosm','ZEMYNA':'earth0407','SAULE':'apple','ASRINE':'lostu' };
const currentVersion = "1.5.4";
let contributorCounts = {}, contributorMax = 1, currentOnlineUsers = [];
let killedSectionCollapsed = true;

function hasAuth() { const pass = protectedRooms[currentRoom]; return !pass || localStorage.getItem(`auth_${currentRoom}`) === pass; }
function canIUseCall() { if (hasAuth()) return true; const onlineMax = Math.max(...currentOnlineUsers.map(n => contributorCounts[n] || 0), 0); const myCount = contributorCounts[myName] || 0; return (myCount === onlineMax && myCount >= 5); }

function getCallSlots() {
    const data = window.currentData || {};
    let p1id = null, p2id = null;
    Object.entries(data).forEach(([id, b]) => {
        if ((b.callPriority || 0) === 1) p1id = id;
        if ((b.callPriority || 0) === 2) p2id = id;
    });
    return { p1id, p2id };
}

function toggleCallHelp(id) {
    if (!canIUseCall()) { alert("只有管理員或當前「在線」的編輯王可以發起號召！\n(需編輯次數第一且滿 5 次)"); return; }
    const b = window.currentData[id]; if (!b) return;
    const cur = b.callPriority || 0;
    const ref = db.ref(`rooms/${currentRoom}/bosses/${id}/callPriority`);
    if (cur > 0) {
        ref.set(0).then(() => { if (cur === 1) { const { p2id } = getCallSlots(); if (p2id) db.ref(`rooms/${currentRoom}/bosses/${p2id}/callPriority`).set(1); } });
    } else {
        const { p1id, p2id } = getCallSlots();
        if (!p1id) ref.set(1); else if (!p2id) ref.set(2); else alert("號召名額已滿（最多同時 2 個）！");
    }
}

function toggleMax(id) {
    const b = window.currentData[id];
    if (!b) return;
    db.ref(`rooms/${currentRoom}/bosses/${id}/isMax`).set(!b.isMax);
}

function checkDuplicate() {
    const input = document.getElementById('bossInput');
    const hint  = document.getElementById('inputHint');
    const p = input.value.trim().split(/\s+/);
    if (p.length >= 2) {
        const id = `${p[0]}_${p[1]}`;
        if (window.currentData && window.currentData[id]) {
            hint.innerText = '⚠️ 該地圖分流已存在於列表中！';
            hint.classList.add('warning'); return;
        }
    }
    hint.innerText = '範例：80 3 R1.5 ｜ 80 3 0015 ｜ 80 3 12:30 ｜ 80 3 ON';
    hint.classList.remove('warning');
}

function updateVolBg(el) { const val = (el.value - el.min) / (el.max - el.min) * 100; el.style.backgroundSize = val + '% 100%'; }

function getStatusColor(weight) {
    if (isLightMode) { const light = { 7:'#888', 6:'#cc00cc', 5:'#cc3800', 4:'#b36200', 3:'#b36200', 2:'#f0da3d', 1:'#f0da3d', 0:'#cc2200' }; return light[weight] || '#333'; }
    const colors = {7:'#9dadc1',6:'#FF00FF',5:'#FF1493',4:'#FF4500',3:'#FFA500',2:'#FFFF00',1:'#00FF00',0:'#FF3300'};
    return colorMode === 1 ? colors[weight] : (weight===7?'#9dadc1':weight===6?'#FF00FF':weight===5?'#FF1493':(weight>=2&&weight<=4)?'#FFFF00':weight===1?'#00FF00':'#FF3300');
}

function toggleTheme() {
    isLightMode = !isLightMode; document.body.classList.toggle('light', isLightMode);
    document.getElementById('themeBtn').textContent = isLightMode ? '🌙 暗色' : '☀️ 亮色';
    const ci = document.querySelector('.copy-icon'); if (ci) ci.setAttribute('stroke', isLightMode ? '#3d7440' : '#0f0');
    renderList();
}

function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playDing(freq = 880) { unlockAudio(); const vol = parseFloat(document.getElementById('volRange').value); const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); osc.connect(gain); gain.connect(audioCtx.destination); gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(vol * 0.3, audioCtx.currentTime + 0.01); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
function speak(text) { if (!isVoiceEnabled) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.volume = parseFloat(document.getElementById('volRange').value); msg.lang = 'zh-TW'; msg.rate = 1.1; window.speechSynthesis.speak(msg); }
function toggleVoice() { isVoiceEnabled=!isVoiceEnabled; document.getElementById('voiceBtn').classList.toggle('active',isVoiceEnabled); if(isVoiceEnabled) speak("語音開啟"); }
function toggleOnSfx() { isOnSfxEnabled=!isOnSfxEnabled; document.getElementById('onSfxBtn').classList.toggle('active',isOnSfxEnabled); }
function toggleR4Sfx() { isR4SfxEnabled=!isR4SfxEnabled; document.getElementById('r4SfxBtn').classList.toggle('active',isR4SfxEnabled); }
function toggleWarn() { showWarningIcon=!showWarningIcon; document.getElementById('warnBtn').classList.toggle('active',showWarningIcon); renderList(); }
function toggleColorMode() { colorMode=colorMode===1?2:1; document.getElementById('colorModeBtn').innerText=colorMode===1?'🎨':'🖌️'; renderList(); }
function togglePinAlert() { pinAlertMode=!pinAlertMode; document.getElementById('pinAlertBtn').classList.toggle('active',pinAlertMode); }

function toggleChat() {
    const panel = document.getElementById('chatPanel');
    if (chatMode==='full') { chatMode='hidden'; panel.className='chat-hidden'; }
    else if (chatMode==='hidden') { chatMode='mini'; panel.className='chat-mini'; document.getElementById('chatDot').classList.remove('show'); }
    else { chatMode='full'; panel.className='chat-full'; }
}
function sendMsg() { const i = document.getElementById('chatInput'); if (!i.value.trim()) return; db.ref(`rooms/${currentRoom}/chat`).push({ name: myName, text: i.value.trim(), t: Date.now() }); i.value = ''; }

function getBossStatus(b, bossId) {
    const now = Date.now(), twoHours = 7200000;
    const isGrey = b.lastInput.toString().toUpperCase().startsWith("XX") ||
                   (b.targetTime > 0 && (now - b.targetTime > twoHours)) ||
                   (b.targetTime === 0 && (now - b.startTime > twoHours));
    let weight = -1;
    const stageVal = parseFloat((b.displayValue || '').match(/[\d.]+/)) || 0;
    if (b.lastInput.toString().toUpperCase().startsWith("DE")) weight = 7;
    else if (b.displayValue === "ON") weight = 6;
    else if (b.displayValue.includes("階段4")) weight = 5;
    else if (b.displayValue.includes("階段3")) weight = 4;
    else if (b.displayValue.includes("階段2")) weight = 3;
    else if (b.displayValue.includes("階段1")) weight = 2;
    else if (b.targetTime > 0) weight = (b.targetTime > now) ? 1 : 0;
    return { isGrey, weight, stageVal, color: getStatusColor(weight), mapLv: parseInt((b.map || '').match(/\d+/)) || 0, pinned: !!localPinned[`${currentRoom}_${bossId}`] };
}

function sortItems(items) {
    return items.sort((a, b) => {
        const sA = getBossStatus(a[1], a[0]), sB = getBossStatus(b[1], b[0]);
        if (sA.isGrey !== sB.isGrey) return sA.isGrey ? 1 : -1;
        const sw = w => (w === 7 ? -1 : (w === 0 ? 1.5 : w));
        if (sA.weight !== sB.weight) return sw(sB.weight) - sw(sA.weight);
        if (sA.weight >= 2 && sA.weight <= 5) return sB.stageVal - sA.stageVal;
        if (sA.weight <= 1.5) return a[1].targetTime - b[1].targetTime;
        return sB.mapLv - sA.mapLv;
    });
}

function renderList() {
    const area = document.getElementById('renderArea'); if (!area) return;
    area.innerHTML = ''; Object.values(timers).forEach(clearInterval); timers = {};
    const all = Object.entries(window.currentData);
    const auth = hasAuth(), myCallAuth = canIUseCall();

    const drawBox = (items, label, collapsible = false) => {
        if (!items.length) return;
        const sec = document.createElement('div'); sec.className = 'grid-section';
        if (collapsible) {
            sec.innerHTML = `<div class="section-label collapsible ${killedSectionCollapsed?'collapsed':''}" onclick="toggleKilledSection(this)"><span class="collapse-arrow">▼</span>${label} (${items.length})</div><div class="collapsible-body ${killedSectionCollapsed?'collapsed':''}" style="max-height:${killedSectionCollapsed?'0':'2000px'}"><div class="grid"></div></div>`;
        } else {
            sec.innerHTML = `<div class="section-label">${label}</div><div class="grid"></div>`;
        }
        area.appendChild(sec); const grid = sec.querySelector('.grid');
        items.forEach(([id, b]) => {
            const st = getBossStatus(b, id), cp = b.callPriority || 0;
            const card = document.createElement('div');
            card.className = `card ${cp===1?'calling-1':cp===2?'calling-2':''} ${st.isGrey?'idle-card':''} ${b.targetTime>0 || st.weight===7?'compact':''}`;
            
            const countDisplay = b.isMax ? '<span class="max-badge">MAX</span>' : (b.memberCount > 0 ? `<span class="member-count">${b.memberCount}</span>` : '');
            const callHtml = myCallAuth ? `<button class="call-btn ${cp===1?'priority-1':cp===2?'priority-2':'idle'}" onclick="toggleCallHelp('${id}')">${cp===1?'🔴':cp===2?'🟠':'⬤'}</button>` : (cp>0?`<span class="call-indicator">${cp===1?'🔴':'🟠'}</span>`:'');
            const nextHtml = (b.targetTime === 0 && st.weight !== 7) ? `<button class="btn-next" style="color:${st.isGrey?'#555':st.color};border-color:${st.isGrey?'#555':st.color}" onclick="triggerNext('${b.map}','${b.ch}')" ${b.isFlash?'disabled':''}>${b.displayValue==='ON'?'KILL':'NEXT'}</button>` : '';

            card.innerHTML = `<button class="del" onclick="handleDelClick('${id}')">×</button>
                <div class="card-title-row" id="title_${id}">
                    <h3 id="h3_${id}" onclick="enterInlineEdit('${id}')">${b.map} - ${b.ch} ${countDisplay}</h3>
                </div>
                <div class="timer-container"><div class="stage-row"><span class="stage-label ${b.isFlash?'flash-anim':''} ${b.targetTime>0?'countdown':''}" id="t_${id}" style="color:${st.isGrey?'#555':st.color}">...</span>${nextHtml}</div><div class="elapsed-row" id="e_${id}"></div></div>
                <div class="card-actions"><button class="pin-btn ${st.pinned?'pinned':''}" onclick="togglePin('${id}')">★</button>${callHtml}<button class="max-btn ${b.isMax?'maxed':''}" onclick="toggleMax('${id}')">M</button>${b.updater?`<span class="updater-txt">${b.updater}</span>`:''}</div>`;
            grid.appendChild(card); startTimer(id, b, st.isGrey, st.color);
        });
    };
    const pinned = sortItems(all.filter(i => getBossStatus(i[1],i[0]).pinned));
    const other = all.filter(i => !getBossStatus(i[1],i[0]).pinned);
    drawBox(pinned, "置頂追蹤區 ★");
    const killed = other.filter(i => getBossStatus(i[1],i[0]).weight === 7);
    const active = other.filter(i => getBossStatus(i[1],i[0]).weight !== 7);
    if (currentSort === 'map') {
        drawBox(other.sort((a,b)=>getBossStatus(b[1],b[0]).mapLv - getBossStatus(a[1],a[0]).mapLv || a[1].ch - b[1].ch), "全域地圖等級排序 (含已擊殺)");
    } else {
        drawBox(sortItems(killed), "已擊殺區間", true);
        if (currentSort === 'time') drawBox(sortItems(active), "全域時間排序 (閒置置底)");
        else {
            const stages = [], timers = [], idles = [];
            active.forEach(i => { const s = getBossStatus(i[1],i[0]); if(s.isGrey) idles.push(i); else if(i[1].targetTime > 0) timers.push(i); else stages.push(i); });
            drawBox(sortItems(stages), "階段追蹤區"); drawBox(timers.sort((a,b)=>a[1].targetTime - b[1].targetTime), "重生計時區"); drawBox(idles, "超時閒置區");
        }
    }
}

function enterInlineEdit(id) {
    const b = window.currentData[id]; if (!b) return;
    const titleRow = document.getElementById(`title_${id}`);
    const originalH3 = document.getElementById(`h3_${id}`);
    originalH3.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'inline-edit-input';
    input.value = `${b.map} ${b.ch} ${b.lastInput} ${b.memberCount || ''}`.trim();
    
    titleRow.appendChild(input);
    input.focus({ preventScroll: true });

    const finishEdit = () => {
        const val = input.value.trim();
        if (val) {
            const p = val.split(/\s+/);
            if (p.length >= 3) saveBoss(p[0], p[1], p.slice(2).join(' '));
        }
        renderList();
    };

    input.onblur = finishEdit;
    input.onkeydown = (e) => { if (e.key === 'Enter') finishEdit(); if (e.key === 'Escape') renderList(); };
}

function startTimer(id, b, isGrey, statusColor) {
    const up = () => {
        const stageEl = document.getElementById(`t_${id}`), elapsedEl = document.getElementById(`e_${id}`); if (!stageEl) return;
        const now = Date.now();
        if (b.targetTime > 0) {
            const d = Math.floor((b.targetTime-now)/1000), a = Math.abs(d);
            stageEl.innerText = `${Math.floor(a/3600)}:${Math.floor((a%3600)/60).toString().padStart(2,'0')}:${(a%60).toString().padStart(2,'0')}`;
            if (!isGrey) stageEl.style.color = d <= 0 ? (isLightMode?'#cc2200':'#ff3300') : (isLightMode?'#1a7a1a':'#00FF00');
            if (elapsedEl) { const ed = new Date(b.targetTime); elapsedEl.innerHTML = `<span style="opacity:0.6;">${ed.getHours().toString().padStart(2,'0')}:${ed.getMinutes().toString().padStart(2,'0')}</span>`; }
        } else {
            const diff = Math.max(0, now-b.startTime), m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            const isK = b.lastInput.toString().toUpperCase().startsWith("DE"), mat = b.displayValue.match(/[\d.]+/);
            const lv = b.displayValue === "ON" ? 99 : (mat ? Math.floor(parseFloat(mat[0])) : 0);
            const isW = (lv<2 && m>=12) || (lv>=2 && lv<3 && m>=7) || (lv>=3 && lv<4 && m>=5) || (lv>=4 && m>=3);
            stageEl.innerText = isK ? "已擊殺" : b.displayValue; if (!isGrey) stageEl.style.color = statusColor;
            if (elapsedEl) { elapsedEl.innerText = `(${m}:${s.toString().padStart(2,'0')})${(showWarningIcon && isW && !isGrey && !isK)?' ⚠️':''}`; elapsedEl.style.color = isGrey?'#bcbcbc':'#888'; }
        }
    };
    up(); timers[id] = setInterval(up, 1000);
}

function saveBoss(map, ch, val, doFocus = false) {
    const pass = protectedRooms[currentRoom];
    if (pass && map.toUpperCase()==="ADMIN" && ch===pass) { localStorage.setItem(`auth_${currentRoom}`, pass); alert("管理員權限已解鎖！"); return; }
    const id = `${map}_${ch}`, old = window.currentData ? window.currentData[id] : null;
    let dv = val, tt = 0, flash = false, uv = val.toString().toUpperCase();
    
    const parts = uv.split(/\s+/);
    let memberCount = 0; 
    if (parts.length > 1 && !isNaN(parts[parts.length-1])) { 
        memberCount = parseInt(parts.pop()); 
        uv = parts.join(' '); 
    }

    if (uv.startsWith("00")) { let r = uv.replace("00", ""); uv = (r.length===2 && !r.includes('.'))?("R"+r[0]+"."+r[1]):("R"+r); }
    if (uv.startsWith("XX")) dv = "閒置"; else if (uv.startsWith("DE")) dv = "已擊殺"; else if (uv === "ON") { dv = "ON"; flash = true; }
    else if (uv.startsWith("R")) { dv = "階段"+uv.substring(1); if(parseFloat(uv.substring(1))>=4) flash = true; }
    else { const p = uv.split(/[:.：]/); tt = Date.now() + ((p.length===2?parseInt(p[0])*60+parseInt(p[1]):parseFloat(uv)||0)*60000); }

    const updatePayload = { map, ch, targetTime: tt, lastInput: uv, displayValue: dv, startTime: Date.now(), isFlash: flash, updater: myName, memberCount: memberCount };
    
    if (memberCount >= 30) updatePayload.isMax = true;
    if (tt > 0 || uv.startsWith("DE")) { updatePayload.callPriority = 0; updatePayload.isMax = false; updatePayload.memberCount = 0; }
    
    db.ref(`rooms/${currentRoom}/bosses/${id}`).update(updatePayload);
    setTimeout(() => db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false), 3000);
}

function togglePin(id) { const k = `${currentRoom}_${id}`; if (localPinned[k]) delete localPinned[k]; else localPinned[k] = true; localStorage.setItem('tos_pinned_bosses', JSON.stringify(localPinned)); renderList(); }
function toggleKilledSection(el) { killedSectionCollapsed = !killedSectionCollapsed; renderList(); }
function cycleLogMode() { currentLogModeIndex = (currentLogModeIndex+1)%logDisplayModes.length; renderList(); }
function joinRoom() { const i = document.getElementById('roomInput').value.trim().toUpperCase(); if (i) startSession(i); }
function createRoom() { startSession(Math.random().toString(36).substring(2, 8).toUpperCase()); }
function setSort(t) { currentSort = t; renderList(); }
function startSession(id) {
    currentRoom = id.toUpperCase();
    let name = document.getElementById('userNameInput').value.trim();
    if (!name) { name = localStorage.getItem('tos_fixed_id') || ("#" + Math.floor(1000+Math.random()*9000)); localStorage.setItem('tos_fixed_id', name); }
    myName = name;
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
    document.getElementById('displayID').innerText = currentRoom;
    db.ref(`rooms/${currentRoom}/users`).push({ name: myName }).onDisconnect().remove();
    db.ref(`rooms/${currentRoom}/bosses`).on('value', s => { window.currentData = s.val() || {}; renderList(); });
}
</script>
