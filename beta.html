<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME v1.5.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --bg-card: #111; --bg-card-compact: #0e0e0e;
            --border: #222; --border-dashed: #333; --border-actions: #1a1a1a;
            --text-title: #aaa; --text-del: #333; --text-updater: #333;
            --text-elapsed: #888; --section-label-color: #555;
            --section-border-color: #333; --notice-bg: #111;
            --notice-border: #333; --notice-text: #aaa;
            --pin-border: #444; --pin-bg: #1a1a1a; --pin-color: #666;
            --call-idle-border: #444; --call-idle-bg: #1a1a1a; --call-idle-color: #555;
            --max-btn-border: #444; --max-btn-bg: #1a1a1a; --max-btn-color: #555;
            --max-badge-bg: #00243a; --max-badge-border: #00aaff; --max-badge-color: #00aaff;
            --btn-next-bg: #000; --input-bg: #050505; --input-border: #0f0;
            --log-bg: #0a0a0a; --log-border: #1a1a1a; --sort-btn-bg: #222;
            --sort-btn-color: #888; --sort-btn-border: #444;
            --chat-bg: #0a0a0a; --chat-border: #1a1a1a; --chat-msg-bg: #141414;
        }
        body.light {
            --bg: #f0ede6; --bg-card: #fff; --bg-card-compact: #fafaf8;
            --border: #ddd; --border-dashed: #ccc; --border-actions: #e8e8e8;
            --text-title: #333; --text-del: #bbb; --text-updater: #bbb;
            --text-elapsed: #999; --section-label-color: #999;
            --section-border-color: #ccc; --notice-bg: #fff;
            --notice-border: #ddd; --notice-text: #555;
            --pin-border: #bbb; --pin-bg: #f5f5f5; --pin-color: #aaa;
            --call-idle-border: #bbb; --call-idle-bg: #f5f5f5; --call-idle-color: #aaa;
            --max-btn-border: #bbb; --max-btn-bg: #f5f5f5; --max-btn-color: #aaa;
            --max-badge-bg: #ddf0ff; --max-badge-border: #0088cc; --max-badge-color: #0066aa;
            --btn-next-bg: #f5f5f5; --input-bg: #fff; --input-border: #1a7a1a;
            --log-bg: #f5f5f5; --log-border: #ddd; --sort-btn-bg: #eee;
            --sort-btn-color: #666; --sort-btn-border: #ccc;
            --chat-bg: #f8f8f6; --chat-border: #e0e0e0; --chat-msg-bg: #efefed;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; transition: background 0.25s; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .ver-info { color: #444; font-size: 10px; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 11px; padding: 5px 10px; border-radius: 6px; }
        .btn-toggle { background: var(--sort-btn-bg); color: var(--sort-btn-color); font-size: 12px; padding: 5px 10px; border: 1px solid var(--sort-btn-border); }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        body.light .btn-toggle.active { background: #d0f0d0; color: #1a7a1a; border-color: #1a7a1a; }
        .copy-icon { width: 18px; height: 18px; min-width: 18px; vertical-align: middle; cursor: pointer; opacity: 0.7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; line-height: 1; }
        .audio-controls { display: flex; align-items: center; gap: 5px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; height: 32px; box-sizing: border-box; }
        .audio-btn { background: none; color: #0f0; padding: 0; font-size: 14px; cursor: pointer; border: none; opacity: 0.3; transition: 0.2s; }
        .audio-btn.active { opacity: 1; }
        .vol-range { -webkit-appearance: none; width: 60px; height: 4px; background: #333; border-radius: 2px; outline: none; margin: 0 5px; background-image: linear-gradient(#0f0, #0f0); background-repeat: no-repeat; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #0f0; border-radius: 50%; cursor: pointer; border: 2px solid #111; }
        .user-list-bar { font-size: 12px; color: #555; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .notice-bar { background: var(--notice-bg); border-radius: 6px; padding: 5px 10px; border: 1px solid var(--notice-border); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; min-height: 28px; }
        .notice-icon { color: #0af; font-size: 14px; flex-shrink: 0; }
        body.light .notice-icon { color: #0077bb; }
        .notice-text { font-size: 12px; color: var(--notice-text); margin: 0; line-height: 1.4; flex: 1; white-space: pre-wrap; word-break: break-all; }
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid var(--input-border); background: var(--input-bg); margin-bottom: 5px; font-size: 16px; color: var(--text-title); padding: 8px 0; box-sizing: border-box; }
        .input-hint { font-size: 11px; color: #888; margin-bottom: 15px; transition: color 0.2s; }
        .input-hint.warning { color: #f33; font-weight: bold; }
        .btn-next { background: var(--btn-next-bg); font-size: 11px; font-weight: bold; padding: 3px 9px; border-radius: 5px; cursor: pointer; display: inline-block; border: 2px solid; flex-shrink: 0; vertical-align: baseline; }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.5); }

        /* ═══ 亮色模式全面覆蓋 ═══ */
        body.light { color: #333; }
        body.light input[type=text] { background: #fff; border-color: #ddd; color: #333; }
        body.light .room-id { color: #3d7440 !important; }
        body.light #onlineCount { color: #3d7440 !important; }
        body.light .copy-icon { filter: none; }
        body.light .copy-icon path, body.light .copy-icon rect { stroke: #3d7440 !important; }
        body.light .audio-controls { background: #d6cbb6; border-color: #c4b89e; }
        body.light .audio-btn { color: #5a4a2a; }
        body.light .btn-danger { background: #d6cbb6; color: #8a3a00; border: 1px solid #c4a882; }
        body.light .chat-input-row button { background: #d6efd3; color: #437a41; border: 1px solid #437a41; font-weight: bold; }
        body.light .log-boss-name { color: #8c8c8c !important; }
        body.light .notice-text { color: #585858 !important; }
        body.light .user-list-bar { color: #999; border-bottom-color: #ddd; }
        body.light .version-tag { color: #bbb; }
        body.light #logPanel { background: #f5f5f2 !important; border-color: #ddd !important; }
        body.light #logPanel > div:first-child { background: #eeecea !important; color: #555 !important; }
        body.light #logList { color: #555; }
        body.light .log-modal-box { background: #fff; border-color: #ddd; }
        body.light .log-modal-header { border-bottom-color: #eee; color: #3d7440; }
        body.light .log-modal-body .log-entry { border-bottom-color: #eee; }
        body.light #noticeEditArea { background: #f5f5f2 !important; border-color: #ddd !important; }
        body.light #noticeInput { background: #fff !important; border-color: #ddd !important; color: #333 !important; }
        body.light .elapsed-row { color: #999; opacity: 1; }
        body.light .log-new-val { color: #437a41 !important; }
        body.light .top-editor { color: #cc3300 !important; }
        body.light .card.idle-card { background: #e8e5e0 !important; border-color: #ccc !important; }
        body.light .card.idle-card h3 { color: #bcbcbc !important; border-bottom-color: #ddd !important; }
        body.light .card.idle-card .stage-label { color: #bcbcbc !important; }
        body.light .card.idle-card .elapsed-row { color: #bcbcbc !important; }
        body.light .card.idle-card .elapsed-row span { color: #bcbcbc !important; opacity: 1 !important; }
        body.light .card.idle-card .del { color: #d0d0d0 !important; }
        body.light .card.idle-card .btn-next { color: #bcbcbc !important; border-color: #bcbcbc !important; background: transparent !important; }
        body.light .card.idle-card .card-actions { border-top-color: #ddd !important; }
        body.light .card.idle-card .updater-txt { color: #bcbcbc !important; }
        body.light .card.calling-1 { animation: cpulse1-light 1.5s infinite !important; }
        body.light .card.calling-2 { animation: cpulse2-light 1.5s infinite !important; }
        @keyframes cpulse1-light { 0%{box-shadow:0 0 5px #ff3300;} 50%{box-shadow:0 0 18px #ff3300;background:#fff5f3;} 100%{box-shadow:0 0 5px #ff3300;} }
        @keyframes cpulse2-light { 0%{box-shadow:0 0 5px #ff8800;} 50%{box-shadow:0 0 18px #ff8800;background:#fff8f0;} 100%{box-shadow:0 0 5px #ff8800;} }

        .sort-row { margin: 10px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        .grid-section { margin-bottom: 30px; }
        .section-label { color: var(--section-label-color); font-size: 11px; border-left: 2px solid var(--section-border-color); padding-left: 8px; text-transform: uppercase; margin-bottom: 10px; }
        .section-label.collapsible { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
        .section-label.collapsible:hover { color: #888; }
        .section-label.collapsible .collapse-arrow { font-size: 9px; transition: transform 0.2s; display: inline-block; }
        .section-label.collapsible.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .collapsible-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; }
        .collapsible-body.collapsed { max-height: 0 !important; opacity: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

        /* ═══ 卡片 ═══ */
        .card { background: var(--bg-card); padding: 12px 12px 8px; border-radius: 8px; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; transition: background 0.25s, border-color 0.25s; }
        .card.compact { padding: 8px 12px 6px; background: var(--bg-card-compact); }
        .card.compact .timer-container { margin-top: 4px; }
        .card.compact .card-actions { margin-top: 5px; padding-top: 5px; }

        /* ── 標題列：虛線只在文字下，不延伸到空白處 ── */
        .card-title-row { display: flex; align-items: baseline; gap: 8px; padding-right: 18px; margin-bottom: 4px; }
        .card h3 {
            margin: 0; color: var(--text-title); font-size: 15px; font-weight: bold;
            cursor: pointer; line-height: 1.3; white-space: nowrap;
            display: inline-block; width: fit-content;
            border-bottom: 1px dashed var(--border-dashed);
            padding-bottom: 1px;
        }
        /* 人數標籤：虛線與 h3 對齊 */
        .member-badge {
            font-size: 12px; color: #888; font-weight: normal;
            flex-shrink: 0; cursor: pointer; padding: 0 2px;
            border-radius: 0; transition: 0.15s;
            border-bottom: 1px dashed var(--border-dashed);
            padding-bottom: 1px; line-height: 1.3;
        }
        .member-badge:hover { color: #bbb; }
        body.light .member-badge { color: #999; }
        body.light .member-badge:hover { color: #555; }
        /* 人數輸入按鈕（actions 列，人形圖示） */
        .member-count-btn {
            font-size: 13px; cursor: pointer; padding: 0 2px;
            opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0;
            background: none; border: none; color: inherit; line-height: 1;
        }
        .member-count-btn:hover { opacity: 1; }
        /* 右上角人數顯示（與 × 同高） */
        .member-top-display {
            position: absolute; top: 7px; right: 28px;
            font-size: 10px; color: #666; font-family: monospace;
            line-height: 1; pointer-events: none; white-space: nowrap;
        }
        body.light .member-top-display { color: #aaa; }
        /* 人數 inline 輸入框：小巧不搶版面 */
        .member-input {
            width: 38px; font-size: 12px; padding: 0 3px;
            border: none; border-bottom: 1px solid #0f0;
            background: transparent; color: #0f0;
            outline: none; font-family: monospace; text-align: center;
        }
        body.light .member-input { color: #1a7a1a; border-bottom-color: #1a7a1a; }

        /* ── 原地編輯輸入框 ── */
        .inline-input {
            width: 100%; font-size: 13px; padding: 1px 4px;
            border: 1px solid #0f0; background: #000; color: #fff;
            outline: none; border-radius: 3px; box-sizing: border-box;
            font-family: monospace;
        }
        body.light .inline-input { background: #fff; color: #333; border-color: #1a7a1a; }

        .del { position: absolute; top: 6px; right: 6px; color: var(--text-del); background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px; line-height: 1; }
        .timer-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 4px; gap: 2px; }
        .stage-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap; }
        .stage-label { font-size: 18px; font-weight: bold; font-family: sans-serif; white-space: nowrap; }
        .stage-label.flash-anim { animation: flash 0.5s step-end 10; }
        @keyframes flash { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        /* elapsed-row 亮度提升至 0.9 */
        .elapsed-row { font-size: 13px; font-family: monospace; opacity: 0.9; display: flex; align-items: baseline; gap: 4px; min-height: 16px; }
        .stage-label.countdown { font-family: monospace; }
        .card-actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border-actions); }
        .card-actions .updater-txt { margin-left: auto; font-size: 10px; color: var(--text-updater); white-space: nowrap; }
        .pin-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--pin-border); background: var(--pin-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 11px; color: var(--pin-color); transition: 0.2s; flex-shrink: 0; }
        .pin-btn.pinned { border-color: #ffca28; background: #2a2200; color: #ffca28; box-shadow: 0 0 5px rgba(255,202,40,0.3); }
        body.light .pin-btn.pinned { background: #fff8e0; color: #8a6500; border-color: #c8960a; box-shadow: none; }
        #chatPanel { margin-bottom: 15px; background: var(--chat-bg); border: 1px solid var(--chat-border); border-radius: 10px; overflow: hidden; transition: all 0.3s ease; }
        #chatPanel.chat-hidden { display: none; }
        .chat-msgs { overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        #chatPanel.chat-mini .chat-msgs { height: 50px; }
        #chatPanel.chat-full .chat-msgs { height: 150px; }
        .msg-row { display: flex; gap: 8px; align-items: center; }
        .msg-name { font-size: 11px; color: #0f0; min-width: 48px; white-space: nowrap; }
        .msg-name.self { color: #0af; }
        body.light .msg-name { color: #1a7a1a; }
        body.light .msg-name.self { color: #0066aa; }
        .msg-time { font-size: 10px; color: #444; white-space: nowrap; flex-shrink: 0; margin-left: auto; align-self: center; }
        body.light .msg-time { color: #bbb; }
        .msg-bubble { font-size: 13px; color: #ccc; background: var(--chat-msg-bg); border-radius: 6px; padding: 5px 9px; max-width: 80%; word-break: break-all; }
        body.light .msg-bubble { color: #333; }
        .chat-input-row { display: flex; border-top: 1px solid var(--chat-border); align-items: stretch; }
        .chat-input-row input { flex: 1; background: var(--chat-bg); border: none; color: var(--text-title); padding: 8px 12px; font-size: 12px; outline: none; }
        .chat-input-row button { background: #0f0; color: #000; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .chat-dot { position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; background: #f00; border-radius: 50%; display: none; }
        .chat-dot.show { display: block; }
        .version-tag { font-size: 10px; color: #333; margin-right: 10px; }
        .call-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--call-idle-border); background: var(--call-idle-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 12px; color: var(--call-idle-color); transition: 0.2s; flex-shrink: 0; }
        .call-btn.idle { border-color: var(--call-idle-border); background: var(--call-idle-bg); color: var(--call-idle-color); }
        .call-btn.priority-1 { border-color: #ff3300; background: #300800; color: #ff3300; box-shadow: 0 0 7px rgba(255,51,0,0.6); }
        .call-btn.priority-2 { border-color: #ff8800; background: #301a00; color: #ff8800; box-shadow: 0 0 7px rgba(255,136,0,0.6); }
        body.light .call-btn.priority-1 { background: #ffe8e0; box-shadow: none; }
        body.light .call-btn.priority-2 { background: #fff3e0; box-shadow: none; }
        .call-indicator { font-size: 13px; flex-shrink: 0; line-height: 1; }
        .max-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--max-btn-border); background: var(--max-btn-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 10px; font-weight: 900; font-family: sans-serif; color: var(--max-btn-color); transition: 0.2s; flex-shrink: 0; }
        .max-btn.maxed { border-color: #00aaff; background: #00243a; color: #00aaff; box-shadow: 0 0 7px rgba(0,170,255,0.6); }
        body.light .max-btn.maxed { background: #ddf0ff; color: #0066aa; border-color: #0088cc; box-shadow: none; }
        .max-badge { display: inline-block; font-size: 10px; font-weight: 900; color: var(--max-badge-color); background: var(--max-badge-bg); border: 1px solid var(--max-badge-border); border-radius: 4px; padding: 0 4px; vertical-align: middle; animation: max-pulse 2s infinite; }
        @keyframes max-pulse { 0%,100%{opacity:1;box-shadow:0 0 4px rgba(0,170,255,0.4);} 50%{opacity:0.75;box-shadow:0 0 10px rgba(0,170,255,0.9);} }
        .card.calling-1 { border: 2px solid #ff3300 !important; animation: cpulse1 1.5s infinite; }
        .card.calling-2 { border: 2px solid #ff8800 !important; animation: cpulse2 1.5s infinite; }
        @keyframes cpulse1 { 0%{box-shadow:0 0 5px #ff3300;} 50%{box-shadow:0 0 20px #ff3300;background:#1e0000;} 100%{box-shadow:0 0 5px #ff3300;} }
        @keyframes cpulse2 { 0%{box-shadow:0 0 5px #ff8800;} 50%{box-shadow:0 0 20px #ff8800;background:#1e0e00;} 100%{box-shadow:0 0 5px #ff8800;} }
        .top-editor { display:inline-block; padding:0 4px; border-radius:4px; animation:editor-glow 2s infinite; font-weight:bold!important; }
        @keyframes editor-glow { 0%{box-shadow:0 0 2px #c85a22;text-shadow:0 0 2px #c85a22;} 50%{box-shadow:0 0 10px #d95c2a;text-shadow:0 0 6px #d95c2a;background:rgba(217,92,42,0.12);} 100%{box-shadow:0 0 2px #c85a22;text-shadow:0 0 2px #c85a22;} }
        body.light .top-editor { animation: editor-glow-light 2s infinite; }
        @keyframes editor-glow-light { 0%{box-shadow:0 0 2px #b04e1e;text-shadow:0 0 2px #b04e1e;} 50%{box-shadow:0 0 8px #d95c2a;text-shadow:0 0 4px #d95c2a;background:rgba(217,92,42,0.08);} 100%{box-shadow:0 0 2px #b04e1e;text-shadow:0 0 2px #b04e1e;} }
        #logModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; }
        #logModal.show { display:flex; }
        .log-modal-box { background:#111; border:1px solid #333; border-radius:12px; width:90%; max-width:560px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
        .log-modal-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #222; font-size:13px; color:#0f0; }
        .log-modal-close { background:none; border:none; color:#888; font-size:20px; cursor:pointer; padding:0; line-height:1; }
        .log-modal-body { overflow-y:auto; padding:10px 14px; font-size:11px; font-family:monospace; line-height:1.8; flex:1; }
        .log-modal-body .log-entry { border-bottom:1px solid #1a1a1a; padding:3px 0; }
    </style>
</head>
<body>
<div id="app">
    <div id="loginView" class="login-view">
        <div class="title">TOS M FB TIME</div>
        <div class="ver-info">v1.5.5</div>
        <div class="input-group">
            <input type="text" id="userNameInput" placeholder="你的稱呼" maxlength="10" oninput="this.value=this.value.replace('#','')">
            <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
    authDomain: "tos-m-fb.firebaseapp.com",
    databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tos-m-fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = '', timers = {}, currentSort = 'time';
let isVoiceEnabled = false, isOnSfxEnabled = false, isR4SfxEnabled = false;
let myName = 'No Name', showWarningIcon = false, colorMode = 1, pinAlertMode = false, isLightMode = false;
let audioCtx = null, chatMode = 'full', lastReadMsgTime = 0;
window.currentData = {};
let localPinned = JSON.parse(localStorage.getItem('tos_pinned_bosses') || '{}');
let lastProcessedInput = {};
const protectedRooms = { 'GABIJA':'faker','000000':'tosm','ZEMYNA':'earth0407','SAULE':'apple','ASRINE':'lostu' };
const currentVersion = "1.5.5";
let contributorCounts = {}, contributorMax = 1, currentOnlineUsers = [];
let killedSectionCollapsed = true;

/* ════════ 權限 ════════ */
function hasAuth() {
    const pass = protectedRooms[currentRoom];
    if (!pass) return true;
    return localStorage.getItem(`auth_${currentRoom}`) === pass;
}
function canIUseCall() {
    if (hasAuth()) return true;
    const onlineCounts = currentOnlineUsers.map(n => contributorCounts[n] || 0);
    const onlineMax = Math.max(...onlineCounts, 0);
    const myCount = contributorCounts[myName] || 0;
    return (myCount === onlineMax && myCount >= 5);
}

/* ════════ 號召槽位 ════════ */
function getCallSlots() {
    const data = window.currentData || {};
    let p1id = null, p2id = null;
    Object.entries(data).forEach(([id, b]) => {
        if ((b.callPriority || 0) === 1) p1id = id;
        if ((b.callPriority || 0) === 2) p2id = id;
    });
    return { p1id, p2id };
}
function toggleCallHelp(id) {
    if (!canIUseCall()) { alert("只有管理員或當前「在線」的編輯王可以發起號召！\n(需編輯次數第一且滿 5 次)"); return; }
    const b = window.currentData[id]; if (!b) return;
    const cur = b.callPriority || 0;
    const ref = db.ref(`rooms/${currentRoom}/bosses/${id}/callPriority`);
    if (cur > 0) {
        ref.set(0);
        if (cur === 1) {
            ref.set(0).then(() => {
                const slots = getCallSlots();
                if (slots.p2id) db.ref(`rooms/${currentRoom}/bosses/${slots.p2id}/callPriority`).set(1);
            });
        }
        return;
    }
    const { p1id, p2id } = getCallSlots();
    if (!p1id) ref.set(1);
    else if (!p2id) ref.set(2);
    else alert("號召名額已滿（最多同時 2 個）！\n請先取消現有號召再新增。");
}
function toggleMax(id) {
    const b = window.currentData[id]; if (!b) return;
    db.ref(`rooms/${currentRoom}/bosses/${id}/isMax`).set(!b.isMax);
}

/* ════════ 重複檢查 ════════ */
function checkDuplicate() {
    const input = document.getElementById('bossInput');
    const hint  = document.getElementById('inputHint');
    const p = input.value.trim().split(/\s+/);
    if (p.length >= 2) {
        const id = `${p[0]}_${p[1]}`;
        if (window.currentData && window.currentData[id]) {
            hint.innerText = '⚠️ 該地圖分流已存在於列表中！';
            hint.classList.add('warning'); return;
        }
    }
    hint.innerText = '範例：80 3 R1.5 ｜ 80 3 0015 ｜ 80 3 12:30 ｜ 80 3 ON';
    hint.classList.remove('warning');
}

function updateVolBg(el) {
    const val = (el.value - el.min) / (el.max - el.min) * 100;
    el.style.backgroundSize = val + '% 100%';
}

/* ════════ 顏色 ════════ */
function getStatusColor(weight) {
    if (isLightMode) {
        const light = { 7:'#888', 6:'#cc00cc', 5:'#cc3800', 4:'#b36200', 3:'#b36200', 2:'#f0da3d', 1:'#f0da3d', 0:'#cc2200' };
        return light[weight] || '#333';
    }
    const colors = {7:'#9dadc1',6:'#FF00FF',5:'#FF1493',4:'#FF4500',3:'#FFA500',2:'#FFFF00',1:'#00FF00',0:'#FF3300'};
    if (colorMode === 1) return colors[weight] || '#fff';
    return weight===7?'#9dadc1':weight===6?'#FF00FF':weight===5?'#FF1493':(weight>=2&&weight<=4)?'#FFFF00':weight===1?'#00FF00':'#FF3300';
}
function toggleTheme() {
    isLightMode = !isLightMode;
    document.body.classList.toggle('light', isLightMode);
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = isLightMode ? '🌙 暗色' : '☀️ 亮色';
    const copyIcon = document.querySelector('.copy-icon');
    if (copyIcon) copyIcon.setAttribute('stroke', isLightMode ? '#3d7440' : '#0f0');
    renderList();
}

/* ════════ 音效 ════════ */
function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playDing(freq = 880) {
    unlockAudio();
    const vol = parseFloat(document.getElementById('volRange').value);
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol * 0.3, audioCtx.currentTime + 0.01);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}
function speak(text) {
    if (!isVoiceEnabled) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.volume = parseFloat(document.getElementById('volRange').value);
    msg.lang = 'zh-TW'; msg.rate = 1.1;
    window.speechSynthesis.speak(msg);
}
function toggleVoice()     { isVoiceEnabled=!isVoiceEnabled;   document.getElementById('voiceBtn').classList.toggle('active',isVoiceEnabled);   unlockAudio(); if(isVoiceEnabled) speak("語音開啟"); }
function toggleOnSfx()     { isOnSfxEnabled=!isOnSfxEnabled;   document.getElementById('onSfxBtn').classList.toggle('active',isOnSfxEnabled);   unlockAudio(); if(isOnSfxEnabled) playDing(880); }
function toggleR4Sfx()     { isR4SfxEnabled=!isR4SfxEnabled;   document.getElementById('r4SfxBtn').classList.toggle('active',isR4SfxEnabled);   unlockAudio(); if(isR4SfxEnabled) playDing(440); }
function toggleWarn()      { showWarningIcon=!showWarningIcon;  document.getElementById('warnBtn').classList.toggle('active',showWarningIcon);   renderList(); }
function toggleColorMode() { colorMode=colorMode===1?2:1; document.getElementById('colorModeBtn').innerText=colorMode===1?'🎨':'🖌️'; renderList(); }
function togglePinAlert()  { pinAlertMode=!pinAlertMode; document.getElementById('pinAlertBtn').classList.toggle('active',pinAlertMode); }
function toggleChat() {
    const panel = document.getElementById('chatPanel'), btn = document.getElementById('chatBtn');
    if      (chatMode==='full')   { chatMode='hidden'; panel.className='chat-hidden'; btn.classList.remove('active'); btn.style.opacity='0.3'; }
    else if (chatMode==='hidden') { chatMode='mini';   panel.className='chat-mini';   btn.classList.add('active');   btn.style.opacity='1'; lastReadMsgTime=Date.now(); document.getElementById('chatDot').classList.remove('show'); }
    else                          { chatMode='full';   panel.className='chat-full';   btn.classList.add('active');   btn.style.opacity='1'; }
    scrollChat();
}
function scrollChat() { const el = document.getElementById('chatMsgs'); if(el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 100); }
function sendMsg() {
    const i = document.getElementById('chatInput'); if (!i.value.trim()) return;
    db.ref(`rooms/${currentRoom}/chat`).push({ name: myName, text: i.value.trim(), t: Date.now() });
    i.value = '';
}

/* ════════ Boss 狀態 ════════ */
function getBossStatus(b, bossId) {
    const now = Date.now(), twoHours = 7200000;
    const isGrey = b.lastInput.toString().toUpperCase().startsWith("XX") ||
                   (b.targetTime > 0 && (now - b.targetTime > twoHours)) ||
                   (b.targetTime === 0 && (now - b.startTime > twoHours));
    let weight = -1;
    const stageVal = parseFloat((b.displayValue || '').match(/[\d.]+/)) || 0;
    if      (b.lastInput.toString().toUpperCase().startsWith("DE")) weight = 7;
    else if (b.displayValue === "ON")            weight = 6;
    else if (b.displayValue.includes("階段4"))   weight = 5;
    else if (b.displayValue.includes("階段3"))   weight = 4;
    else if (b.displayValue.includes("階段2"))   weight = 3;
    else if (b.displayValue.includes("階段1"))   weight = 2;
    else if (b.targetTime > 0) weight = (b.targetTime > now) ? 1 : 0;
    return { isGrey, weight, stageVal, color: getStatusColor(weight),
             mapLv: parseInt((b.map || '').match(/\d+/)) || 0,
             pinned: !!localPinned[`${currentRoom}_${bossId}`] };
}
function sortItems(items) {
    return items.sort((a, b) => {
        const sA = getBossStatus(a[1], a[0]), sB = getBossStatus(b[1], b[0]);
        if (sA.isGrey !== sB.isGrey) return sA.isGrey ? 1 : -1;
        const sw = w => (w === 7 ? -1 : (w === 0 ? 1.5 : w));
        if (sA.weight !== sB.weight) return sw(sB.weight) - sw(sA.weight);
        if (sA.weight >= 2 && sA.weight <= 5) return sB.stageVal - sA.stageVal;
        if (sA.weight <= 1.5) return a[1].targetTime - b[1].targetTime;
        return sB.mapLv - sA.mapLv;
    });
}

/* ════════ 原地編輯 ════════ */
function enterInlineEdit(id) {
    // 防止重複開啟
    if (document.querySelector('.inline-input')) return;
    const b = window.currentData[id]; if (!b) return;
    const titleRow = document.getElementById(`title_${id}`);
    const h3 = document.getElementById(`h3_${id}`);
    if (!titleRow || !h3) return;

    // 隱藏 h3
    h3.style.visibility = 'hidden';
    h3.style.position = 'absolute';

    // 建立 input，預填 "map ch lastInput"，自動選取第三段（階段/時間部分）
    const input = document.createElement('input');
    input.className = 'inline-input';
    const lastVal = b.lastInput.toString();
    input.value = `${b.map} ${b.ch} ${lastVal}`;
    titleRow.appendChild(input);
    input.focus();

    // 自動選取第三段（階段/時間值）
    const prefix = `${b.map} ${b.ch} `;
    input.setSelectionRange(prefix.length, input.value.length);

    let committed = false;

    const commit = () => {
        if (committed) return;
        committed = true;
        const p = input.value.trim().split(/\s+/);
        if (p.length >= 3) saveBoss(p[0], p[1], p.slice(2).join(''));
        cleanup();
    };

    const cancel = () => {
        if (committed) return;
        committed = true;
        cleanup();
    };

    const cleanup = () => {
        if (input.parentNode) input.parentNode.removeChild(input);
        h3.style.visibility = '';
        h3.style.position = '';
    };

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });

    // 點擊畫面其他地方 → 取消（非 Enter 視為取消）
    const onOutsideClick = (e) => {
        if (e.target !== input) {
            cancel();
            document.removeEventListener('pointerdown', onOutsideClick, true);
        }
    };
    // 延遲綁定，避免觸發當前點擊
    setTimeout(() => {
        document.addEventListener('pointerdown', onOutsideClick, true);
    }, 50);
}

/* ════════ 人數快速編輯 ════════ */
function editMemberCount(event, id) {
    event.stopPropagation(); // 不觸發 h3 的 enterInlineEdit
    if (document.querySelector('.member-input')) return;
    const b = window.currentData[id]; if (!b) return;
    const badge = document.getElementById(`mc_${id}`); if (!badge) return;

    const input = document.createElement('input');
    input.className = 'member-input';
    input.type = 'text';
    input.inputMode = 'numeric';
    input.placeholder = '0';
    input.value = ''; // 清空讓使用者直接打，不需刪除舊值
    badge.replaceWith(input);
    input.focus();

    let committed = false;

    const commit = () => {
        if (committed) return;
        committed = true;
        const raw = input.value.trim();
        const num = raw === '' ? 0 : (parseInt(raw) || 0);
        const autoMax = num >= 30;
        db.ref(`rooms/${currentRoom}/bosses/${id}`).update({
            memberCount: num,
            isMax: autoMax
        });
    };

    const cancel = () => {
        if (committed) return;
        committed = true;
        renderList(); // 還原
    };

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });

    const onOutside = (e) => {
        if (e.target !== input) {
            cancel();
            document.removeEventListener('pointerdown', onOutside, true);
        }
    };
    setTimeout(() => document.addEventListener('pointerdown', onOutside, true), 50);
}


function renderList() {
    const area = document.getElementById('renderArea'); if (!area) return;
    area.innerHTML = ''; Object.values(timers).forEach(clearInterval); timers = {};
    const all = Object.entries(window.currentData);
    const auth = hasAuth(), myCallAuth = canIUseCall();
    const clearBtn = document.getElementById('clearAllBtn');
    if (clearBtn) clearBtn.style.display = auth ? 'block' : 'none';

    const drawBox = (items, label, collapsible = false) => {
        if (!items.length) return;
        const sec = document.createElement('div'); sec.className = 'grid-section';
        if (collapsible) {
            const isCollapsed = killedSectionCollapsed;
            sec.innerHTML = `
                <div class="section-label collapsible ${isCollapsed ? 'collapsed' : ''}" onclick="toggleKilledSection(this)">
                    <span class="collapse-arrow">▼</span>
                    ${label} <span style="color:#444;font-size:10px;">(${items.length})</span>
                </div>
                <div class="collapsible-body ${isCollapsed ? 'collapsed' : ''}" style="max-height:${isCollapsed ? '0' : '2000px'}">
                    <div class="grid"></div>
                </div>`;
        } else {
            sec.innerHTML = `<div class="section-label">${label}</div><div class="grid"></div>`;
        }
        area.appendChild(sec);
        const grid = sec.querySelector('.grid');

        items.forEach(([id, b]) => {
            const st = getBossStatus(b, id);
            const cp = b.callPriority || 0;
            let cardClass = 'card';
            if (cp === 1) cardClass += ' calling-1';
            else if (cp === 2) cardClass += ' calling-2';

            const card = document.createElement('div');
            card.className = cardClass;
            if (st.isGrey) card.classList.add('idle-card');

            // 號召按鈕
            let callHtml = '';
            if (myCallAuth) {
                const callClass = cp===1?'priority-1':cp===2?'priority-2':'idle';
                const callIcon  = cp===1?'🔴':cp===2?'🟠':'⬤';
                callHtml = `<button class="call-btn ${callClass}" onclick="toggleCallHelp('${id}')" title="${cp>0?'取消號召':'發起號召'}">${callIcon}</button>`;
            } else if (cp > 0) {
                callHtml = `<span class="call-indicator" title="${cp===1?'優先號召':'次要號召'}">${cp===1?'🔴':'🟠'}</span>`;
            }

            const maxClass = b.isMax ? 'maxed' : '';
            const maxHtml  = `<button class="max-btn ${maxClass}" onclick="toggleMax('${id}')" title="${b.isMax?'取消滿員':'標記滿員'}">M</button>`;

            const hasNext = (b.targetTime === 0 && st.weight !== 7);
            const isLocked = !!b.isFlash;
            const nextHtml = hasNext
                ? `<button class="btn-next" style="color:${st.isGrey?'#555':st.color};border-color:${st.isGrey?'#555':st.color}" onclick="triggerNext('${b.map}','${b.ch}')" ${isLocked?'disabled title="處理中，請稍候..."':''}>${b.displayValue==='ON'?'KILL':'NEXT'}</button>`
                : '';

            if (!hasNext) cardClass += ' compact';

            // 右上角人數顯示（MAX 時不顯示，只顯示標題列 MAX badge）
            const memberCount = b.memberCount || 0;
            const memberTopHtml = (!b.isMax && memberCount > 0)
                ? `<span class="member-top-display">👤${memberCount}</span>`
                : '';

            // 標題列：MAX badge（僅 isMax 時顯示）
            const memberDisplayHtml = b.isMax
                ? `<span class="max-badge" style="animation:max-pulse 2s infinite;">MAX</span>`
                : '';

            // actions 列人數輸入（人形圖示按鈕）
            const memberInputHtml = `<button class="member-count-btn" id="mc_${id}" onclick="editMemberCount(event,'${id}')" title="點擊輸入人數">👤</button>`;

            card.innerHTML = `
                ${memberTopHtml}
                <button class="del" onclick="handleDelClick('${id}')">×</button>
                <div class="card-title-row" id="title_${id}">
                    <h3 id="h3_${id}" onclick="enterInlineEdit('${id}')">${b.map} - ${b.ch}</h3>${memberDisplayHtml}
                </div>
                <div class="timer-container">
                    <div class="stage-row" id="sr_${id}">
                        <span class="stage-label" id="t_${id}" style="color:${st.isGrey?'#555':st.color}">...</span>
                        ${nextHtml}
                    </div>
                    <div class="elapsed-row" id="e_${id}"></div>
                </div>
                <div class="card-actions">
                    <button class="pin-btn ${st.pinned?'pinned':''}" onclick="togglePin('${id}')">★</button>
                    ${callHtml}
                    ${maxHtml}
                    ${memberInputHtml}
                    ${b.updater?`<span class="updater-txt">${b.updater}</span>`:''}
                </div>
            `;
            grid.appendChild(card);
            startTimer(id, b, st.isGrey, st.color);
        });
    };

    const pinnedItems = sortItems(all.filter(i =>  getBossStatus(i[1],i[0]).pinned));
    const otherItems  =            all.filter(i => !getBossStatus(i[1],i[0]).pinned);
    drawBox(pinnedItems, "置頂追蹤區 ★");

    if (currentSort === 'time') {
        const killed = otherItems.filter(i => getBossStatus(i[1],i[0]).weight === 7);
        const active = otherItems.filter(i => getBossStatus(i[1],i[0]).weight !== 7);
        drawBox(sortItems(killed), "已擊殺區間", true);
        drawBox(sortItems(active), "全域時間排序 (閒置置底)");
    } else if (currentSort === 'map') {
        const allForMap = otherItems.sort((a, b) => {
            const sA = getBossStatus(a[1],a[0]), sB = getBossStatus(b[1],b[0]);
            return sB.mapLv - sA.mapLv || a[1].ch - b[1].ch;
        });
        drawBox(allForMap, "全域地圖等級排序 (含已擊殺)");
    } else {
        const killed = otherItems.filter(i => getBossStatus(i[1],i[0]).weight === 7);
        const active = otherItems.filter(i => getBossStatus(i[1],i[0]).weight !== 7);
        drawBox(sortItems(killed), "已擊殺區間", true);
        const stages = [], timersList = [], idleList = [];
        active.forEach(([id, b]) => {
            const st = getBossStatus(b, id);
            if (st.isGrey) idleList.push([id, b]);
            else if (b.targetTime > 0) timersList.push([id, b]);
            else stages.push([id, b]);
        });
        drawBox(sortItems(stages), "階段追蹤區");
        drawBox(timersList.sort((a,b) => a[1].targetTime - b[1].targetTime), "重生計時區");
        drawBox(idleList, "超時閒置區");
    }
}

/* ════════ 計時器 ════════ */
function startTimer(id, b, isGrey, statusColor) {
    if (!window._timerAlerted) window._timerAlerted = {};

    const up = () => {
        const stageEl   = document.getElementById(`t_${id}`);
        const elapsedEl = document.getElementById(`e_${id}`);
        if (!stageEl) return;
        const now = Date.now();

        if (b.targetTime > 0) {
            // ── 倒數計時 ──
            const d = Math.floor((b.targetTime - now) / 1000), a = Math.abs(d);
            const hh = Math.floor(a/3600), mm = Math.floor((a%3600)/60), ss = a%60;
            stageEl.innerHTML = `${hh}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
            stageEl.className = 'stage-label countdown';
            if (!isGrey) stageEl.style.color = d <= 0 ? (isLightMode ? '#cc2200' : '#ff3300') : (isLightMode ? '#1a7a1a' : '#00FF00');

            if (elapsedEl) {
                const endDate = new Date(b.targetTime);
                const eHH = endDate.getHours().toString().padStart(2,'0');
                const eMM = endDate.getMinutes().toString().padStart(2,'0');
                elapsedEl.innerHTML = `<span style="opacity:0.5;">${eHH}:${eMM}</span>`;
                elapsedEl.style.color = '';
            }

            // 計時結束語音：d 剛變負（0~3秒內）觸發一次
            if (!isGrey && d <= 0 && d > -4) {
                if (!window._timerAlerted[id]) {
                    window._timerAlerted[id] = true;
                    const isPinned = !!localPinned[`${currentRoom}_${id}`];
                    const shouldAlert = !pinAlertMode || isPinned;
                    if (shouldAlert) speak(`${b.map}分流${b.ch}計時結束`);
                }
            } else if (d > 0) {
                delete window._timerAlerted[id]; // 重置，下次計時可再觸發
            }

        } else {
            // ── 階段 / ON / 已擊殺 ──
            const diff = Math.max(0, now - b.startTime);
            const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
            const isK = b.lastInput.toString().toUpperCase().startsWith("DE");
            const mat = b.displayValue.match(/[\d.]+/);
            const lv  = b.displayValue === "ON" ? 99 : (mat ? Math.floor(parseFloat(mat[0])) : 0);
            const isW = (lv<2&&m>=12)||(lv>=2&&lv<3&&m>=7)||(lv>=3&&lv<4&&m>=5)||(lv===4&&m>=3)||(lv===99&&m>=3);
            stageEl.innerHTML = `${isK ? "已擊殺" : b.displayValue}`;
            stageEl.className = `stage-label${b.isFlash ? ' flash-anim' : ''}`;
            if (!isGrey) stageEl.style.color = statusColor;
            if (elapsedEl) {
                elapsedEl.innerHTML = `(${m}:${s.toString().padStart(2,'0')})${(showWarningIcon && isW && !isGrey && !isK) ? ' ⚠️' : ''}`;
                elapsedEl.style.color = isGrey ? (isLightMode ? '#bcbcbc' : '#555') : (isLightMode ? '#999' : '#888');
            }
        }
    };
    up();
    timers[id] = setInterval(up, 1000);
}

/* ════════ saveBoss ════════ */
function saveBoss(map, ch, val, doFocus = false) {
    const pass = protectedRooms[currentRoom];
    if (pass && map.toUpperCase() === "ADMIN" && ch === pass) {
        localStorage.setItem(`auth_${currentRoom}`, pass);
        alert("管理員權限已解鎖！");
        document.getElementById('bossInput').value = '';
        renderList(); return;
    }
    const id = `${map}_${ch}`;
    const oldData = window.currentData ? window.currentData[id] : null;
    const oldStatus = oldData ? (oldData.displayValue || "新建立") : "新建立";

    // 人數解析：最後一段純數字為人數，否則保留舊值
    let valStr = val.toString().trim();
    const existingCount = oldData ? (oldData.memberCount || 0) : 0;
    let memberCount = existingCount; // 預設保留舊值
    const parts = valStr.split(/\s+/);
    if (parts.length >= 2 && /^\d+$/.test(parts[parts.length - 1])) {
        memberCount = parseInt(parts[parts.length - 1]);
        valStr = parts.slice(0, -1).join(' ');
    }

    let dv = valStr, tt = 0, flash = false, uv = valStr.toUpperCase();
    if (uv.startsWith("00")) { let r=uv.replace("00",""); uv=(r.length===2&&!r.includes('.'))?("R"+r[0]+"."+r[1]):("R"+r); }
    if      (uv.startsWith("XX"))  { dv = "閒置"; }
    else if (uv.startsWith("DE"))  { dv = "已擊殺"; }
    else if (uv === "ON")          { dv = "ON"; flash = true; }
    else if (uv.startsWith("R"))   { const rn=uv.substring(1); dv="階段"+rn; if(parseFloat(rn)>=4.0) flash=true; }
    else {
        const ps = uv.split(/[:.：]/);
        tt = Date.now() + ((ps.length===2 ? parseInt(ps[0])*60+parseInt(ps[1]) : parseFloat(uv)||0)*60000);
    }

    // 人數 ≥ 30 自動切換為 MAX
    const autoMax = memberCount >= 30;

    const updatePayload = {
        map, ch, targetTime: tt, lastInput: uv, displayValue: dv,
        startTime: Date.now(), isFlash: flash, updater: myName,
        memberCount: memberCount, isMax: autoMax
    };

    if (tt > 0 || uv.startsWith("DE")) {
        const oldCP = oldData ? (oldData.callPriority || 0) : 0;
        updatePayload.callPriority = 0;
        // 進入計時或擊殺時，重置人數與MAX
        updatePayload.memberCount = 0;
        updatePayload.isMax = false;
        if (oldCP === 1) {
            setTimeout(() => {
                const slots = getCallSlots();
                if (slots.p2id) db.ref(`rooms/${currentRoom}/bosses/${slots.p2id}/callPriority`).set(1);
            }, 300);
        }
    }

    db.ref(`rooms/${currentRoom}/bosses/${id}`).update(updatePayload);
    setTimeout(() => db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false), 3000);
    if (doFocus) {
        const inp = document.getElementById('bossInput');
        if (inp) { inp.value = `${map} ${ch} ${uv}`; inp.focus(); }
    }
    document.getElementById('inputHint').classList.remove('warning');

    const logRef = db.ref(`rooms/${currentRoom}/logs`);
    logRef.push({ name: myName, boss: `${map}-${ch}`, oldVal: oldStatus, newVal: dv, t: Date.now() });
    logRef.once('value', snapshot => {
        const total = snapshot.numChildren();
        if (total > 100) { let count=0; snapshot.forEach(child=>{ if(count<total-100) child.ref.remove(); count++; }); }
    });
}

/* ════════ 紀錄 ════════ */
let logDisplayModes = [0, 3, 5, 10], currentLogModeIndex = 1, lastLogData = null;

}
function viewFullLogs() {
    if (!lastLogData) { alert("尚無編輯紀錄"); return; }
    const logs = Object.values(lastLogData).sort((a, b) => b.t - a.t);
    const body = document.getElementById('logModalBody'); body.innerHTML = '';
    const counts = {}; logs.forEach(l => { counts[l.name] = (counts[l.name]||0)+1; });
    const maxEdit = Math.max(...Object.values(counts), 1);
    const getColor = name => { if(name.startsWith('#')) return '#888'; const c=counts[name]||0; return `hsl(50,${40+(c/maxEdit)*60}%,${50+(c/maxEdit)*35}%)`; };
    logs.forEach((l, i) => {
        const time = new Date(l.t).toLocaleTimeString('zh-TW', { hour12: false });
        const entry = document.createElement('div'); entry.className = 'log-entry';
        entry.innerHTML = `<span style="color:#444;">${i+1}. [${time}]</span> <span style="color:${getColor(l.name)};font-weight:bold;">${l.name}</span> <span style="color:#aaa;">將</span> <span class="log-boss-name" style="color:#fff;">${l.boss}</span> <span style="color:#f66;">${l.oldVal}</span> <span style="color:#aaa;">改為</span> <span class="log-new-val" style="color:#0f0;">${l.newVal}</span>`;
        body.appendChild(entry);
    });
    document.getElementById('logModal').classList.add('show');
}
function closeLogModal() { document.getElementById('logModal').classList.remove('show'); }
document.getElementById('logModal').addEventListener('click', function(e) { if(e.target===this) closeLogModal(); });
function initLogs() {
    db.ref(`rooms/${currentRoom}/logs`).limitToLast(100).on('value', s => {
        lastLogData = s.val(); renderLogs(lastLogData); updateOnlineUsersDisplay(); renderList();
    });
}
function renderLogs(data) {
    const container = document.getElementById('logList'), mode = logDisplayModes[currentLogModeIndex];
    if (!container || mode === 0) return;
    let logs = data ? Object.values(data) : []; logs.sort((a, b) => b.t - a.t);
    contributorCounts = {}; logs.forEach(l => { contributorCounts[l.name] = (contributorCounts[l.name]||0)+1; });
    contributorMax = Math.max(...Object.values(contributorCounts), 1);
    const getColor = name => { const c=contributorCounts[name]||0,isG=name.startsWith('#'); if(!c) return '#777'; return `hsl(50,${(isG?30:40)+(c/contributorMax)*(isG?40:60)}%,${(isG?40:55)+(c/contributorMax)*(isG?30:35)}%)`; };
    container.innerHTML = '';
    logs.slice(0, mode).forEach(l => {
        const time = new Date(l.t).toLocaleTimeString('zh-TW', { hour12: false });
        container.innerHTML += `<div style="border-bottom:1px solid #1a1a1a;padding:4px 0;"><span style="color:#444;">[${time}]</span> <span style="color:${getColor(l.name)};font-weight:bold;">${l.name}</span> <span style="color:#aaa;">將</span> <span class="log-boss-name" style="color:#fff;">${l.boss}</span> <span style="color:#f66;">${l.oldVal}</span> <span style="color:#aaa;">改為</span> <span class="log-new-val" style="color:#0f0;">${l.newVal}</span></div>`;
    });
}
function updateOnlineUsersDisplay() {
    const container = document.getElementById('onlineUsers'); if (!container || !currentOnlineUsers.length) return;
    const onlineCounts = currentOnlineUsers.map(n => contributorCounts[n] || 0);
    const onlineMax = Math.max(...onlineCounts, 0);
    const getColor = name => { const c=contributorCounts[name]||0,isG=name.startsWith('#'); if(!c) return '#555'; return `hsl(50,${(isG?30:40)+(c/contributorMax)*(isG?40:60)}%,${(isG?40:55)+(c/contributorMax)*(isG?30:35)}%)`; };
    container.innerHTML = currentOnlineUsers.map(name => {
        const color = getColor(name), count = contributorCounts[name] || 0;
        const isTop = (count === onlineMax && count >= 5);
        return `<span class="${isTop?'top-editor':''}" style="color:${color};" title="已編輯 ${count} 次">${name}</span>`;
    }).join('<span style="color:#333;"> · </span>');
}

/* ════════ triggerNext ════════ */
function triggerNext(m, c) {
    db.ref(`rooms/${currentRoom}/bosses/${m}_${c}`).once('value', s => {
        const d = s.val(); if (!d) return;
        let cur = d.lastInput.toString().toUpperCase();
        if (cur === "ON") { saveBoss(m, c, "DE1"); db.ref(`rooms/${currentRoom}/bosses/${m}_${c}/callPriority`).set(0); }
        else if (cur.startsWith("R")) { const n=parseFloat(cur.substring(1))||0; const nx=Math.floor(n)+1; if(nx>=5) saveBoss(m,c,"ON"); else saveBoss(m,c,"R"+nx); }
        else saveBoss(m, c, "ON");
    }); unlockAudio();
}

/* ════════ 版本檢查 ════════ */
function isNewerVersion(current, latest) {
    if (!latest) return false;
    const v1=current.split('.').map(Number), v2=latest.split('.').map(Number);
    for (let i=0; i<Math.max(v1.length,v2.length); i++) { const n1=v1[i]||0,n2=v2[i]||0; if(n2>n1) return true; if(n2<n1) return false; }
    return false;
}

/* ════════ 登入 ════════ */
function startSession(id) {
    currentRoom = id.toUpperCase();
    db.ref('app_version').on('value', snapshot => {
        const latest = snapshot.val();
        if (isNewerVersion(currentVersion, latest)) { alert(`系統有重要更新 (v${latest})，網頁將自動重新整理。`); location.reload(true); }
    });
    let inputName = document.getElementById('userNameInput').value.trim();
    if (!inputName) {
        let savedID = localStorage.getItem('tos_fixed_id');
        if (!savedID) { savedID = "#" + Math.floor(1000 + Math.random() * 9000); localStorage.setItem('tos_fixed_id', savedID); }
        myName = savedID;
    } else { myName = inputName; }
    db.ref(`rooms/${currentRoom}/users`).once('value', snapshot => {
        const users = snapshot.val() ? Object.values(snapshot.val()) : [];
        if (users.some(u => u.name === myName)) myName += "(" + Math.floor(Math.random()*99).toString().padStart(2,'0') + ")";
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainView').style.display  = 'block';
        document.getElementById('displayID').innerText = currentRoom;
        updateVolBg(document.getElementById('volRange'));
        document.getElementById('bossInput').addEventListener('keypress', e => { if(e.key==='Enter') addBoss(); });
        db.ref(`rooms/${currentRoom}/users`).push({ name: myName }).onDisconnect().remove();
        db.ref(`rooms/${currentRoom}/users`).on('value', s => {
            const u = Object.values(s.val() || {});
            document.getElementById('onlineCount').innerText = u.length;
            currentOnlineUsers = u.map(x => x.name);
            updateOnlineUsersDisplay(); renderList();
        });
        db.ref(`rooms/${currentRoom}/bosses`).on('value', s => {
            const incoming = s.val() || {};
            Object.keys(incoming).forEach(k => {
                const b = incoming[k], v = b.lastInput.toString().toUpperCase();
                if (v !== lastProcessedInput[k] && b.isFlash) {
                    const isPinned = !!localPinned[`${currentRoom}_${k}`];
                    const shouldAlert = !pinAlertMode || isPinned;
                    if (shouldAlert) {
                        if (v === "ON") { if(isOnSfxEnabled) playDing(880); speak(`${b.map}分流${b.ch}重生`); }
                        else if (v.startsWith("R")) { const n=parseFloat(v.substring(1))||0; if(n>=4.0){ if(isR4SfxEnabled) playDing(440); speak(`${b.map}分流${b.ch}階段${n}`); } }
                    }
                }
                lastProcessedInput[k] = v;
            });
            window.currentData = incoming; renderList();
        });
        initChat(); initLogs(); initNotice();
    });
}

  // 計算徽章範圍：若使用者已設定則用使用者的，否則用預設比例
  function getBadgeRect(statusRegion) {
    if (state.badgeRect) return { ...state.badgeRect };
    return {
      x: Math.floor(statusRegion.w * 0.55),
      y: 0,
      w: Math.ceil(statusRegion.w * 0.45),
      h: Math.floor(statusRegion.h * 0.5)
    };
  }

  function levenshtein(a, b) {
    if (!a.length) return b.length;
    if (!b.length) return a.length;
    const m = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1));
    for (let i = 0; i <= a.length; i++) m[i][0] = i;
    for (let j = 0; j <= b.length; j++) m[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        m[i][j] = a[i-1] === b[j-1] ? m[i-1][j-1] :
          1 + Math.min(m[i-1][j-1], m[i][j-1], m[i-1][j]);
      }
    }
    return m[a.length][b.length];
  }
  function similarity(a, b) {
    if (!a || !b) return 0;
    return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
  }
  function otsuThreshold(hist, total) {
    let sum = 0;
    for (let i = 0; i < 256; i++) sum += i * hist[i];
    let sumB = 0, wB = 0, wF = 0, maxVar = 0, th = 0;
    for (let t = 0; t < 256; t++) {
      wB += hist[t]; if (wB === 0) continue;
      wF = total - wB; if (wF === 0) break;
      sumB += t * hist[t];
      const mB = sumB / wB, mF = (sum - sumB) / wF;
      const v = wB * wF * (mB - mF) * (mB - mF);
      if (v > maxVar) { maxVar = v; th = t; }
    }
    return th;
  }
  function upscale(src, scale) {
    const out = document.createElement('canvas');
    out.width = src.width * scale; out.height = src.height * scale;
    const ctx = out.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(src, 0, 0, out.width, out.height);
    return out;
  }
  function toGrayscale(canvas) {
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = g;
    }
    ctx.putImageData(img, 0, 0);
    return canvas;
  }
  function stretchContrast(canvas) {
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = img.data;
    const h = new Array(256).fill(0);
    for (let i = 0; i < d.length; i += 4) h[d[i]]++;
    const total = d.length / 4;
    let lo = 0, hi = 255, c = 0;
    for (let i = 0; i < 256; i++) { c += h[i]; if (c >= total * 0.05) { lo = i; break; } }
    c = 0;
    for (let i = 255; i >= 0; i--) { c += h[i]; if (c >= total * 0.05) { hi = i; break; } }
    const range = hi - lo;
    if (range <= 0) return canvas;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.max(0, Math.min(255, ((d[i] - lo) / range) * 255));
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(img, 0, 0);
    return canvas;
  }
  function binarizeOtsu(canvas, invert = false) {
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = img.data;
    const h = new Array(256).fill(0);
    for (let i = 0; i < d.length; i += 4) h[d[i]]++;
    const th = otsuThreshold(h, d.length / 4);
    for (let i = 0; i < d.length; i += 4) {
      const v = d[i] > th ? 255 : 0;
      d[i] = d[i+1] = d[i+2] = invert ? (255 - v) : v;
    }
    ctx.putImageData(img, 0, 0);
    return canvas;
  }
  function extractBrightPixels(sourceCanvas, threshold = 200) {
    const out = document.createElement('canvas');
    out.width = sourceCanvas.width;
    out.height = sourceCanvas.height;
    const ctx = out.getContext('2d');
    ctx.drawImage(sourceCanvas, 0, 0);
    const img = ctx.getImageData(0, 0, out.width, out.height);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const maxC = Math.max(r, g, b);
      const minC = Math.min(r, g, b);
      const saturation = maxC - minC;
      const isBrightWhite = maxC > threshold && saturation < 60;
      const v = isBrightWhite ? 0 : 255;
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(img, 0, 0);
    return out;
  }
  function preprocessForOCR(src, opts = {}) {
    let c = upscale(src, opts.scale || 4);
    toGrayscale(c);
    if (opts.useStretch !== false) stretchContrast(c);
    binarizeOtsu(c, opts.invert || false);
    return c;
  }

  function analyzeStatusMetrics(region) {
    const canvas = document.getElementById('dCanStatus');
    canvas.width = region.w; canvas.height = region.h;
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('dVideo');
    ctx.drawImage(video, region.x, region.y, region.w, region.h, 0, 0, region.w, region.h);

    const imageData = ctx.getImageData(0, 0, region.w, region.h);
    const data = imageData.data;
    const w = region.w, h = region.h;
    let redCount = 0, whiteCount = 0, totalBright = 0;
    const n = w * h;

    const badge = getBadgeRect(region);
    const badgeX1 = badge.x, badgeY1 = badge.y;
    const badgeX2 = badge.x + badge.w, badgeY2 = badge.y + badge.h;
    let badgeWhiteCount = 0, badgeTotalPx = 0;

    const debugCanvas = state.debugMode ? document.getElementById('dDebugCanvas') : null;
    let debugData = null;
    if (debugCanvas) {
      debugCanvas.width = w * 4;
      debugCanvas.height = h * 4;
      const dctx = debugCanvas.getContext('2d');
      dctx.imageSmoothingEnabled = false;
      dctx.drawImage(canvas, 0, 0, debugCanvas.width, debugCanvas.height);
      debugData = dctx.getImageData(0, 0, debugCanvas.width, debugCanvas.height);
    }

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        const r = data[i], g = data[i+1], b = data[i+2];
        const bright = (r + g + b) / 3;
        const maxC = Math.max(r, g, b);
        const minC = Math.min(r, g, b);
        totalBright += bright;
        const isRed = r > 80 && (r - Math.max(g, b)) > 25;
        const isBrightWhite = maxC > 200 && (maxC - minC) < 60;
        if (isRed) {
          redCount++;
          if (debugData) {
            for (let dy = 0; dy < 4; dy++) for (let dx = 0; dx < 4; dx++) {
              const px = (x * 4 + dx), py = (y * 4 + dy);
              const di = (py * debugCanvas.width + px) * 4;
              debugData.data[di] = 0; debugData.data[di+1] = 255; debugData.data[di+2] = 0;
            }
          }
        }
        if (isBrightWhite) {
          whiteCount++;
          if (debugData) {
            for (let dy = 0; dy < 4; dy++) for (let dx = 0; dx < 4; dx++) {
              const px = (x * 4 + dx), py = (y * 4 + dy);
              const di = (py * debugCanvas.width + px) * 4;
              debugData.data[di] = 0; debugData.data[di+1] = 120; debugData.data[di+2] = 255;
            }
          }
        }
        if (x >= badgeX1 && x < badgeX2 && y >= badgeY1 && y < badgeY2) {
          badgeTotalPx++;
          if (isBrightWhite) badgeWhiteCount++;
        }
      }
    }
    if (debugData) {
      const dctx = debugCanvas.getContext('2d');
      dctx.putImageData(debugData, 0, 0);
      dctx.strokeStyle = '#f80';
      dctx.lineWidth = 2;
      dctx.strokeRect(badgeX1 * 4, badgeY1 * 4, (badgeX2 - badgeX1) * 4, (badgeY2 - badgeY1) * 4);
      dctx.fillStyle = '#f80';
      dctx.font = 'bold 11px sans-serif';
      dctx.fillText('徽章', badgeX1 * 4 + 2, badgeY1 * 4 + 12);
    }
    return {
      redRatio: redCount / n,
      whiteRatio: whiteCount / n,
      badgeWhiteRatio: badgeTotalPx > 0 ? badgeWhiteCount / badgeTotalPx : 0,
      avgTotalBright: totalBright / n
    };
  }

  async function ocrBadge(region) {
    const badge = getBadgeRect(region);
    const badgeRegion = {
      x: region.x + badge.x,
      y: region.y + badge.y,
      w: badge.w,
      h: badge.h
    };
    const src = document.createElement('canvas');
    src.width = badgeRegion.w; src.height = badgeRegion.h;
    const video = document.getElementById('dVideo');
    src.getContext('2d').drawImage(video,
      badgeRegion.x, badgeRegion.y, badgeRegion.w, badgeRegion.h,
      0, 0, badgeRegion.w, badgeRegion.h);

    const passes = [
      { name: 'b180', preprocess: (s) => extractBrightPixels(upscale(s, 8), 180) },
      { name: 'b210', preprocess: (s) => extractBrightPixels(upscale(s, 8), 210) },
      { name: 'otsu', preprocess: (s) => preprocessForOCR(s, { scale: 8 }) },
      { name: 'otsuI', preprocess: (s) => preprocessForOCR(s, { scale: 8, invert: true }) }
    ];
    const results = [];
    for (const p of passes) {
      try {
        const processed = p.preprocess(src);
        const { data } = await Tesseract.recognize(processed, 'eng', {
          logger: () => {},
          tessedit_pageseg_mode: '10',
          tessedit_char_whitelist: 'ON1234'
        });
        const text = data.text.trim().replace(/\s+/g, '').replace(/[^ON1234]/g, '');
        results.push({ pass: p.name, text, confidence: data.confidence / 100 });
      } catch (e) {
        results.push({ pass: p.name, text: '', confidence: 0 });
      }
    }
    if (state.debugMode) console.log(DEBUG_PREFIX, 'ocrBadge', results);
    const votes = {};
    for (const r of results) {
      if (!r.text) continue;
      if (!votes[r.text]) votes[r.text] = { count: 0, totalConf: 0 };
      votes[r.text].count++;
      votes[r.text].totalConf += r.confidence;
    }
    let bestText = '', bestScore = 0;
    for (const [text, info] of Object.entries(votes)) {
      const score = info.count * (info.totalConf / info.count);
      if (score > bestScore) { bestScore = score; bestText = text; }
    }
    const avgConf = votes[bestText] ? votes[bestText].totalConf / votes[bestText].count : 0;
    return { text: bestText, confidence: avgConf };
  }

  async function detectPhase(region) {
    const metrics = analyzeStatusMetrics(region);
    const ocr = await ocrBadge(region);
    const minOcrConf = 0.3;
    const text = ocr.text.toUpperCase();
    let phase, confidence;
    const hasWhiteInBadge = metrics.badgeWhiteRatio > 0.03;
    if (ocr.confidence >= minOcrConf && text) {
      if (text === 'ON') { phase = 'ON'; confidence = ocr.confidence; }
      else if (text === '1') { phase = 'R1'; confidence = ocr.confidence; }
      else if (text === '2') { phase = 'R2'; confidence = ocr.confidence; }
      else if (text === '3') { phase = 'R3'; confidence = ocr.confidence; }
      else if (text === '4') { phase = 'R4'; confidence = ocr.confidence; }
      else { phase = 'WAITING'; confidence = 0.5; }
    } else {
      phase = 'WAITING';
      confidence = hasWhiteInBadge ? 0.3 : 0.9;
    }
    return { phase, confidence, metrics, ocrText: text };
  }

  async function ocrMultiPass(region, targetCanvas, lang, whitelist, psm) {
    const src = document.createElement('canvas');
    src.width = region.w; src.height = region.h;
    const video = document.getElementById('dVideo');
    src.getContext('2d').drawImage(video, region.x, region.y, region.w, region.h, 0, 0, region.w, region.h);
    if (targetCanvas) {
      targetCanvas.width = region.w; targetCanvas.height = region.h;
      targetCanvas.getContext('2d').drawImage(src, 0, 0);
    }
    const passes = [
      { opts: { scale: 4, invert: false } },
      { opts: { scale: 4, invert: true } },
      { opts: { scale: 6, invert: false } }
    ];
    const results = [];
    for (const p of passes) {
      try {
        const c = preprocessForOCR(src, p.opts);
        const o = { logger: () => {}, tessedit_pageseg_mode: psm || '7' };
        if (whitelist) o.tessedit_char_whitelist = whitelist;
        const { data } = await Tesseract.recognize(c, lang, o);
        results.push({
          text: data.text.trim().replace(/\s+/g, ''),
          confidence: data.confidence / 100
        });
      } catch (e) {
        results.push({ text: '', confidence: 0 });
      }
    }
    results.sort((a, b) => b.confidence - a.confidence);
    return results[0];
  }

  function matchMapName(ocrText) {
    if (!ocrText) return { matched: null, confidence: 0, raw: ocrText };
    const numMatch = ocrText.match(/^\d{1,3}$/);
    if (numMatch) return { matched: numMatch[0], confidence: 1.0, raw: ocrText };
    if (state.mapDictionary[ocrText]) {
      return { matched: state.mapDictionary[ocrText], confidence: 1.0, raw: ocrText };
    }
    let bestMatch = null, bestSim = 0, bestKey = '';
    for (const [key, code] of Object.entries(state.mapDictionary)) {
      const sim = similarity(ocrText, key);
      if (sim > bestSim) { bestSim = sim; bestMatch = code; bestKey = key; }
    }
    if (bestSim >= 0.6) return { matched: bestMatch, confidence: bestSim, raw: ocrText, matchedName: bestKey };
    if (typeof window.currentData === 'object') {
      const active = new Set();
      Object.values(window.currentData).forEach(b => { if (b.map) active.add(b.map); });
      for (const code of active) {
        if (ocrText.includes(code)) return { matched: code, confidence: 0.8, raw: ocrText };
      }
    }
    return { matched: null, confidence: 0, raw: ocrText };
  }

  function contributeMapAlias(ocrRaw, correctCode) {
    if (!ocrRaw || !correctCode || ocrRaw === correctCode) return;
    if (ocrRaw.length < 2 || ocrRaw.length > 20) return;
    if (/^\d+$/.test(ocrRaw)) return;
    const safeKey = ocrRaw.replace(/[.#$[\]/]/g, '_');
    db.ref(`shared/mapDictionary/${safeKey}`).set(correctCode)
      .then(() => log(`🎓 已貢獻：「${ocrRaw}」= ${correctCode}`, '#ff0'))
      .catch(e => log('❌ 貢獻失敗（Firebase 規則問題）: ' + e.message, '#f33'));
  }

  function log(msg, color = '#888') {
    const t = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    const el = document.getElementById('dLog');
    if (el) {
      el.innerHTML = `<div class="log-line" style="color:${color}">[${t}] ${msg}</div>` + el.innerHTML;
      const lines = el.querySelectorAll('.log-line');
      if (lines.length > 30) lines[lines.length - 1].remove();
    }
    const cs = document.getElementById('dCompactStatus');
    if (cs && !msg.startsWith('環紅') && !msg.startsWith('📚')) {
      cs.textContent = msg.length > 30 ? msg.slice(0, 30) + '...' : msg;
      cs.style.color = color;
    }
  }

  function updateDictInfo(override) {
    const el = document.getElementById('dDictInfo');
    if (!el) return;
    if (override) { el.innerHTML = override; return; }
    const total = Object.keys(state.mapDictionary).length;
    const builtin = Object.keys(BUILTIN_MAP_DICTIONARY).length;
    const custom = total - builtin;
    el.innerHTML = `📚 共 <b style="color:#0f0">${total}</b> 筆（內建 ${builtin} + 貢獻 ${custom}）`;
  }

  function applyZoom() {
    const video = document.getElementById('dVideo');
    const zoomVal = document.getElementById('dZoomVal');
    if (!video || !video.videoWidth) return;
    video.style.width = (video.videoWidth * state.zoom) + 'px';
    video.style.height = (video.videoHeight * state.zoom) + 'px';
    if (zoomVal) zoomVal.textContent = state.zoom.toFixed(1) + 'x';
    for (const k of ['status', 'map', 'ch']) {
      if (state.regions[k]) drawRegionBox(k, state.regions[k]);
    }
  }

  function drawRegionBox(key, region) {
    const video = document.getElementById('dVideo');
    const boxId = 'dBox' + key.charAt(0).toUpperCase() + key.slice(1);
    const box = document.getElementById(boxId);
    if (!video.videoWidth) return;
    const cssScale = video.clientWidth / video.videoWidth;
    box.style.left = (region.x * cssScale) + 'px';
    box.style.top = (region.y * cssScale) + 'px';
    box.style.width = (region.w * cssScale) + 'px';
    box.style.height = (region.h * cssScale) + 'px';
    box.style.display = 'block';
  }

  // ═══ 徽章編輯器渲染 ═══
  function renderBadgeEditor() {
    const section = document.getElementById('dBadgeSection');
    if (!state.regions.status) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';

    const canvas = document.getElementById('dBadgeEditCanvas');
    const video = document.getElementById('dVideo');
    const region = state.regions.status;

    // 把狀態圖示區域放大顯示到編輯器
    const scale = Math.min(6, Math.floor(200 / Math.max(region.w, region.h)));
    const displayScale = Math.max(4, scale);
    canvas.width = region.w * displayScale;
    canvas.height = region.h * displayScale;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(video,
      region.x, region.y, region.w, region.h,
      0, 0, canvas.width, canvas.height);

    // 把徽章框顯示出來
    const badge = getBadgeRect(region);
    const editBox = document.getElementById('dBadgeEditBox');
    editBox.style.left = (badge.x * displayScale) + 'px';
    editBox.style.top = (badge.y * displayScale) + 'px';
    editBox.style.width = (badge.w * displayScale) + 'px';
    editBox.style.height = (badge.h * displayScale) + 'px';

    // 記錄當前顯示比例以便拖曳計算
    state._badgeDisplayScale = displayScale;

    updateBadgeInfo();
  }

  function updateBadgeInfo() {
    const region = state.regions.status;
    if (!region) return;
    const badge = getBadgeRect(region);
    const el = document.getElementById('dBadgeInfo');
    if (el) {
      el.textContent = `徽章範圍：(${badge.x}, ${badge.y}) ${badge.w}×${badge.h}px`;
    }
  }

  function switchPanelMode(mode) {
    state.panelMode = mode;
    const panel = document.getElementById('detectorPanel');
    panel.className = mode + (panel.classList.contains('open') ? ' open' : '');
    const btn = document.getElementById('dToggleMode');
    if (btn) {
      btn.textContent = mode === 'compact' ? '⚙️' : '🗕';
      btn.title = mode === 'compact' ? '展開完整模式' : '收回精簡模式';
    }
  }

    const panel = document.getElementById('detectorPanel');
