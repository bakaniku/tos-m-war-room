<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME v1.3.2</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .ver-info { color: #444; font-size: 10px; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 11px; padding: 5px 10px; border-radius: 6px; }
        .btn-toggle { background: #222; color: #888; font-size: 12px; padding: 5px 10px; border: 1px solid #444; }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; }
        
        .audio-controls { display: flex; align-items: center; gap: 5px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; height: 32px; }
        .audio-btn { background: none; color: #0f0; padding: 0; font-size: 14px; cursor: pointer; border: none; opacity: 0.3; }
        .audio-btn.active { opacity: 1; }
        .vol-range { -webkit-appearance: none; width: 60px; height: 4px; background: #333; border-radius: 2px; outline: none; background-image: linear-gradient(#0f0, #0f0); background-repeat: no-repeat; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #0f0; border-radius: 50%; cursor: pointer; }

        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; margin-bottom: 5px; font-size: 16px; color: #fff; padding: 8px 0; outline: none; }
        .input-hint { font-size: 11px; color: #444; margin-bottom: 15px; }
        .input-hint.warning { color: #f33; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; }
        .card-title-row { display: flex; align-items: center; gap: 6px; }
        .card h3 { margin: 0; color: #aaa; font-size: 15px; cursor: pointer; border-bottom: 1px dashed #444; }
        
        .swap-btn { font-size: 9px; color: #0af; background: #001a22; border: 1px solid #045; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
        .del { position: absolute; top: 8px; right: 8px; color: #444; background: none; border: none; font-size: 16px; cursor: pointer; }
        
        .timer { font-size: 18px; font-weight: bold; margin-top: 8px; font-family: monospace; }
        .on-status { text-shadow: 0 0 8px #FF00FF; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .btn-next { background: #000; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 6px; cursor: pointer; margin-top: 8px; border: 2px solid; text-transform: uppercase; }

        #chatPanel { margin-bottom: 15px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; }
        #chatPanel.chat-hidden { display: none; }
        .chat-msgs { overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; height: 120px; }
        .msg-row { display: flex; gap: 8px; font-size: 12px; line-height: 1.4; }
        .msg-name { color: #0f0; min-width: 40px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="loginView" class="login-view">
            <div class="title">TOS M FB TIME</div>
            <div class="ver-info">v1.3.2</div>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="你的稱呼" maxlength="10">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <input type="text" id="roomInput" placeholder="輸入房號" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-info">
                    <span class="room-id" id="displayID"></span>
                    <div class="audio-controls">
                        <button id="voiceBtn" class="audio-btn" onclick="toggleVoice()">🔊</button>
                        <input type="range" id="volRange" class="vol-range" min="0" max="1" step="0.01" value="0.5" oninput="updateVolBg(this)">
                        <button id="onSfxBtn" title="ON音效" class="audio-btn" onclick="toggleOnSfx()">📢</button>
                        <button id="r4SfxBtn" title="R4音效" class="audio-btn" onclick="toggleR4Sfx()">🛡️</button>
                        <button id="colorModeBtn" class="audio-btn active" onclick="toggleColorMode()">🎨</button>
                        <button id="chatBtn" class="audio-btn active" onclick="toggleChat()">💬</button>
                    </div>
                </div>
                <div>
                    <button class="btn-danger" onclick="clearAllBosses()">一鍵清除</button>
                    <button style="background:none; color:#444;" onclick="location.reload()">退出</button>
                </div>
            </div>

            <div id="chatPanel" class="chat-full">
                <div class="chat-msgs" id="chatMsgs"></div>
                <div class="chat-input-row" style="display:flex; border-top:1px solid #1a1a1a;">
                    <input type="text" id="chatInput" style="flex:1; background:none; border:none; color:#fff; padding:8px 12px; font-size:12px;" placeholder="發送訊息..." onkeypress="if(event.key==='Enter')sendMsg()">
                </div>
            </div>

            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 階段/分鐘" oninput="checkDuplicate()">
            <div class="input-hint" id="inputHint">範例：80 3 R1.5 ｜ 80 3 ON ｜ 指令：ADMIN 暗號 1</div>
            
            <div id="renderArea"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI", authDomain: "tos-m-fb.firebaseapp.com", databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tos-m-fb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '', timers = {}, currentSort = 'time', isVoiceEnabled = false, isOnSfxEnabled = false, isR4SfxEnabled = false;
        let myName = 'No Name', showWarningIcon = true, colorMode = 1, audioCtx = null, chatMode = 'full', lastReadMsgTime = 0;
        window.currentData = {};
        let localPinned = JSON.parse(localStorage.getItem('tos_pinned_bosses') || '{}');
        let lastProcessedInput = {};

        const protectedRooms = { '000000': 'tosm' };
        function hasAuth() { const p = protectedRooms[currentRoom]; return !p || localStorage.getItem(`auth_${currentRoom}`) === p; }

        function checkDuplicate() {
            const i = document.getElementById('bossInput'); const h = document.getElementById('inputHint');
            const p = i.value.trim().split(/\s+/);
            if (p.length >= 2) {
                const id = `${p[0]}_${p[1]}`;
                if (window.currentData && window.currentData[id]) {
                    h.innerText = `⚠️ 該分流已存在！`; h.classList.add('warning'); return;
                }
            }
            h.innerText = `範例：80 3 R1.5 ｜ 80 3 ON ｜ 指令：ADMIN 暗號 1`; h.classList.remove('warning');
        }

        function getStatusColor(w) {
            const c = { 7:'#9dadc1', 6:'#FF00FF', 5:'#FF0000', 4:'#FF4500', 3:'#FFA500', 2:'#FFFF00', 1:'#00FF00', 0:'#FF3300' };
            return c[w] || '#fff';
        }

        function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playDing(f = 880) { 
            unlockAudio(); const v = parseFloat(document.getElementById('volRange').value);
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(v * 0.3, audioCtx.currentTime + 0.01);
            o.start(); o.stop(audioCtx.currentTime + 0.3);
        }

        function speak(t) { if (!isVoiceEnabled) return; window.speechSynthesis.cancel(); const v = parseFloat(document.getElementById('volRange').value); const m = new SpeechSynthesisUtterance(t); m.volume = v; m.lang = 'zh-TW'; window.speechSynthesis.speak(m); }

        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voiceBtn').classList.toggle('active', isVoiceEnabled); if(isVoiceEnabled) speak("語音開啟"); }
        function toggleOnSfx() { isOnSfxEnabled = !isOnSfxEnabled; document.getElementById('onSfxBtn').classList.toggle('active', isOnSfxEnabled); if(isOnSfxEnabled) playDing(880); }
        function toggleR4Sfx() { isR4SfxEnabled = !isR4SfxEnabled; document.getElementById('r4SfxBtn').classList.toggle('active', isR4SfxEnabled); if(isR4SfxEnabled) playDing(440); }
        function toggleColorMode() { colorMode = colorMode === 1 ? 2 : 1; renderList(); }
        function toggleChat() {
            const p = document.getElementById('chatPanel'); const b = document.getElementById('chatBtn');
            chatMode = (chatMode === 'full') ? 'hidden' : 'full';
            p.className = chatMode === 'full' ? 'chat-full' : 'chat-hidden';
            b.style.opacity = chatMode === 'full' ? '1' : '0.3';
        }

        function getBossStatus(b, id) {
            const now = Date.now();
            let w = -1; const s = parseFloat((b.displayValue || '').match(/[\d.]+/)) || 0;
            if (b.lastInput.toUpperCase().startsWith("DE")) w = 7;
            else if (b.displayValue === "ON") w = 6;
            else if (b.displayValue.includes("4")) w = 5;
            else if (b.displayValue.includes("3")) w = 4;
            else if (b.displayValue.includes("2")) w = 3;
            else if (b.displayValue.includes("1")) w = 2;
            else if (b.targetTime > 0) w = (b.targetTime > now) ? 1 : 0;
            
            const mapLv = parseInt((b.map || '').match(/\d+/)) || 0;
            return { weight: w, stageVal: s, color: getStatusColor(w), pinned: !!localPinned[`${currentRoom}_${id}`], mapLv };
        }

        // --- 優化：換線功能 (高等地圖保護) ---
        function handleSwap(id) {
            if (!hasAuth()) return;
            const b = window.currentData[id]; if(!b) return;
            const st = getBossStatus(b, id);
            
            // EP17 保護：等級 >= 135 不允許換線覆蓋
            if (st.mapLv >= 135) {
                alert("此為熱門高等地圖 (EP17+)，為了資訊安全，禁止使用快速換線功能。");
                return;
            }

            const newCh = b.ch == "1" ? "2" : "1";
            if (confirm(`確定將 ${b.map} 進度轉移至 CH${newCh}？\n注意：這將會直接覆蓋 CH${newCh} 原有的資訊。`)) {
                saveBoss(b.map, newCh, b.lastInput);
                db.ref(`rooms/${currentRoom}/bosses/${id}`).remove();
            }
        }

        function renderList() {
            const area = document.getElementById('renderArea'); if(!area) return;
            area.innerHTML = ''; Object.values(timers).forEach(clearInterval); timers = {};
            const all = Object.entries(window.currentData); const auth = hasAuth();

            const drawBox = (items, label) => {
                if (items.length === 0) return;
                const sec = document.createElement('div'); sec.innerHTML = `<div class="section-label" style="color:#555; font-size:11px; margin:15px 0 10px; border-left:2px solid #333; padding-left:8px;">${label}</div><div class="grid"></div>`;
                area.appendChild(sec); const grid = sec.querySelector('.grid');
                items.forEach(([id, b]) => {
                    const st = getBossStatus(b, id); const card = document.createElement('div'); 
                    card.className = "card";
                    
                    // 優化：ON 狀態時顯示 KILL 按鈕
                    const nextBtnText = st.weight === 6 ? "KILL" : "NEXT";

                    card.innerHTML = `
                        ${auth ? `<button class="del" onclick="deleteBoss('${id}')">×</button>` : ''}
                        <div class="card-title-row">
                            <button class="pin-btn ${st.pinned?'pinned':''}" onclick="togglePin('${id}')">★</button>
                            <h3 onclick="doEdit('${b.map}','${b.ch}','${b.lastInput}')">${b.map} - ${b.ch}</h3>
                            ${(auth && st.mapLv < 135) ? `<button class="swap-btn" onclick="handleSwap('${id}')">⇄ CH${b.ch=="1"?"2":"1"}</button>` : ''}
                        </div>
                        <div class="timer ${st.weight === 6 ? 'on-status' : ''}" id="t_${id}" style="color: ${st.color}">...</div>
                        ${(b.targetTime === 0 && auth && st.weight !== 7) ? `<button class="btn-next" style="color:${st.color}; border-color:${st.color}" onclick="triggerNext('${b.map}','${b.ch}')">${nextBtnText}</button>` : ''}
                        <div style="font-size:9px; color:#444; text-align:right; margin-top:4px;">${b.updater || ''}</div>`;
                    grid.appendChild(card); startTimer(id, b, st.color);
                });
            };

            const pinned = all.filter(i => getBossStatus(i[1], i[0]).pinned);
            const others = all.filter(i => !getBossStatus(i[1], i[0]).pinned);
            drawBox(pinned, "置頂追蹤 ★");
            drawBox(others.sort((a,b) => getBossStatus(b[1], b[0]).weight - getBossStatus(a[1], a[0]).weight || a[1].targetTime - b[1].targetTime), "重生計時與階段");
        }

        function startTimer(id, b, statusColor) {
            const up = () => {
                const el = document.getElementById(`t_${id}`); if(!el) return; const now = Date.now();
                if (b.targetTime > 0) {
                    const d = Math.floor((b.targetTime - now) / 1000), a = Math.abs(d);
                    el.innerText = `${Math.floor(a/3600)}:${Math.floor((a%3600)/60).toString().padStart(2,'0')}:${(a%60).toString().padStart(2,'0')}`;
                    el.style.color = d <= 0 ? '#ff3300' : '#00FF00';
                } else {
                    const m = Math.floor((now - b.startTime) / 60000), s = Math.floor(((now - b.startTime) % 60000) / 1000);
                    el.innerHTML = `<span>${b.displayValue}</span><span style="font-size:12px;opacity:0.5;margin-left:4px;">(${m}m)</span>`;
                    el.style.color = statusColor;
                }
            }; up(); timers[id] = setInterval(up, 1000);
        }

        function saveBoss(map, ch, val) {
            if (map.toUpperCase() === "ADMIN" && protectedRooms[currentRoom] === ch) { localStorage.setItem(`auth_${currentRoom}`, ch); alert("解鎖成功"); return; }
            if (!hasAuth()) { alert("受保護房間"); return; }
            const id = `${map}_${ch}`; let dv = val, tt = 0, flash = true, uv = val.toString().toUpperCase();
            if (uv.startsWith("00")) { let r = uv.replace("00", ""); uv = (r.length === 2) ? "R" + r[0] + "." + r[1] : "R" + r; }
            if (uv.startsWith("XX")) dv = "已擊殺"; 
            else if (uv.startsWith("DE")) dv = "已擊殺";
            else if (uv === "ON") dv = "ON";
            else if (uv.startsWith("R")) dv = "階段" + uv.substring(1);
            else tt = Date.now() + (parseFloat(uv)||0) * 60000;

            db.ref(`rooms/${currentRoom}/bosses/${id}`).set({ map, ch, targetTime: tt, lastInput: uv, displayValue: dv, startTime: Date.now(), isFlash: flash, updater: myName });
            setTimeout(() => db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false), 2000);
        }

        function triggerNext(m, ch) {
            db.ref(`rooms/${currentRoom}/bosses/${m}_${ch}`).once('value', s => {
                const d = s.val(); if(!d) return;
                let cur = d.lastInput.toUpperCase();
                // 優化：ON 時點擊 (即 KILL) 變更為 DE1 (已擊殺)
                if (cur === "ON") saveBoss(m, ch, "DE1");
                else if (cur.startsWith("R")) {
                    let n = Math.floor(parseFloat(cur.substring(1))) + 1;
                    saveBoss(m, ch, n >= 5 ? "ON" : "R" + n);
                } else saveBoss(m, ch, "ON");
            });
        }

        function startSession(id) {
            currentRoom = id.toUpperCase(); myName = document.getElementById('userNameInput').value || 'No Name';
            document.getElementById('loginView').style.display='none'; document.getElementById('mainView').style.display='block';
            document.getElementById('displayID').innerText = currentRoom;
            db.ref(`rooms/${currentRoom}/bosses`).on('value', s => {
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    const b = data[k]; if(b.isFlash && b.lastInput !== lastProcessedInput[k]) {
                        if(b.lastInput === "ON" && isOnSfxEnabled) { playDing(880); speak(`${b.map}重生`); }
                        if(b.lastInput.includes("4") && isR4SfxEnabled) { playDing(440); speak(`${b.map}階段四`); }
                    }
                    lastProcessedInput[k] = b.lastInput;
                });
                window.currentData = data; renderList();
            });
            initChat();
        }

        function sendMsg() { const i = document.getElementById('chatInput'); if(!i.value.trim()) return; db.ref(`rooms/${currentRoom}/chat`).push({ name: myName, text: i.value, t: Date.now() }); i.value = ''; }
        function initChat() {
            db.ref(`rooms/${currentRoom}/chat`).limitToLast(30).on('value', s => {
                const c = document.getElementById('chatMsgs'); c.innerHTML = '';
                Object.values(s.val() || {}).forEach(m => {
                    c.innerHTML += `<div class="msg-row"><span class="msg-name">${m.name}:</span><span>${m.text}</span></div>`;
                });
                c.scrollTop = c.scrollHeight;
            });
        }
        function joinRoom() { const r = document.getElementById('roomInput').value.toUpperCase(); if(r) startSession(r); }
        function createRoom() { startSession(Math.random().toString(36).substring(7).toUpperCase()); }
        function deleteBoss(id) { if(hasAuth()) db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }
        function clearAllBosses() { if(hasAuth() && confirm("確定清除？")) db.ref(`rooms/${currentRoom}/bosses`).remove(); }
        function togglePin(id) { const k = `${currentRoom}_${id}`; localPinned[k] = !localPinned[k]; localStorage.setItem('tos_pinned_bosses', JSON.stringify(localPinned)); renderList(); }
        function doEdit(m, c, l) { const i = document.getElementById('bossInput'); i.value = `${m} ${c} ${l}`; i.focus(); }
        function updateVolBg(e) { e.style.backgroundSize = (e.value * 100) + '% 100%'; }
    </script>
</body>
</html>
