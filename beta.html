<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 11px; padding: 5px 10px; border-radius: 6px; }
        .btn-toggle { background: #222; color: #888; font-size: 12px; padding: 5px 10px; border: 1px solid #444; }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        .copy-icon { width: 18px; height: 18px; min-width: 18px; vertical-align: middle; cursor: pointer; opacity: 0.7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; line-height: 1; }
        .audio-controls { display: flex; align-items: center; gap: 5px; background: #111; padding: 4px 10px; border-radius: 20px; border: 1px solid #333; height: 32px; box-sizing: border-box; }
        .audio-btn { background: none; color: #0f0; padding: 0; font-size: 14px; cursor: pointer; border: none; opacity: 0.3; transition: 0.2s; }
        .audio-btn.active { opacity: 1; }
        .vol-range { -webkit-appearance: none; width: 50px; height: 4px; background: #0f0; border-radius: 2px; outline: none; margin: 0 5px; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #0f0; border-radius: 50%; border: 2px solid #111; cursor: pointer; }
        .user-list-bar { font-size: 12px; color: #555; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; margin-bottom: 5px; font-size: 16px; color: #fff; padding: 8px 0; }
        .sort-row { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .grid-section { margin-bottom: 30px; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .section-label { color: #555; font-size: 11px; border-left: 2px solid #333; padding-left: 8px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; }
        .card h3 { margin: 0; color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-block; border-bottom: 1px dashed #444; }
        .card.idle-card h3 { color: #444; border-bottom: 1px dashed #222; }
        .del { position: absolute; top: 6px; right: 10px; color: #444; background: none; border: none; font-size: 14px; cursor: pointer; }
        .timer { font-size: 18px; font-weight: bold; margin-top: 8px; font-family: monospace; display: flex; align-items: center; flex-wrap: nowrap; overflow: hidden; }
        .timer-label { font-size: 18px; white-space: nowrap; }
        .timer-sub { font-size: 14px; margin-left: 4px; opacity: 0.8; white-space: nowrap; }
        .warning-icon { display: inline-block; margin-left: 6px; font-size: 16px; animation: warn-flash 0.8s infinite; flex-shrink: 0; }
        @keyframes warn-flash { 0%, 100% { opacity: 1; scale: 1; } 50% { opacity: 0.5; scale: 1.1; } }
        @keyframes flash { 0%, 100% { opacity: 1; color: #fff; } 50% { opacity: 0.3; } }
        .flash-anim { animation: flash 0.5s step-end 10; }
        .btn-next { background: #000; font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 6px; cursor: pointer; display: inline-block; margin-top: 8px; border: 2px solid; }
    </style>
</head>
<body>
    <div id="app">
        <div id="loginView" class="login-view">
            <div class="title">TOS M FB TIME</div>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="你的稱呼" maxlength="10">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <input type="text" id="roomInput" placeholder="輸入房號" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-info">
                    <span class="room-id" id="displayID"></span>
                    <svg class="copy-icon" onclick="copyRoomID()" viewBox="0 0 24 24" fill="none" stroke="#0f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <div class="audio-controls">
                        <button id="voiceBtn" class="audio-btn" onclick="toggleVoice()">🔊</button>
                        <input type="range" id="volRange" class="vol-range" min="0" max="1" step="0.05" value="0.5">
                        <button id="sfxBtn" class="audio-btn" onclick="toggleSfx()">🔔</button>
                    </div>
                </div>
                <div class="room-info">
                    <button class="btn-danger" onclick="clearAllBosses()">一鍵清除</button>
                    <button style="background:none; color:#444;" onclick="location.reload()">退出</button>
                </div>
            </div>

            <div class="user-list-bar">
                在線:<span id="onlineCount" style="color:#0f0;">0</span> | <span id="onlineUsers">載入中...</span>
            </div>

            <div class="sort-row">
                <button id="sortTimeBtn" class="btn-toggle active" onclick="setSort('time')">時間排序</button>
                <button id="sortGroupBtn" class="btn-toggle" onclick="setSort('group')">分組排序</button>
                <button id="sortMapBtn" class="btn-toggle" onclick="setSort('map')">地圖排序</button>
            </div>

            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 分鐘/00X/XX數字">
            <div id="sectionsContainer"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI", authDomain: "tos-m-fb.firebaseapp.com", databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tos-m-fb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '', timers = {}, currentSort = 'time';
        let isVoiceEnabled = false, isSfxEnabled = false;
        let myName = '無名戰友', showWarningIcon = true, audioCtx = null, playedAlerts = new Set();
        window.currentData = {};

        function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function speak(text) { if (isVoiceEnabled) { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.volume = parseFloat(document.getElementById('volRange').value); msg.lang = 'zh-TW'; msg.rate = 1.1; window.speechSynthesis.speak(msg); } }
        function playDing() { if (isSfxEnabled) { unlockAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.connect(gain); gain.connect(audioCtx.destination); gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01); osc.start(); osc.stop(audioCtx.currentTime + 0.3); } }

        function toggleVoice() { isVoiceEnabled = !isVoiceEnabled; document.getElementById('voiceBtn').classList.toggle('active', isVoiceEnabled); if (isVoiceEnabled) unlockAudio(); }
        function toggleSfx() { isSfxEnabled = !isSfxEnabled; document.getElementById('sfxBtn').classList.toggle('active', isSfxEnabled); if (isSfxEnabled) unlockAudio(); }

        function startSession(id) {
            currentRoom = id; myName = document.getElementById('userNameInput').value.trim() || '無名戰友';
            document.getElementById('loginView').style.display = 'none'; document.getElementById('mainView').style.display = 'block';
            document.getElementById('displayID').innerText = id;
            document.getElementById('bossInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addBoss(); });
            db.ref(`rooms/${currentRoom}/users`).push({ name: myName }).onDisconnect().remove();
            db.ref(`rooms/${currentRoom}/users`).on('value', s => { 
                const users = Object.values(s.val() || {});
                document.getElementById('onlineCount').innerText = users.length;
                document.getElementById('onlineUsers').innerText = users.map(u => u.name).join(', ');
            });
            db.ref(`rooms/${currentRoom}/bosses`).on('value', s => {
                const newData = s.val() || {};
                Object.keys(newData).forEach(key => { if (newData[key].isFlash && (!window.currentData[key] || !window.currentData[key].isFlash)) playDing(); });
                window.currentData = newData; renderList(); 
            });
        }

        // 核心狀態與權重判斷 (結合階段色彩)
        function getBossStatus(b) {
            const now = Date.now();
            const oneHour = 3600000;
            const isOverdue = b.targetTime > 0 && (now - b.targetTime > oneHour);
            const isIdle = b.targetTime === 0 && (now - b.startTime > oneHour);
            const isGrey = isOverdue || isIdle || b.lastInput.toUpperCase().startsWith("XX");

            let weight = -1;
            if (b.displayValue === "ON") weight = 6;
            else if (b.displayValue.includes("階段4")) weight = 5;
            else if (b.displayValue.includes("階段3")) weight = 4;
            else if (b.displayValue.includes("階段2")) weight = 3;
            else if (b.displayValue.includes("階段1")) weight = 2;
            else if (b.targetTime > 0) weight = (b.targetTime > now) ? 1 : 0; 

            const colors = {
                6: '#FF0000', // 正紅 (ON)
                5: '#800000', // 酒紅 (4)
                4: '#FF4500', // 橘紅 (3)
                3: '#FFA500', // 橙 (2)
                2: '#FFFF00', // 黃 (1)
                1: '#00FF00', // 計時中 (綠)
                0: '#FF3300'  // 已重生 (紅)
            };

            return { isGrey, weight, color: colors[weight] || '#fff', mapLv: parseInt(b.map.match(/\d+/)) || 0 };
        }

        function renderList() {
            const container = document.getElementById('sectionsContainer'); container.innerHTML = ''; 
            Object.values(timers).forEach(clearInterval); timers = {};
            const all = Object.entries(window.currentData || {}), now = Date.now();

            const renderBox = (items, label) => {
                const sec = document.createElement('div'); sec.className = 'grid-section';
                sec.innerHTML = `<div class="section-header"><div class="section-label">${label}</div></div><div class="grid"></div>`;
                container.appendChild(sec); const grid = sec.querySelector('.grid');
                items.forEach(([id, b]) => {
                    const status = getBossStatus(b);
                    const card = document.createElement('div');
                    card.className = `card ${status.isGrey ? 'idle-card' : ''}`;
                    card.innerHTML = `<button class="del" onclick="deleteBoss('${id}')">×</button><h3 onclick="doEdit('${b.map}','${b.ch}','${b.lastInput}')">${b.map} - 分流${b.ch}</h3>
                        <div class="timer-container"><div class="timer ${b.isFlash ? 'flash-anim' : ''}" id="t_${id}" style="color: ${status.isGrey ? '#555' : status.color}">...</div>
                        ${(b.targetTime === 0) ? `<button class="btn-next" id="btn_${id}" style="color: ${status.isGrey ? '#555' : status.color}; border-color: ${status.isGrey ? '#555' : status.color}" onclick="triggerNext('${b.map}','${b.ch}')">NEXT</button>` : ''}</div>`;
                    grid.appendChild(card); startTimer(id, b, status.isGrey, status.color);
                });
            };

            if (currentSort === 'time') {
                const sorted = all.sort((a, b) => {
                    const sA = getBossStatus(a[1]), sB = getBossStatus(b[1]);
                    if (sA.weight !== sB.weight) return sB.weight - sA.weight;
                    return sB.mapLv - sA.mapLv;
                });
                renderBox(sorted, "全域時間排序 (ON > 階段 > 計時 > 超時)");
            } 
            else if (currentSort === 'map') {
                const sorted = all.sort((a,b) => getBossStatus(b[1]).mapLv - getBossStatus(a[1]).mapLv || a[1].ch - b[1].ch);
                renderBox(sorted, "全域地圖等級排序");
            }
            else {
                const stages = [], timersList = [], idleList = [];
                all.forEach(([id, b]) => {
                    const st = getBossStatus(b);
                    if (st.isGrey) idleList.push([id, b]);
                    else if (b.targetTime > 0) timersList.push([id, b]); else stages.push([id, b]);
                });
                renderBox(stages.sort((a,b)=>getBossStatus(b[1]).weight - getBossStatus(a[1]).weight), "階段追蹤區");
                renderBox(timersList.sort((a,b)=>a[1].targetTime - b[1].targetTime), "重生計時區");
                renderBox(idleList, "超時閒置區");
            }
        }

        function startTimer(id, b, isGrey, statusColor) {
            const el = document.getElementById(`t_${id}`);
            const up = () => {
                const now = Date.now();
                if (b.targetTime > 0) {
                    const d = Math.floor((b.targetTime - now) / 1000), a = Math.abs(d);
                    el.innerText = `${Math.floor(a/3600)}:${Math.floor((a%3600)/60).toString().padStart(2,'0')}:${(a%60).toString().padStart(2,'0')}`;
                    if (!isGrey) el.style.color = d <= 0 ? '#ff3300' : '#00FF00';
                } else {
                    const m = Math.floor((now - b.startTime) / 60000), s = Math.floor(((now - b.startTime) % 60000) / 1000);
                    const matchNum = b.displayValue.match(/[\d.]+/);
                    const lv = b.displayValue === "ON" ? 99 : (matchNum ? Math.floor(parseFloat(matchNum[0])) : 0);
                    const isW = (lv < 2 && m >= 12) || (lv < 3 && lv >= 2 && m >= 7) || (lv < 4 && lv >= 3 && m >= 5) || (lv === 4 && m >= 3) || (lv === 99 && m >= 3);
                    el.innerHTML = `<span class="timer-label">${b.displayValue}</span><span class="timer-sub">(${m}:${s.toString().padStart(2,'0')})</span>${(showWarningIcon && isW && !isGrey) ? '<span class="warning-icon">⚠️</span>' : ''}`;
                    if (!isGrey) el.style.color = statusColor;
                }
            }; up(); timers[id] = setInterval(up, 1000);
        }

        function parseTime(v) { const p = v.split(/[:.：]/); if (p.length === 2) return parseInt(p[0])*60 + parseInt(p[1]); return parseFloat(v) || 0; }
        
        function saveBoss(map, ch, val) {
            const id = `${map}_${ch}`;
            let dv = val, tt = 0, flash = false;
            const uv = val.toUpperCase();
            if (uv.startsWith("XX")) { dv = "階段" + (val.substring(2) || "1"); }
            else if (uv === "ON") { dv = "ON"; flash = true; }
            else if (val.startsWith("00")) { 
                const n = val.substring(2); 
                dv = "階段" + (n.length > 1 && !n.includes('.') ? n.split('').join('.') : n); 
                if (parseFloat(n) >= 4) flash = true; 
            } else tt = Date.now() + (parseTime(val) * 60000);
            db.ref(`rooms/${currentRoom}/bosses/${id}`).set({ map, ch, targetTime: tt, lastInput: val, displayValue: dv, startTime: Date.now(), isFlash: flash });
            setTimeout(() => db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false), 5000);
        }

        function triggerNext(m, c) {
            db.ref(`rooms/${currentRoom}/bosses/${m}_${c}`).once('value', s => {
                const data = s.val(); if (!data) return;
                const l = data.lastInput.toUpperCase();
                if (l === "ON") saveBoss(m, c, "001");
                else if (l.startsWith("00")) {
                    const match = l.match(/00(\d+)/);
                    if (match) {
                        const currentLv = parseInt(match[1]);
                        if (currentLv >= 4) saveBoss(m, c, "ON");
                        else saveBoss(m, c, "00" + (currentLv + 1));
                    }
                } else saveBoss(m, c, "ON");
            });
            unlockAudio();
        }

        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }
        function clearAllBosses() { if(confirm("確定一鍵清除？")) db.ref(`rooms/${currentRoom}/bosses`).remove(); }
        function copyRoomID() { navigator.clipboard.writeText(currentRoom); alert('房號已複製'); }
        function joinRoom() { const i = document.getElementById('roomInput').value.trim().toUpperCase(); if (i) startSession(i); }
        function createRoom() { const i = Math.random().toString(36).substring(2, 8).toUpperCase(); startSession(i); }
        function setSort(t) { currentSort = t; document.querySelectorAll('.btn-toggle').forEach(b => b.classList.toggle('active', b.id === `sort${t.charAt(0).toUpperCase()+t.slice(1)}Btn`)); renderList(); }
        function doEdit(m, c, l) { const i = document.getElementById('bossInput'); i.value = `${m} ${c} ${l}`; i.focus(); }
    </script>
</body>
</html>
