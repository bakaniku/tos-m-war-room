<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME (BETA)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* 測試版標籤 */
        .beta-tag { font-size: 10px; color: #f0f; border: 1px solid #f0f; padding: 2px 4px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 12px; padding: 5px 10px; }
        .btn-toggle { background: #222; color: #888; font-size: 12px; padding: 5px 10px; border: 1px solid #444; }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        .btn-next { background: #333; color: #0f0; border: 1px solid #0f0; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; cursor: pointer; text-decoration: underline; }
        .room-id:active { color: #fff; }
        
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; border-radius: 0; margin-bottom: 20px; }
        .sort-row { margin-bottom: 15px; display: flex; gap: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; cursor: pointer; }
        .card:hover { border-color: #555; background: #1a1a1a; }
        .card h3 { margin: 0; color: #666; font-size: 12px; pointer-events: none; }
        .timer { font-size: 24px; font-weight: bold; margin-top: 8px; font-family: monospace; pointer-events: none; white-space: nowrap; }
        .del { position: absolute; top: 5px; right: 10px; color: #444; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 10; }
        .idle-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="idleOverlay" class="idle-overlay" style="display:none;">
            <h2 style="color:#0f0">TOS M FB TIME <span class="beta-tag">BETA</span></h2>
            <p>連線已斷開（已達 3 小時自動保護限制）</p>
            <button class="btn-solid" onclick="location.reload()" style="width:200px">重新連接</button>
        </div>

        <div id="loginView" class="login-view">
            <div class="title">TOS M FB TIME <span class="beta-tag" style="font-size:16px">BETA</span></div>
            <div class="input-group">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <input type="text" id="roomInput" placeholder="輸入 6 位代碼" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-info">
                    <div class="room-id" id="displayID" onclick="copyRoomID()" title="點擊複製房號"></div>
                    <button id="audioToggle" class="btn-toggle" onclick="toggleAudio()">🔊 音效關閉</button>
                    <button class="btn-danger" onclick="clearAllBosses()">一鍵清除</button>
                </div>
                <button style="background:none; color:#444;" onclick="location.reload()">退出房間</button>
            </div>

            <div class="sort-row">
                <button id="sortTimeBtn" class="btn-toggle active" onclick="setSort('time')">時間排序</button>
                <button id="sortMapBtn" class="btn-toggle" onclick="setSort('map')">地圖排序</button>
            </div>

            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 分鐘/00X (例: 113 1 180)">
            <div class="grid" id="bossList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
            authDomain: "tos-m-fb.firebaseapp.com",
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tos-m-fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentRoom = '';
        let timers = {};
        let idleTimer;
        let isAudioEnabled = false;
        let playedAlerts = new Set();
        let currentSort = 'time'; // 'time' or 'map'

        function toggleAudio() {
            isAudioEnabled = !isAudioEnabled;
            const btn = document.getElementById('audioToggle');
            btn.innerText = isAudioEnabled ? '🔊 音效開啟' : '🔈 音效關閉';
            btn.className = isAudioEnabled ? 'btn-toggle active' : 'btn-toggle';
        }

        function playDing() {
            if (!isAudioEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); 
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 1);
            } catch (e) {}
        }

        function copyRoomID() {
            navigator.clipboard.writeText(currentRoom).then(() => {
                alert('房號 ' + currentRoom + ' 已複製！');
            });
        }

        function setSort(type) {
            currentSort = type;
            document.getElementById('sortTimeBtn').className = type === 'time' ? 'btn-toggle active' : 'btn-toggle';
            document.getElementById('sortMapBtn').className = type === 'map' ? 'btn-toggle active' : 'btn-toggle';
            listenData();
        }

        function joinRoom() {
            const id = document.getElementById('roomInput').value.trim().toUpperCase();
            if (id) startSession(id);
        }

        function createRoom() {
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            startSession(id);
        }

        function startSession(id) {
            currentRoom = id;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('displayID').innerText = id;
            document.getElementById('bossInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addBoss(); });
            db.ref(`rooms/${currentRoom}/lastActive`).set(Date.now());
            listenData();
            
            // 啟動 10 分鐘空房檢查
            setInterval(checkEmptyRoom, 60000); 
        }

        function addBoss() {
            const input = document.getElementById('bossInput');
            const p = input.value.trim().split(/\s+/);
            if (p.length < 3) return;
            saveBoss(p[0], p[1], p[2]);
            input.value = '';
        }

        function saveBoss(map, ch, val) {
            const stageMap = { "001": "階段1", "002": "階段2", "003": "階段3", "004": "階段4" };
            let targetTime = stageMap[val] ? 0 : Date.now() + parseInt(val) * 60000;
            let displayValue = stageMap[val] || val;

            db.ref(`rooms/${currentRoom}/bosses/${map}_${ch}`).set({
                map, ch, targetTime, lastInput: val, displayValue
            });
            db.ref(`rooms/${currentRoom}/lastActive`).set(Date.now());
        }

        // 下一階段功能
        window.nextStage = function(id, map, ch, currentInput) {
            const nextMap = { "001": "002", "002": "003", "003": "004" };
            if (nextMap[currentInput]) {
                saveBoss(map, ch, nextMap[currentInput]);
            }
        };

        function listenData() {
            db.ref(`rooms/${currentRoom}/bosses`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = document.getElementById('bossList');
                list.innerHTML = '';
                Object.values(timers).forEach(clearInterval);
                timers = {};

                let sorted = Object.entries(data);
                if (currentSort === 'time') {
                    sorted.sort((a, b) => {
                        if (a[1].targetTime === 0 && b[1].targetTime !== 0) return -1;
                        if (a[1].targetTime !== 0 && b[1].targetTime === 0) return 1;
                        return a[1].targetTime - b[1].targetTime;
                    });
                } else {
                    sorted.sort((a, b) => parseInt(a[1].map) - parseInt(b[1].map));
                }

                sorted.forEach(([id, boss]) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = (e) => { 
                        if (e.target.tagName !== 'BUTTON') editBoss(boss.map, boss.ch, boss.lastInput); 
                    };
                    
                    let timerHtml = '';
                    if (boss.targetTime === 0) {
                        const showNext = (boss.lastInput === "001" || boss.lastInput === "002" || boss.lastInput === "003");
                        timerHtml = `
                            <div class="timer" style="color:#0f0;">
                                ${boss.displayValue}
                                ${showNext ? `<button class="btn-next" onclick="nextStage('${id}','${boss.map}','${boss.ch}','${boss.lastInput}')">NEXT</button>` : ''}
                            </div>`;
                    } else {
                        timerHtml = `<div class="timer" id="t_${id}">--:--:--</div>`;
                    }

                    card.innerHTML = `<button class="del" onclick="deleteBoss('${id}')">×</button><h3>${boss.map} - ${boss.ch}線</h3>${timerHtml}`;
                    list.appendChild(card);
                    if (boss.targetTime !== 0) startTimer(id, boss.targetTime);
                });
            });
        }

        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); }
        function clearAllBosses() { if (confirm("確定一鍵清除？")) db.ref(`rooms/${currentRoom}/bosses`).remove(); }

        function startTimer(id, target) {
            const el = document.getElementById('t_' + id);
            const update = () => {
                const diff = Math.floor((target - Date.now()) / 1000);
                const isOver = diff <= 0;
                const abs = Math.abs(diff);
                const h = Math.floor(abs / 3600), m = Math.floor((abs % 3600) / 60), s = abs % 60;
                if (el) { 
                    el.innerText = `${h>0?h+':':''}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    el.style.color = isOver ? '#f44' : '#0f0'; 
                }
                if (isOver && diff === 0 && !playedAlerts.has(id + "_0")) { playDing(); playedAlerts.add(id + "_0"); }
            };
            update();
            timers[id] = setInterval(update, 1000);
        }

        // 10 分鐘自動刪除空房邏輯
        function checkEmptyRoom() {
            if (!currentRoom) return;
            db.ref(`rooms/${currentRoom}`).once('value', (s) => {
                const data = s.val();
                if (!data) return;
                const hasBosses = data.bosses && Object.keys(data.bosses).length > 0;
                const idleTime = Date.now() - (data.lastActive || 0);
                // 如果沒 BOSS 且 10 分鐘沒動靜
                if (!hasBosses && idleTime > 10 * 60 * 1000) {
                    db.ref(`rooms/${currentRoom}`).remove();
                    location.reload(); 
                }
            });
        }

        function editBoss(map, ch, lastInput) {
            const input = document.getElementById('bossInput');
            input.value = `${map} ${ch} ${lastInput}`;
            input.focus();
            input.setSelectionRange(input.value.length - lastInput.length, input.value.length);
        }
    </script>
</body>
</html>
