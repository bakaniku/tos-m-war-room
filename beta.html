<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOS M FB TIME</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .title { color: #0f0; font-size: 32px; font-weight: bold; margin-bottom: 40px; }
        .input-group { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        input[type=text] { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; text-align: center; }
        input[type=text]:focus { border-color: #0f0; }
        button { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-outline { background: none; border: 1px solid #0f0; color: #0f0; }
        .btn-solid { background: #0f0; color: #000; }
        .btn-danger { background: #422; color: #f66; font-size: 12px; padding: 5px 10px; }
        .btn-toggle { background: #222; color: #888; font-size: 12px; padding: 5px 10px; border: 1px solid #444; }
        .btn-toggle.active { background: #050; color: #0f0; border-color: #0f0; }
        
        .copy-icon { width: 18px; height: 18px; min-width: 18px; min-height: 18px; vertical-align: middle; cursor: pointer; opacity: 0.7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; }
        .room-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .room-id { color: #0f0; font-size: 20px; font-weight: bold; line-height: 1; }
        
        .user-list-bar { font-size: 12px; color: #666; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .online-count { color: #0f0; font-weight: bold; margin-left: 5px; }

        .vol-group { display: flex; align-items: center; gap: 8px; background: #111; padding: 6px 14px; border-radius: 20px; border: 1px solid #333; height: 32px; box-sizing: border-box; }
        .vol-icon { background: none; color: #0f0; padding: 0; font-size: 16px; transition: color 0.2s; cursor: pointer; }
        .vol-icon.muted { color: #777; }
        .vol-range { -webkit-appearance: none; width: 70px; height: 6px; background: #333; border-radius: 3px; outline: none; }
        .vol-range::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #0f0; border-radius: 50%; cursor: pointer; border: 2px solid #111; }
        .vol-range.muted::-webkit-slider-thumb { background: #555; }
        
        .main-input { width: 100%; text-align: left; border: none; border-bottom: 2px solid #0f0; background: #050505; border-radius: 0; margin-bottom: 5px; font-size: 16px; color: #fff; padding: 8px 0; }
        .duplicate-alert { color: #f44; font-size: 12px; height: 18px; margin-bottom: 10px; }
        .sort-row { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        
        .grid-section { margin-bottom: 30px; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .section-label { color: #555; font-size: 11px; border-left: 2px solid #333; padding-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-switch { background: #222; color: #0f0; font-size: 10px; padding: 2px 8px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; position: relative; border: 1px solid #222; }
        .card h3 { margin: 0; color: #aaa; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-block; border-bottom: 1px dashed #444; }
        
        .timer { font-size: 20px; font-weight: bold; margin-top: 8px; font-family: monospace; }
        .timer-label { font-size: 20px; } 
        .timer-sub { font-size: 16px; margin-left: 4px; opacity: 0.8; } 

        .btn-next { 
            background: #000; 
            font-size: 12px; 
            font-weight: bold;
            padding: 4px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 8px;
            transition: 0.2s;
            border: 2px solid; /* 顏色透過 JS 控制 */
        }

        .timer-container { display: flex; flex-direction: column; align-items: flex-start; }
        .del { position: absolute; top: 5px; right: 10px; color: #444; background: none; border: none; font-size: 20px; cursor: pointer; }
        
        /* 💡 顏色定義系統 */
        .color-y1 { color: #ffff00 !important; } /* 階段 1 - 黃 */
        .color-y2 { color: #ffcc00 !important; } /* 階段 2 - 金 */
        .color-y3 { color: #ff9900 !important; } /* 階段 3 - 橙黃 */
        .color-o4 { color: #ff6600 !important; } /* 階段 4 - 橙 */
        .color-on { color: #ff3300 !important; } /* ON - 紅 */
        .color-alert { color: #ff0033 !important; } /* 超時 - 橘紅 */
        
        @keyframes flash { 0%, 100% { opacity: 1; color: #fff; } 50% { opacity: 0.3; } }
        .flash-anim { animation: flash 0.5s step-end 10; }
        .idle-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="app">
        <div id="idleOverlay" class="idle-overlay" style="display:none;">
            <h2 style="color:#0f0">TOS M FB TIME</h2>
            <button class="btn-solid" onclick="location.reload()" style="padding:15px 30px;">重新連接</button>
        </div>

        <div id="loginView" class="login-view">
            <div class="title">TOS M FB TIME</div>
            <div class="input-group">
                <input type="text" id="userNameInput" placeholder="你的稱呼 (選填)" maxlength="10">
                <button class="btn-outline" onclick="createRoom()">＋ 創建新房間</button>
                <input type="text" id="roomInput" placeholder="輸入房號" maxlength="6">
                <button class="btn-solid" onclick="joinRoom()">進入房間</button>
            </div>
        </div>

        <div id="mainView" style="display:none;">
            <div class="header">
                <div class="room-info">
                    <span class="room-id" id="displayID"></span>
                    <svg class="copy-icon" onclick="copyRoomID()" viewBox="0 0 24 24" fill="none" stroke="#0f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <div class="vol-group">
                        <button id="volBtn" class="vol-icon muted" onclick="toggleAudio()">🔈</button>
                        <input type="range" id="volRange" class="vol-range muted" min="0" max="1" step="0.05" value="0.5">
                    </div>
                    <button class="btn-danger" onclick="clearAllBosses()">一鍵清除</button>
                </div>
                <button style="background:none; color:#444;" onclick="exitRoom()">退出</button>
            </div>

            <div class="user-list-bar">
                目前在線:<span class="online-count" id="onlineCount">0</span>人
                <div id="onlineUsers" style="margin-top:5px; color:#444;">載入中...</div>
            </div>

            <div class="sort-row">
                <button id="sortGroupBtn" class="btn-toggle active" onclick="setSort('group')">群組排序</button>
                <button id="sortTimeBtn" class="btn-toggle" onclick="setSort('time')">時間排序</button>
                <button id="sortCountdownBtn" class="btn-toggle" onclick="setSort('countdown')">倒數排序</button>
                <button id="sortMapBtn" class="btn-toggle" onclick="setSort('map')">地圖排序</button>
            </div>

            <input type="text" id="bossInput" class="main-input" placeholder="地圖 分流 分鐘/00X/時:分:秒">
            <div id="duplicateAlert" class="duplicate-alert"></div>
            <div id="sectionsContainer"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
            authDomain: "tos-m-fb.firebaseapp.com",
            databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tos-m-fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '', timers = {}, isAudioEnabled = false, playedAlerts = new Set(), currentSort = 'group';
        let timerPriority = 'overtime', myName = '無名戰友', multiColorMode = true;

        function speak(text) {
            if (!isAudioEnabled) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.volume = parseFloat(document.getElementById('volRange').value);
            msg.lang = 'zh-TW'; msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function toggleAudio() {
            isAudioEnabled = !isAudioEnabled;
            const btn = document.getElementById('volBtn'), range = document.getElementById('volRange');
            if (isAudioEnabled) {
                btn.innerText = '🔊'; btn.classList.remove('muted'); range.classList.remove('muted');
                updateRangeBg(range); speak("語音已開啟");
            } else {
                btn.innerText = '🔈'; btn.classList.add('muted'); range.classList.add('muted'); range.style.background = '#222';
            }
        }

        function updateRangeBg(range) {
            if (isAudioEnabled) {
                const val = range.value * 100;
                range.style.background = `linear-gradient(to right, #0f0 0%, #0f0 ${val}%, #333 ${val}%, #333 100%)`;
            }
        }
        document.getElementById('volRange').addEventListener('input', function() { updateRangeBg(this); });

        function copyRoomID() {
            const el = document.createElement('textarea');
            el.value = currentRoom; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert('房號 ' + currentRoom + ' 已複製！');
        }

        function setSort(type) {
            currentSort = type;
            document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            document.getElementById(`sort${type.charAt(0).toUpperCase() + type.slice(1)}Btn`).classList.add('active');
            renderList();
        }

        function toggleMultiColor() {
            multiColorMode = !multiColorMode;
            renderList();
        }

        function startSession(id) {
            currentRoom = id;
            const inputName = document.getElementById('userNameInput').value.trim();
            if (inputName) myName = inputName;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('displayID').innerText = id;
            document.getElementById('bossInput').addEventListener('input', checkDuplicate);
            document.getElementById('bossInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addBoss(); });
            
            const myPresenceRef = db.ref(`rooms/${currentRoom}/users`).push();
            myPresenceRef.set({ name: myName });
            myPresenceRef.onDisconnect().remove();

            db.ref(`rooms/${currentRoom}/users`).on('value', s => {
                const users = s.val() || {};
                const userNames = Object.values(users).map(u => u.name);
                document.getElementById('onlineCount').innerText = userNames.length;
                document.getElementById('onlineUsers').innerText = "名單: " + userNames.join(', ');
            });

            db.ref(`rooms/${currentRoom}/lastActive`).transaction((c) => c || Date.now());
            db.ref(`rooms/${currentRoom}`).on('value', s => {
                const data = s.val(); if (!data) { location.reload(); return; }
                window.currentData = data.bosses || {}; renderList();
            });
            setInterval(checkRoomStatus, 60000);
        }

        function joinRoom() { const id = document.getElementById('roomInput').value.trim().toUpperCase(); if (id) startSession(id); }
        function createRoom() { const id = Math.random().toString(36).substring(2, 8).toUpperCase(); startSession(id); }
        function exitRoom() { location.reload(); }

        function checkRoomStatus() {
            if (!currentRoom) return;
            db.ref(`rooms/${currentRoom}`).once('value', s => {
                const d = s.val(); if (!d) return;
                const count = d.bosses ? Object.keys(d.bosses).length : 0;
                const idle = Date.now() - (d.lastActive || 0);
                if ((count === 0 && idle > 30 * 60 * 1000) || idle > 24 * 60 * 60 * 1000) db.ref(`rooms/${currentRoom}`).remove();
            });
        }

        function checkDuplicate() {
            const p = document.getElementById('bossInput').value.trim().split(/\s+/);
            const alertEl = document.getElementById('duplicateAlert');
            if (p.length >= 2 && window.currentData && window.currentData[`${p[0]}_${p[1]}`]) {
                alertEl.innerText = `⚠️ 注意：${p[0]} - 分流 ${p[1]} 已存在，輸入將覆蓋`;
            } else alertEl.innerText = "";
        }

        function addBoss() {
            const input = document.getElementById('bossInput'), p = input.value.trim().split(/\s+/);
            if (p.length < 3) return; saveBoss(p[0], p[1], p[2]); input.value = '';
        }

        function saveBoss(map, ch, val) {
            const id = `${map}_${ch}`;
            let dv = val, tt = 0, flash = false;
            playedAlerts.delete(id);

            // 💡 只有當前操作的人會標記 flash 為 true
            if (val.toUpperCase() === "ON") {
                dv = "ON"; flash = true;
            } else if (val.startsWith("00")) {
                const n = val.substring(2); 
                dv = "階段" + (n.length > 1 ? n.split('').join('.') : n);
                const old = window.currentData ? window.currentData[id] : null;
                if (old && old.lastInput.startsWith("003") && val.startsWith("004")) flash = true;
                // 新增也會閃爍一次
                if (!old) flash = true;
            } else {
                tt = Date.now() + (parseTime(val) * 60000);
            }

            // 💡 傳送到 Firebase 後，閃爍屬性只維持一個極短暫時間
            db.ref(`rooms/${currentRoom}/bosses/${id}`).set({
                map, ch, targetTime: tt, lastInput: val, displayValue: dv, startTime: Date.now(), isFlash: flash
            });
            db.ref(`rooms/${currentRoom}/lastActive`).set(Date.now());

            // 💡 自動關閉閃爍旗標，避免下次別人更新時我也跟著閃
            setTimeout(() => {
                db.ref(`rooms/${currentRoom}/bosses/${id}/isFlash`).set(false);
            }, 5000);
        }

        function parseTime(val) {
            val = val.toLowerCase(); if (val.endsWith('s')) return parseFloat(val) / 60;
            const p = val.split(/[:.：]/);
            if (p.length === 3) return (parseInt(p[0])*60) + parseInt(p[1]) + (parseInt(p[2])/60);
            if (p.length === 2) return (parseInt(p[0])*60) + parseInt(p[1]);
            return parseFloat(val) || 0;
        }

        function renderList() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';
            Object.values(timers).forEach(clearInterval); timers = {};
            const all = Object.entries(window.currentData || {}), now = Date.now();
            const getStageNum = (v) => {
                if (v.displayValue === "ON") return 999; 
                const match = v.displayValue.match(/[\d.]+/);
                return match ? parseFloat(match[0]) : 0;
            };

            let stages = all.filter(([id, b]) => b.displayValue.includes("階段") || b.displayValue === "ON");
            let timersList = all.filter(([id, b]) => b.targetTime > 0);

            const render = (items, label, isTimer = false) => {
                if (items.length === 0) return;
                const sec = document.createElement('div'); sec.className = 'grid-section';
                let switchBtn = !isTimer && currentSort === 'group' ? `<button class="btn-switch" onclick="toggleMultiColor()">${multiColorMode ? '彩色模式' : '標準模式'}</button>` : '';
                if (isTimer && (currentSort === 'group' || currentSort === 'countdown')) {
                    switchBtn = `<button class="btn-switch" onclick="toggleTimerPriority()">${timerPriority === 'overtime' ? '已超時優先' : '計時中優先'}</button>`;
                }
                sec.innerHTML = `<div class="section-header"><div class="section-label">${label}</div>${switchBtn}</div><div class="grid"></div>`;
                container.appendChild(sec);
                const grid = sec.querySelector('.grid');
                
                // 排序與渲染
                items.sort((a,b) => {
                    const getC = (v) => v.targetTime > now ? 1 : (v.targetTime > 0 ? 2 : (v.displayValue === "ON" ? 3 : 4));
                    const cA = getC(a[1]), cB = getC(b[1]);
                    if (!isTimer && (cA >= 3 && cB >= 3)) return getStageNum(b[1]) - getStageNum(a[1]);
                    if (isTimer) {
                        if (timerPriority === 'overtime') { if (cA !== cB) return cB - cA; }
                        else { if (cA !== cB) return cA - cB; }
                    }
                    return a[1].targetTime - b[1].targetTime || parseInt(b[1].map) - parseInt(a[1].map);
                }).forEach(([id, b]) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<button class="del" onclick="deleteBoss('${id}')">×</button>
                        <h3 onclick="doEdit('${b.map}','${b.ch}','${b.lastInput}')">${b.map} - 分流${b.ch}</h3>
                        <div class="timer-container">
                            <div class="timer ${b.isFlash ? 'flash-anim' : ''}" id="t_${id}">...</div>
                            ${b.targetTime === 0 ? `<button class="btn-next" id="btn_${id}" onclick="triggerNext('${b.map}','${b.ch}')">NEXT</button>` : ''}
                        </div>`;
                    grid.appendChild(card); startTimer(id, b);
                });
            };

            if (currentSort === 'map') render(all, "所有 BOSS");
            else { render(stages, "階段追蹤區 (含 ON)", false); render(timersList, "重生計時區", true); }
        }

        function startTimer(id, boss) {
            const el = document.getElementById(`t_${id}`), nextBtn = document.getElementById(`btn_${id}`);
            const update = () => {
                const now = Date.now(), isTimer = boss.targetTime > 0;
                el.className = `timer ${boss.isFlash ? 'flash-anim' : ''}`;
                
                if (isTimer) {
                    const d = Math.floor((boss.targetTime - now) / 1000), a = Math.abs(d);
                    const h = Math.floor(a/3600), m = Math.floor((a%3600)/60), s = a%60;
                    el.innerText = `${h>0?h+':':''}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    el.style.color = d <= 0 ? '#ff3300' : '#0f0'; // 超時變橘紅，計時綠
                } else {
                    const sec = Math.floor((now - boss.startTime) / 1000), m = Math.floor(sec/60), s = sec%60;
                    const sub = `(${m}:${s.toString().padStart(2,'0')})`;
                    el.innerHTML = `<span class="timer-label">${boss.displayValue}</span><span class="timer-sub">${sub}</span>`;
                    
                    // 💡 顏色與 NEXT 按鈕同步邏輯
                    let color = '#fff';
                    if (boss.displayValue === "ON") color = '#ff3300';
                    else {
                        const lv = parseFloat(boss.lastInput.substring(2));
                        if (multiColorMode) {
                            if (lv < 2) color = '#ffff00';      // 階段 1 - 黃
                            else if (lv < 3) color = '#ffcc00'; // 階段 2 - 金
                            else if (lv < 4) color = '#ff9900'; // 階段 3 - 橙黃
                            else color = '#ff6600';             // 階段 4 - 橙
                        } else color = (lv >= 4) ? '#ff6600' : '#ffff00';
                        
                        // 💡 超時判定變橘紅 (超過設定時間)
                        if ((lv < 2 && m >= 10) || (lv < 3 && lv >= 2 && m >= 7) || (lv < 4 && lv >= 3 && m >= 5) || (lv >= 4 && m >= 3) || (boss.displayValue === "ON" && m >= 3)) {
                            color = '#ff3300';
                        }
                    }
                    el.style.color = color;
                    if (nextBtn) { nextBtn.style.color = color; nextBtn.style.borderColor = color; }
                }
            };
            update(); timers[id] = setInterval(update, 1000);
        }

        function triggerNext(m, c) {
            db.ref(`rooms/${currentRoom}/bosses/${m}_${c}`).once('value', s => {
                const d = s.val(); if (!d) return;
                const last = d.lastInput;
                if (last.toUpperCase() === "ON") saveBoss(m, c, "");
                else if (last.startsWith("00")) {
                    let v = parseInt(last.substring(2, 3));
                    if (v >= 4) saveBoss(m, c, "ON"); else saveBoss(m, c, "00" + (v + 1));
                }
            });
        }

        function doEdit(m, c, l) {
            const i = document.getElementById('bossInput'); i.value = `${m} ${c} ${l}`; i.focus();
            i.setSelectionRange(i.value.length - l.length, i.value.length);
        }

        function deleteBoss(id) { db.ref(`rooms/${currentRoom}/bosses/${id}`).remove(); db.ref(`rooms/${currentRoom}/lastActive`).set(Date.now()); }
        function clearAllBosses() { if(confirm("確定一鍵清除？")) { db.ref(`rooms/${currentRoom}/bosses`).remove(); db.ref(`rooms/${currentRoom}/lastActive`).set(Date.now()); } }
        function exitRoom() { location.reload(); }
    </script>
</body>
</html>
