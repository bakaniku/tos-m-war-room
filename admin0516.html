<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOS M - 全域管理後台</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
            --border: #222; --border2: #333;
            --green: #00ff88; --red: #ff4455; --yellow: #ffcc00; --blue: #00aaff;
            --text: #e0e0e0; --muted: #666; --muted2: #444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

        /* ── 登入畫面 ── */
        #loginScreen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; gap: 20px;
        }
        .login-title { color: var(--green); font-size: 28px; font-weight: bold; letter-spacing: 4px; }
        .login-sub { color: var(--muted); font-size: 12px; letter-spacing: 2px; }
        .login-input {
            background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
            padding: 12px 20px; border-radius: 6px; font-size: 16px; width: 240px;
            text-align: center; outline: none; letter-spacing: 4px;
        }
        .login-input:focus { border-color: var(--green); }
        .login-btn {
            background: var(--green); color: #000; border: none; padding: 12px 40px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
            letter-spacing: 2px; width: 240px;
        }
        .login-btn:hover { opacity: 0.85; }
        .login-err { color: var(--red); font-size: 12px; height: 16px; }

        /* ── 主介面 ── */
        #mainScreen { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border2);
        }
        .top-title { color: var(--green); font-size: 18px; font-weight: bold; letter-spacing: 3px; }
        .top-right { display: flex; gap: 10px; align-items: center; }
        .badge { font-size: 11px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 4px; }
        .btn-logout { background: none; border: 1px solid var(--muted2); color: var(--muted); font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        /* ── 統計卡 ── */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
            padding: 16px 20px; display: flex; flex-direction: column; gap: 4px;
        }
        .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--green); }

        /* ── 保護房間管理 ── */
        .section { margin-bottom: 24px; }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .section-title { font-size: 13px; color: var(--yellow); letter-spacing: 2px; border-left: 3px solid var(--yellow); padding-left: 10px; }
        .btn-add {
            background: none; border: 1px solid var(--green); color: var(--green);
            font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
        }
        .btn-add:hover { background: rgba(0,255,136,0.1); }

        .protected-list { display: flex; flex-direction: column; gap: 8px; }
        .protected-row {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
            padding: 12px 16px; display: grid; grid-template-columns: 140px 1fr 100px 80px; gap: 12px; align-items: center;
        }
        .protected-row.new-row { border-color: var(--green); }
        .prot-id { color: var(--green); font-weight: bold; font-size: 15px; }
        .prot-pass { color: var(--muted); font-size: 12px; }
        .prot-status { font-size: 11px; }
        .prot-status.on { color: var(--green); }
        .prot-status.off { color: var(--red); }
        .prot-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .btn-sm {
            font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer; border: 1px solid;
        }
        .btn-edit { border-color: var(--blue); color: var(--blue); background: none; }
        .btn-edit:hover { background: rgba(0,170,255,0.1); }
        .btn-toggle-prot { border-color: var(--yellow); color: var(--yellow); background: none; }
        .btn-toggle-prot:hover { background: rgba(255,204,0,0.1); }
        .btn-del-prot { border-color: var(--red); color: var(--red); background: none; }
        .btn-del-prot:hover { background: rgba(255,68,85,0.1); }

        /* inline edit */
        .prot-input {
            background: var(--bg3); border: 1px solid var(--green); color: var(--text);
            font-size: 12px; padding: 3px 8px; border-radius: 3px; outline: none; width: 100%;
            font-family: 'Courier New', monospace;
        }

        /* ── 房間列表 ── */
        .sort-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .sort-btn {
            font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
            border: 1px solid var(--border2); background: none; color: var(--muted);
        }
        .sort-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.08); }

        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--bg2); }
        th { padding: 10px 14px; text-align: left; font-size: 11px; color: var(--green); letter-spacing: 1px; border-bottom: 1px solid var(--border2); font-weight: normal; }
        td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tbody tr { background: var(--bg); transition: background 0.15s; }
        tbody tr:hover { background: var(--bg2); }
        .room-id { color: var(--green); font-weight: bold; font-size: 14px; }
        .room-id-protected { color: var(--yellow); }
        .prot-badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; border: 1px solid var(--yellow); color: var(--yellow); margin-left: 6px; vertical-align: middle; }
        .online-yes { color: var(--green); font-weight: bold; }
        .online-no { color: var(--muted); }
        .time-recent { color: var(--text); }
        .time-old { color: var(--muted); }
        .btn-del { background: none; border: 1px solid var(--red); color: var(--red); font-size: 10px; padding: 3px 10px; border-radius: 3px; cursor: pointer; }
        .btn-del:hover { background: rgba(255,68,85,0.1); }

        /* modal */
        #editModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 9999; justify-content: center; align-items: center;
        }
        #editModal.show { display: flex; }
        .modal-box {
            background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px;
            padding: 24px; width: 360px;
        }
        .modal-title { color: var(--green); font-size: 14px; margin-bottom: 16px; letter-spacing: 2px; }
        .modal-field { margin-bottom: 14px; }
        .modal-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: block; }
        .modal-input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
            padding: 8px 12px; border-radius: 4px; font-size: 14px; outline: none;
            font-family: 'Courier New', monospace;
        }
        .modal-input:focus { border-color: var(--green); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .modal-save { background: var(--green); color: #000; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .modal-cancel { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .modal-cancel:hover { border-color: var(--red); color: var(--red); }

        #toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--green); color: var(--green); padding: 10px 18px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginScreen">
    <div class="login-title">TOS M ADMIN</div>
    <div class="login-sub">MANAGEMENT CONSOLE</div>
    <input type="password" id="loginInput" class="login-input" placeholder="••••••••" maxlength="20">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">ENTER</button>
</div>

<!-- 主介面 -->
<div id="mainScreen">
    <div class="top-bar">
        <div class="top-title">TOS M · ADMIN CONSOLE</div>
        <div class="top-right">
            <span class="badge" id="lastUpdate">LIVE</span>
            <button class="btn-logout" onclick="doLogout()">登出</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">ROOMS</div><div class="stat-val" id="totalRooms">0</div></div>
        <div class="stat-card"><div class="stat-label">ONLINE</div><div class="stat-val" id="totalUsers">0</div></div>
        <div class="stat-card"><div class="stat-label">CARDS</div><div class="stat-val" id="totalBosses">0</div></div>
    </div>

    <!-- 保護房間管理 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">🔒 保護房間管理</div>
            <button class="btn-add" onclick="openAddProtected()">＋ 新增</button>
        </div>
        <div class="protected-list" id="protectedList">
            <div style="color:var(--muted);font-size:12px;padding:10px 0;">載入中...</div>
        </div>
    </div>

    <!-- 排序 -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">📋 房間列表</div>
        </div>
        <div class="sort-row">
            <button class="sort-btn active" id="sortOnlineBtn" onclick="setRoomSort('online')">在線優先</button>
            <button class="sort-btn" id="sortActiveBtn" onclick="setRoomSort('active')">最近活躍</button>
            <button class="sort-btn" id="sortIdleBtn" onclick="setRoomSort('idle')">最久未動</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>房間 ID</th>
                    <th>在線人數</th>
                    <th>卡片數</th>
                    <th>最後活動</th>
                    <th>最後更新者</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="roomList"></tbody>
        </table>
    </div>
</div>

<!-- 編輯 modal -->
<div id="editModal">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">編輯保護房間</div>
        <div class="modal-field">
            <label class="modal-label">房間 ID（大寫英數字）</label>
            <input type="text" id="modalRoomId" class="modal-input" placeholder="例：GABIJA" maxlength="20" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="modal-field">
            <label class="modal-label">管理員密碼</label>
            <input type="text" id="modalPassword" class="modal-input" placeholder="例：faker123" maxlength="30">
        </div>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeModal()">取消</button>
            <button class="modal-save" onclick="saveProtected()">儲存</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const ADMIN_PASSWORD = 'admin0516';
const firebaseConfig = {
    apiKey: "AIzaSyAff__U1cLBr92gYmtbWpm80zO4rHvObUI",
    authDomain: "tos-m-fb.firebaseapp.com",
    databaseURL: "https://tos-m-fb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tos-m-fb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomSort = 'online';
let allRoomsData = {};
let allProtectedData = {};
let editingKey = null; // null = 新增, string = 編輯現有

/* ════════ 登入 ════════ */
function doLogin() {
    const val = document.getElementById('loginInput').value;
    if (val === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        startListeners();
    } else {
        document.getElementById('loginErr').textContent = '密碼錯誤';
        document.getElementById('loginInput').value = '';
        setTimeout(() => document.getElementById('loginErr').textContent = '', 2000);
    }
}
document.getElementById('loginInput').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('loginInput').value = '';
}

/* ════════ Firebase 監聽 ════════ */
function startListeners() {
    // 監聽所有房間
    db.ref('rooms').on('value', s => {
        allRoomsData = s.val() || {};
        renderRooms();
        updateStats();
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-TW', {hour12:false});
    });

    // 監聽保護房間設定
    db.ref('protected_rooms').on('value', s => {
        allProtectedData = s.val() || {};
        renderProtected();
    });
}

/* ════════ 統計 ════════ */
function updateStats() {
    let rooms = 0, users = 0, bosses = 0;
    Object.values(allRoomsData).forEach(d => {
        rooms++;
        users += d.users ? Object.keys(d.users).length : 0;
        bosses += d.bosses ? Object.keys(d.bosses).length : 0;
    });
    document.getElementById('totalRooms').textContent = rooms;
    document.getElementById('totalUsers').textContent = users;
    document.getElementById('totalBosses').textContent = bosses;
}

/* ════════ 排序 ════════ */
function setRoomSort(type) {
    roomSort = type;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.id === `sort${type.charAt(0).toUpperCase()+type.slice(1)}Btn`));
    renderRooms();
}

function getRoomEntries() {
    return Object.entries(allRoomsData).map(([id, data]) => {
        let lastTime = 0, lastUser = '—';
        if (data.bosses) {
            const arr = Object.values(data.bosses);
            if (arr.length) {
                const latest = arr.reduce((p,c) => (p.startTime||0) > (c.startTime||0) ? p : c);
                lastTime = latest.startTime || 0;
                lastUser = latest.updater || '未知';
            }
        }
        const uCount = data.users ? Object.keys(data.users).length : 0;
        const bCount = data.bosses ? Object.keys(data.bosses).length : 0;
        return { id, data, lastTime, lastUser, uCount, bCount };
    });
}

/* ════════ 渲染房間列表 ════════ */
function renderRooms() {
    const entries = getRoomEntries();

    if (roomSort === 'online') {
        entries.sort((a,b) => {
            if (a.uCount !== b.uCount) return b.uCount - a.uCount;
            return b.lastTime - a.lastTime;
        });
    } else if (roomSort === 'active') {
        entries.sort((a,b) => b.lastTime - a.lastTime);
    } else {
        entries.sort((a,b) => a.lastTime - b.lastTime);
    }

    const list = document.getElementById('roomList');
    list.innerHTML = '';
    entries.forEach(item => {
        const isProtected = !!allProtectedData[item.id];
        const timeAgo = item.lastTime === 0 ? '—' : getTimeAgo(item.lastTime);
        const timeClass = (Date.now() - item.lastTime) < 3600000 ? 'time-recent' : 'time-old';
        list.innerHTML += `
            <tr>
                <td>
                    <span class="room-id ${isProtected?'room-id-protected':''}">${item.id}</span>
                    ${isProtected ? '<span class="prot-badge">🔒</span>' : ''}
                </td>
                <td class="${item.uCount>0?'online-yes':'online-no'}">${item.uCount} 人</td>
                <td>${item.bCount}</td>
                <td class="${timeClass}">${timeAgo}</td>
                <td style="color:var(--muted);font-size:11px;">${item.lastUser}</td>
                <td><button class="btn-del" onclick="deleteRoom('${item.id}')">清除</button></td>
            </tr>
        `;
    });
}

/* ════════ 渲染保護房間 ════════ */
function renderProtected() {
    const container = document.getElementById('protectedList');
    const entries = Object.entries(allProtectedData);
    if (!entries.length) {
        container.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px 0;">目前無保護房間設定</div>';
        return;
    }
    container.innerHTML = entries.map(([id, cfg]) => {
        const enabled = cfg.enabled !== false;
        return `
            <div class="protected-row">
                <div class="prot-id">${id}</div>
                <div class="prot-pass">密碼：${cfg.password || '—'}</div>
                <div class="prot-status ${enabled?'on':'off'}">${enabled ? '🔒 啟用中' : '🔓 已停用'}</div>
                <div class="prot-actions">
                    <button class="btn-sm btn-edit" onclick="openEditProtected('${id}')">編輯</button>
                    <button class="btn-sm btn-toggle-prot" onclick="toggleProtected('${id}', ${enabled})">${enabled?'停用':'啟用'}</button>
                    <button class="btn-sm btn-del-prot" onclick="deleteProtected('${id}')">刪除</button>
                </div>
            </div>
        `;
    }).join('');
}

/* ════════ 保護房間 CRUD ════════ */
function openAddProtected() {
    editingKey = null;
    document.getElementById('modalTitle').textContent = '新增保護房間';
    document.getElementById('modalRoomId').value = '';
    document.getElementById('modalRoomId').disabled = false;
    document.getElementById('modalPassword').value = '';
    document.getElementById('editModal').classList.add('show');
}

function openEditProtected(id) {
    editingKey = id;
    const cfg = allProtectedData[id] || {};
    document.getElementById('modalTitle').textContent = `編輯：${id}`;
    document.getElementById('modalRoomId').value = id;
    document.getElementById('modalRoomId').disabled = true; // 編輯時 ID 不可改
    document.getElementById('modalPassword').value = cfg.password || '';
    document.getElementById('editModal').classList.add('show');
}

function closeModal() {
    document.getElementById('editModal').classList.remove('show');
}

function saveProtected() {
    const id = document.getElementById('modalRoomId').value.trim().toUpperCase();
    const pass = document.getElementById('modalPassword').value.trim();
    if (!id) { alert('請輸入房間 ID'); return; }
    if (!pass) { alert('請輸入密碼'); return; }

    db.ref(`protected_rooms/${id}`).update({
        password: pass,
        enabled: true,
        updatedAt: Date.now()
    }).then(() => {
        showToast(`已儲存 ${id}`);
        closeModal();
    });
}

function toggleProtected(id, currentEnabled) {
    db.ref(`protected_rooms/${id}/enabled`).set(!currentEnabled)
      .then(() => showToast(`${id} ${!currentEnabled ? '已啟用' : '已停用'}`));
}

function deleteProtected(id) {
    if (!confirm(`確定刪除保護設定 [${id}]？\n刪除後該房間將變為一般房間。`)) return;
    db.ref(`protected_rooms/${id}`).remove()
      .then(() => showToast(`已刪除 ${id}`));
}

/* ════════ 房間刪除 ════════ */
function deleteRoom(id) {
    if (!confirm(`確定清除房間 [${id}] 嗎？\n所有卡片與紀錄將被刪除。`)) return;
    if (!confirm(`最後確認：真的要刪除 [${id}]？`)) return;
    db.ref(`rooms/${id}`).remove()
      .then(() => showToast(`房間 ${id} 已移除`))
      .catch(err => alert(`刪除失敗: ${err}`));
}

/* ════════ 工具 ════════ */
function getTimeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(hours / 24);
    if (days > 0) return `${days} 天前`;
    if (hours > 0) return `${hours} 小時前`;
    if (mins > 0) return `${mins} 分鐘前`;
    return '剛更新';
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

// modal 點背景關閉
document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) closeModal();
});
</script>
</body>
</html>
